name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Verify imports
        run: |
          python -c "from runner import main"
          python -c "from generate_results import generate_results_md"
          python -c "from test_quality import compute_structural_metrics"
          python -c "from llm_providers import get_provider"
