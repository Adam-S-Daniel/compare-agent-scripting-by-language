name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install pytest pyyaml --break-system-packages

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run aggregator on fixtures
        run: python aggregator.py fixtures/

      - name: Write job summary
        run: python aggregator.py fixtures/ >> "$GITHUB_STEP_SUMMARY"
