name: Test Results Aggregator

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Aggregator.Tests.ps1 -Output Detailed -CI

  aggregate:
    name: Aggregate matrix results
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      INPUT_DIR: ./fixtures
      OUT_FILE: ./summary.md
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate test results
        shell: pwsh
        run: |
          ./Aggregate-TestResults.ps1 -InputDir $env:INPUT_DIR -OutFile $env:OUT_FILE

      - name: Print summary
        shell: pwsh
        run: |
          Write-Host '----- summary.md -----'
          Get-Content -LiteralPath $env:OUT_FILE -Raw

      - name: Upload summary artifact
        # Skipped under nektos/act because artifact upload needs the
        # GitHub-hosted ACTIONS_RUNTIME_TOKEN which isn't provided locally.
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-summary
          path: ${{ env.OUT_FILE }}
          if-no-files-found: error
