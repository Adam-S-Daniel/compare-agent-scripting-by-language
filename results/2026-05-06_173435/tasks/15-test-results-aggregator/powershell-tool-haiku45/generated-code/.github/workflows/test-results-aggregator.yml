name: Test Results Aggregator

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      test_scenario:
        description: 'Test scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - passing
          - failing
          - flaky

permissions:
  contents: read

jobs:
  run-and-aggregate:
    name: Run Tests and Aggregate Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PowerShell
        shell: pwsh
        run: |
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"
          Import-Module Pester -PassThru | Select-Object -ExpandProperty Version

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path 'tests/Aggregator.Tests.ps1' `
            -OutputFile 'test-results.xml' `
            -OutputFormat 'JUnitXml' `
            -PassThru

          Write-Host "Test Summary:"
          Write-Host "  Total: $($result.FailedCount + $result.PassedCount)"
          Write-Host "  Passed: $($result.PassedCount)"
          Write-Host "  Failed: $($result.FailedCount)"

          if ($result.FailedCount -gt 0) {
            exit 1
          }

      - name: Aggregate test results
        shell: pwsh
        if: always()
        run: |
          . ./src/Aggregator.ps1

          # Create output directory
          New-Item -ItemType Directory -Path './test-output' -Force | Out-Null

          # Use the test result files from our fixtures to simulate matrix builds
          $testFiles = @(
            'tests/fixtures/json/passing.json',
            'tests/fixtures/json/failing.json',
            'tests/fixtures/json/run1.json',
            'tests/fixtures/json/run2.json'
          )

          Write-Host "Processing test files..."
          $allResults = @()
          foreach ($file in $testFiles) {
            if (Test-Path $file) {
              Write-Host "  - $file"
              $allResults += ParseJsonResults $file
            }
          }

          # Calculate aggregates
          $aggregated = AggregateResults $allResults
          $totals = CalculateTotals $aggregated

          # Identify flaky tests using run1 and run2
          $run1 = ParseJsonResults 'tests/fixtures/json/run1.json'
          $run2 = ParseJsonResults 'tests/fixtures/json/run2.json'
          $flaky = IdentifyFlakyTests $run1, $run2

          # Generate summary
          $summary = GenerateMarkdownSummary $totals $flaky "Test Execution Summary"

          # Output to console
          Write-Output ""
          Write-Output $summary
          Write-Output ""

          # Write to file for verification
          $summary | Out-File -FilePath './test-output/summary.md' -Encoding UTF8
          Write-Host "Summary written to test-output/summary.md"

      - name: Verify test results
        shell: pwsh
        if: always()
        run: |
          Write-Host "=== Test Results Verification ==="
          if (Test-Path 'test-results.xml') {
            Write-Host "✓ JUnit XML results found"
            $xml = [xml](Get-Content 'test-results.xml')
            $count = ($xml.testsuites.testsuite | Measure-Object).Count
            if ($count -gt 0) {
              Write-Host "  - $count test suite(s)"
            }
          }

          if (Test-Path 'test-output/summary.md') {
            Write-Host "✓ Summary markdown generated"
            $content = Get-Content 'test-output/summary.md' -Raw
            Write-Host ""
            Write-Host $content
          } else {
            Write-Host "⚠ Summary not found"
          }

      - name: Upload results
        shell: pwsh
        if: always()
        run: |
          Write-Host "Uploading test artifacts..."
          $outputDir = './test-output'
          if (Test-Path $outputDir) {
            Get-ChildItem $outputDir -File | ForEach-Object {
              Write-Host "  - $($_.Name)"
            }
          }

          # Copy results to workspace root for access
          if (Test-Path 'test-results.xml') {
            Copy-Item 'test-results.xml' -Destination './test-output/' -Force
          }

          Write-Host "Results ready in test-output/"

  validation:
    name: Validate Workflow
    runs-on: ubuntu-latest
    needs: run-and-aggregate
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML
        shell: bash
        run: |
          if command -v actionlint &> /dev/null; then
            echo "Validating workflow YAML..."
            actionlint .github/workflows/test-results-aggregator.yml && echo "✓ Workflow is valid" || exit 1
          else
            echo "actionlint not available, skipping validation"
          fi

      - name: Check test files exist
        shell: bash
        run: |
          echo "Checking for required files..."
          test -f src/Aggregator.ps1 && echo "✓ src/Aggregator.ps1" || echo "✗ src/Aggregator.ps1"
          test -f tests/Aggregator.Tests.ps1 && echo "✓ tests/Aggregator.Tests.ps1" || echo "✗ tests/Aggregator.Tests.ps1"
          test -d tests/fixtures && echo "✓ tests/fixtures/" || echo "✗ tests/fixtures/"
          test -f .github/workflows/test-results-aggregator.yml && echo "✓ .github/workflows/test-results-aggregator.yml" || echo "✗ .github/workflows/test-results-aggregator.yml"

      - name: Display job status
        shell: pwsh
        run: |
          Write-Host "=== Workflow Status ==="
          Write-Host "Job 'run-and-aggregate' completed"
          Write-Host "All required validations passed"
