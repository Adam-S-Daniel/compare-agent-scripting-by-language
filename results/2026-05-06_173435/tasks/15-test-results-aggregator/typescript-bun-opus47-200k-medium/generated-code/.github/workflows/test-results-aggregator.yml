name: test-results-aggregator

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  FIXTURE_DIR: fixtures

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests (TDD suite)
        run: bun test src/

      - name: Aggregate test results across runs
        id: agg
        run: |
          set -euo pipefail
          bun run src/cli.ts "${FIXTURE_DIR}" --out summary.md | tee cli-output.txt
          # Extract the AGG status line for downstream assertions.
          grep '^::AGG::' cli-output.txt > agg-line.txt
          cat agg-line.txt

      - name: Publish job summary
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-summary
          path: |
            summary.md
            cli-output.txt
