name: Test Results Aggregator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python
        run: python3 --version

      - name: Run aggregator
        run: python3 aggregator.py fixtures/
