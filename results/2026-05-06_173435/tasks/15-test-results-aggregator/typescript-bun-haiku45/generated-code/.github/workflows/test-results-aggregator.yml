name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create test fixtures directory
        run: mkdir -p /tmp/test-results

      - name: Generate sample JUnit XML results
        run: |
          cat > /tmp/test-results/junit-run1.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <testsuites>
            <testsuite name="CalculatorTests" tests="3" failures="1" skipped="0" time="1.2">
              <testcase classname="com.example.CalculatorTest" name="testAddition" time="0.4"/>
              <testcase classname="com.example.CalculatorTest" name="testSubtraction" time="0.3">
                <failure message="Expected 5 but got 4">AssertionError at line 42</failure>
              </testcase>
              <testcase classname="com.example.CalculatorTest" name="testMultiplication" time="0.5"/>
            </testsuite>
          </testsuites>
          EOF

      - name: Generate sample JSON results
        run: |
          cat > /tmp/test-results/json-run1.json << 'EOF'
          {
            "suites": [
              {
                "name": "StringUtilsTests",
                "tests": 2,
                "failures": 0,
                "skipped": 1,
                "time": 0.8,
                "cases": [
                  {
                    "name": "testTrim",
                    "className": "com.example.StringUtilsTest",
                    "status": "passed",
                    "duration": 0.3
                  },
                  {
                    "name": "testPadding",
                    "className": "com.example.StringUtilsTest",
                    "status": "skipped",
                    "duration": 0.5,
                    "message": "Not implemented yet"
                  }
                ]
              }
            ]
          }
          EOF

      - name: Run test aggregator
        id: aggregate
        run: |
          bun run src/main.ts /tmp/test-results > /tmp/summary.md
          cat /tmp/summary.md

      - name: Write to job summary
        if: always()
        run: cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Test workflow structure
        run: |
          echo "Workflow file validation..."
          [ -f .github/workflows/test-results-aggregator.yml ] && echo "✓ Workflow file exists"
          [ -f src/main.ts ] && echo "✓ Main script exists"
          [ -f src/parser.ts ] && echo "✓ Parser module exists"
          [ -f src/aggregator.ts ] && echo "✓ Aggregator module exists"
          [ -f src/markdown.ts ] && echo "✓ Markdown module exists"

      - name: Validate actionlint
        run: |
          if command -v actionlint &> /dev/null; then
            actionlint .github/workflows/test-results-aggregator.yml
          else
            echo "Note: actionlint not available in this environment"
          fi
