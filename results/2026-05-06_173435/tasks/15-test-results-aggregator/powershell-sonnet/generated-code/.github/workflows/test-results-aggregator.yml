name: Test Results Aggregator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-tests:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester test suite
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path tests/ -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }
          Write-Host "All $($result.PassedCount) tests passed."

  aggregate-results:
    name: Aggregate Test Results
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run aggregator on fixture files
        shell: pwsh
        run: |
          . ./Invoke-TestResultsAggregator.ps1
          $merged = Invoke-Aggregation -Path ./fixtures
          Write-Host "=== AGGREGATION RESULTS ==="
          Write-Host "TotalPassed:   $($merged.TotalPassed)"
          Write-Host "TotalFailed:   $($merged.TotalFailed)"
          Write-Host "TotalSkipped:  $($merged.TotalSkipped)"
          Write-Host "TotalDuration: $($merged.TotalDuration)"
          Write-Host "RunCount:      $($merged.RunCount)"
          Write-Host "FlakyCount:    $($merged.FlakyTests.Count)"

      - name: Generate markdown summary
        shell: pwsh
        run: |
          . ./Invoke-TestResultsAggregator.ps1
          $md = Invoke-Aggregation -Path ./fixtures -OutputMarkdown
          Write-Host "=== MARKDOWN SUMMARY ==="
          Write-Host $md
          # Write to GitHub Actions job summary if available
          if ($env:GITHUB_STEP_SUMMARY) {
            $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
