name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Aggregate-TestResults.Tests.ps1'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

      - name: Run Test Aggregation
        shell: pwsh
        run: |
          ./Aggregate-TestResults.ps1 -ResultsDir ./fixtures -OutputFile summary.md
