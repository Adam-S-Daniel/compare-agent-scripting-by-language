name: Test Results Aggregator

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'aggregator.py'
      - 'run_aggregator.py'
      - 'test_aggregator.py'
      - 'fixtures/**'
      - '.github/workflows/test-results-aggregator.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'aggregator.py'
      - 'run_aggregator.py'
      - 'test_aggregator.py'
      - 'fixtures/**'
      - '.github/workflows/test-results-aggregator.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests and Aggregate Results
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: python3 -m pytest test_aggregator.py -v

      - name: Run aggregator on fixtures
        run: python3 run_aggregator.py fixtures/python_tests.xml fixtures/node_tests_run1.json fixtures/node_tests_run2.json --output test-summary.md

      - name: Write summary to GitHub Actions
        if: always()
        run: cat test-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Display summary
        if: always()
        run: |
          echo "=== Test Results Aggregation ==="
          cat test-summary.md
