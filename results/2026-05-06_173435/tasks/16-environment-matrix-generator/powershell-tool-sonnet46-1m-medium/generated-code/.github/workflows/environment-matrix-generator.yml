name: Environment Matrix Generator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pester (no-op if already present)
        shell: pwsh
        run: |
          $pester = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge '5.0.0' }
          if (-not $pester) {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0.0
          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run Pester unit and workflow-structure tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0
          $cfg = [PesterConfiguration]::Default
          $cfg.Run.Path         = './New-BuildMatrix.Tests.ps1'
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.Run.PassThru     = $true
          $result = Invoke-Pester -Configuration $cfg
          Write-Host "PESTER_PASSED=$($result.PassedCount)"
          Write-Host "PESTER_FAILED=$($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) Pester test(s) failed"
            exit 1
          }

      - name: Generate matrix - Test Case 1 (basic, os x python-version)
        shell: pwsh
        run: |
          Write-Host "MATRIX_TEST1_START"
          & ./Invoke-MatrixGenerator.ps1 -ConfigFile ./test-fixtures/test1-basic.json
          Write-Host "MATRIX_TEST1_END"

      - name: Generate matrix - Test Case 2 (include/exclude rules)
        shell: pwsh
        run: |
          Write-Host "MATRIX_TEST2_START"
          & ./Invoke-MatrixGenerator.ps1 -ConfigFile ./test-fixtures/test2-includes.json
          Write-Host "MATRIX_TEST2_END"
