name: Environment Matrix Generator

# Run on push, PR, manual dispatch, and weekly to catch ecosystem drift.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  CONFIG_PATH: config.json

jobs:
  test:
    name: Pester tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester
        shell: pwsh
        run: |
          $r = Invoke-Pester -Path ./EnvironmentMatrix.Tests.ps1 -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "Pester failures: $($r.FailedCount)" }

  generate:
    name: Generate matrix
    runs-on: ubuntu-latest
    needs: test
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate matrix JSON
        id: gen
        shell: pwsh
        run: |
          . ./New-EnvironmentMatrix.ps1
          $json = Invoke-MatrixGenerator -ConfigPath $env:CONFIG_PATH
          # Markers let the test harness extract the exact JSON deterministically.
          Write-Host "MATRIX_BEGIN"
          Write-Host $json
          Write-Host "MATRIX_END"
          "matrix=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
