name: Environment Matrix Generator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      fixture_file:
        description: "Path to fixture JSON config (relative to repo root)"
        required: false
        default: "fixtures/basic-matrix.json"

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Pester is available
        shell: pwsh
        run: |
          $pester = Get-Module -ListAvailable Pester | Select-Object -First 1
          if (-not $pester) {
            Install-Module -Name Pester -Force -Scope CurrentUser
          }
          Write-Host "Pester version: $($pester.Version)"

      - name: Run Pester unit tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./New-BuildMatrix.Tests.ps1"
          $config.Run.PassThru = $true
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "./test-results.xml"
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }
          Write-Host "PESTER_PASSED: $($result.PassedCount)"
          Write-Host "All $($result.PassedCount) tests passed"

      - name: Generate matrix from basic-matrix fixture
        shell: pwsh
        run: |
          Write-Host "=== Fixture: fixtures/basic-matrix.json ==="
          $output = pwsh -File ./New-BuildMatrix.ps1 -ConfigFile fixtures/basic-matrix.json
          Write-Host $output
          # Validate the output contains expected values
          if ($output -notmatch 'MATRIX_OUTPUT:') {
            Write-Error "Expected MATRIX_OUTPUT line not found"
            exit 1
          }
          if ($output -match 'MATRIX_OUTPUT: (.+)') {
            $json = $Matches[1] | ConvertFrom-Json
            $osValues = $json.matrix.os
            $pyValues = $json.matrix.'python-version'
            Write-Host "VALIDATE_OS_COUNT: $($osValues.Count)"
            Write-Host "VALIDATE_PY_COUNT: $($pyValues.Count)"
            Write-Host "VALIDATE_HAS_UBUNTU: $($osValues -contains 'ubuntu-latest')"
            Write-Host "VALIDATE_HAS_311: $($pyValues -contains '3.11')"
          }

      - name: Generate matrix from advanced-matrix fixture
        shell: pwsh
        run: |
          Write-Host "=== Fixture: fixtures/advanced-matrix.json ==="
          $output = pwsh -File ./New-BuildMatrix.ps1 -ConfigFile fixtures/advanced-matrix.json
          Write-Host $output
          if ($output -match 'MATRIX_OUTPUT: (.+)') {
            $json = $Matches[1] | ConvertFrom-Json
            Write-Host "VALIDATE_MAX_PARALLEL: $($json.'max-parallel')"
            Write-Host "VALIDATE_FAIL_FAST: $($json.'fail-fast')"
            Write-Host "VALIDATE_INCLUDE_COUNT: $($json.matrix.include.Count)"
            Write-Host "VALIDATE_EXCLUDE_COUNT: $($json.matrix.exclude.Count)"
          }

      - name: Generate matrix from feature-flags fixture
        shell: pwsh
        run: |
          Write-Host "=== Fixture: fixtures/feature-flags.json ==="
          $output = pwsh -File ./New-BuildMatrix.ps1 -ConfigFile fixtures/feature-flags.json
          Write-Host $output
          if ($output -match 'MATRIX_OUTPUT: (.+)') {
            $json = $Matches[1] | ConvertFrom-Json
            $features = $json.matrix.features
            Write-Host "VALIDATE_FEATURES_COUNT: $($features.Count)"
            Write-Host "VALIDATE_HAS_FEATURE_A: $($features -contains 'feature-a')"
            Write-Host "VALIDATE_MAX_PARALLEL: $($json.'max-parallel')"
            Write-Host "VALIDATE_FAIL_FAST: $($json.'fail-fast')"
          }

      - name: Validate max-size enforcement
        shell: pwsh
        run: |
          # Write a temp config that exceeds max-size to verify the error is thrown
          $oversizedConfig = @{
            os               = @("ubuntu-latest", "windows-latest", "macos-latest")
            'python-version' = @("3.8", "3.9", "3.10", "3.11")
            'max-size'       = 5
          } | ConvertTo-Json
          $oversizedConfig | Out-File -FilePath /tmp/oversized.json -Encoding utf8
          Write-Host "Testing max-size enforcement (expects failure)..."
          $output = pwsh -File ./New-BuildMatrix.ps1 -ConfigFile /tmp/oversized.json 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Expected script to fail for oversized matrix, but it succeeded"
            exit 1
          }
          Write-Host "VALIDATE_MAXSIZE_ERROR: correctly rejected oversized matrix"
          Write-Host "Error output: $output"
          # Explicitly exit 0: $LASTEXITCODE would be 1 from the inner pwsh call above.
          exit 0
