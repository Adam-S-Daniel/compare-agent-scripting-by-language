name: Environment Matrix Generator

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]"5.0" })) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0

      - name: Install actionlint
        shell: bash
        run: |
          VERSION="1.7.12"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint
          actionlint --version

      - name: Run unit tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = "./New-BuildMatrix.Tests.ps1"
          $cfg.Output.Verbosity = "Detailed"
          $cfg.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $cfg
          Write-Host "Tests passed: $($result.PassedCount)"
          Write-Host "Tests failed: $($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }

      - name: Generate matrix from test fixture
        shell: pwsh
        run: |
          $fixturePath = "./test-fixture.json"
          if (Test-Path $fixturePath) {
            Write-Host "Running matrix generator with fixture: $fixturePath"
            $output = ./New-BuildMatrix.ps1 -ConfigPath $fixturePath
            Write-Host "MATRIX_RESULT_START"
            Write-Host $output
            Write-Host "MATRIX_RESULT_END"
            $json = $output | ConvertFrom-Json
            Write-Host "total-combinations: $($json.'total-combinations')"
            if ($null -ne $json.'max-parallel')  { Write-Host "max-parallel: $($json.'max-parallel')" }
            if ($null -ne $json.'fail-fast')      { Write-Host "fail-fast: $($json.'fail-fast')" }
          } else {
            Write-Host "No test-fixture.json found — running example fixture instead"
            $output = ./New-BuildMatrix.ps1 -ConfigPath ./fixtures/example-matrix.json
            Write-Host "MATRIX_RESULT_START"
            Write-Host $output
            Write-Host "MATRIX_RESULT_END"
            $json = $output | ConvertFrom-Json
            Write-Host "total-combinations: $($json.'total-combinations')"
          }
