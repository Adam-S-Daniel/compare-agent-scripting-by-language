name: Environment Matrix Generator

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Validate workflow syntax with actionlint ──────────────────────────────
  validate-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          VERSION="1.7.12"
          ARCHIVE="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${ARCHIVE}" \
            -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install /tmp/actionlint /usr/local/bin/actionlint

      - name: Run actionlint on this workflow
        run: actionlint .github/workflows/environment-matrix-generator.yml

  # ── Run Pester unit tests + generate matrix from config.json ─────────────
  test-and-generate:
    runs-on: ubuntu-latest
    needs: validate-workflow
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Pester is available
        shell: pwsh
        run: |
          $existing = Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge '5.0' }
          if (-not $existing) {
            Write-Host "Installing Pester..."
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          } else {
            Write-Host "Pester $($existing[0].Version) already available."
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path       = "./New-BuildMatrix.Tests.ps1"
          $cfg.Output.Verbosity = "Detailed"
          $cfg.Run.Exit       = $true
          Invoke-Pester -Configuration $cfg

      - name: Generate matrix from basic config
        shell: pwsh
        run: |
          Write-Host "=== MATRIX_OUTPUT_BEGIN (basic-config) ==="
          ./New-BuildMatrix.ps1 -ConfigFile ./fixtures/basic-config.json
          Write-Host "=== MATRIX_OUTPUT_END ==="

      - name: Generate matrix from full config
        shell: pwsh
        run: |
          Write-Host "=== MATRIX_OUTPUT_BEGIN (full-config) ==="
          ./New-BuildMatrix.ps1 -ConfigFile ./fixtures/full-config.json
          Write-Host "=== MATRIX_OUTPUT_END ==="

      - name: Generate matrix from config.json (if present)
        shell: pwsh
        run: |
          if (Test-Path "./config.json") {
            Write-Host "=== MATRIX_OUTPUT_BEGIN (config.json) ==="
            ./New-BuildMatrix.ps1 -ConfigFile ./config.json
            Write-Host "=== MATRIX_OUTPUT_END ==="
          } else {
            Write-Host "No config.json found; skipping dynamic generation step."
          }
