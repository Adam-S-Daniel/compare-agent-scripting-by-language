rules:
  - pattern: "docs/**"
    label: documentation
  - pattern: "src/api/**"
    label: api
    group: layer
    priority: 10
  - pattern: "src/**"
    label: backend
    group: layer
    priority: 1
  - pattern: "**/*.test.*"
    label: tests
  - pattern: "**/*.py"
    label: python
  - pattern: "**/*.js"
    label: javascript
