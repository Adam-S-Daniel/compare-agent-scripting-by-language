name: PR Label Assigner

# Why these triggers:
#   * push / pull_request: run on every commit to validate label rules
#   * workflow_dispatch:   allow manual / programmatic re-runs from the UI
#
# The act-based harness uses `act push --rm` and varies the fixture file in
# fixtures/changed-files.txt per test case. When fixtures/expected-labels.txt
# is present, the assert step also verifies the computed labels match it
# exactly (in order) so the workflow itself fails any case it should.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIG_PATH: labels.json
  FIXTURE_PATH: fixtures/changed-files.txt
  EXPECTED_LABELS_PATH: fixtures/expected-labels.txt

jobs:
  pester:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path         = './Get-PrLabels.Tests.ps1'
          $cfg.Run.PassThru     = $true
          $cfg.Output.Verbosity = 'Detailed'
          $r = Invoke-Pester -Configuration $cfg
          "Pester result: passed=$($r.PassedCount) failed=$($r.FailedCount) skipped=$($r.SkippedCount)"
          if ($r.FailedCount -gt 0) {
            throw "Pester reported $($r.FailedCount) failing test(s)."
          }
          if ($r.PassedCount -lt 1) {
            throw "Pester reported zero passing tests; refusing to claim success."
          }

  assign-labels:
    name: Assign labels for fixture
    runs-on: ubuntu-latest
    needs: pester
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show fixture
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath $env:FIXTURE_PATH)) {
            throw "Fixture file not found at '$env:FIXTURE_PATH'."
          }
          Write-Host "::group::Fixture ($env:FIXTURE_PATH)"
          Get-Content -LiteralPath $env:FIXTURE_PATH | ForEach-Object { Write-Host $_ }
          Write-Host "::endgroup::"

      - name: Compute and assert labels
        shell: pwsh
        run: |
          # Run the entry-point script and capture every line so we can both
          # surface them (for the harness to parse out of `act` output) and
          # extract the labels for an in-workflow assertion.
          $lines = & ./Invoke-PrLabelAssigner.ps1 `
                      -ChangedFilesPath $env:FIXTURE_PATH `
                      -ConfigPath       $env:CONFIG_PATH `
                      -EmitJson
          $lines | ForEach-Object { Write-Host $_ }

          # Parse the LABELS_BEGIN/LABELS_END frame.
          $actual  = @()
          $inFrame = $false
          foreach ($ln in $lines) {
            if ($ln -eq 'LABELS_END')   { $inFrame = $false; continue }
            if ($inFrame)               { $actual += $ln }
            if ($ln -eq 'LABELS_BEGIN') { $inFrame = $true }
          }

          # If the harness wrote an expected-labels file, assert order + values.
          if (Test-Path -LiteralPath $env:EXPECTED_LABELS_PATH) {
            $expected = @(
              Get-Content -LiteralPath $env:EXPECTED_LABELS_PATH |
                ForEach-Object { $_.Trim() } |
                Where-Object   { $_ -and -not $_.StartsWith('#') }
            )
            $expFlat = $expected -join '|'
            $actFlat = $actual   -join '|'
            Write-Host "EXPECTED: [$($expected -join ', ')]"
            Write-Host "ACTUAL:   [$($actual   -join ', ')]"
            if ($expFlat -ne $actFlat) {
              throw "Label mismatch. expected=[$($expected -join ', ')] actual=[$($actual -join ', ')]"
            }
            Write-Host "ASSERTION_PASSED labels match expected order."
          }
          else {
            Write-Host "No expected-labels file at '$env:EXPECTED_LABELS_PATH'; skipping assertion."
          }
