name: PR Label Assigner

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python -m unittest test_label_assigner.py -v

  assign-labels:
    name: Assign labels
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      RULES_FILE: rules.json
      FIXTURE_FILE: test-fixture/files.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run label assigner against fixture
        run: |
          set -e
          if [ ! -f "$FIXTURE_FILE" ]; then
            echo "No fixture at $FIXTURE_FILE — using empty file list."
            FIXTURE='[]'
          else
            FIXTURE="$(cat "$FIXTURE_FILE")"
          fi
          echo "FIXTURE: $FIXTURE"
          OUTPUT="$(python label_assigner.py --rules "$RULES_FILE" --files-json "$FIXTURE")"
          echo "LABELS=$OUTPUT"
          echo "labels=$OUTPUT" >> "$GITHUB_OUTPUT"
        id: assign
