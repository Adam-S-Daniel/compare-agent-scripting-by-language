name: PR Label Assigner

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  label-assigner:
    name: Run PR Label Assigner Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # install shellcheck if not already present in the container
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y shellcheck
          fi

      - name: Validate script syntax and lint
        run: |
          bash -n pr-label-assigner.sh
          shellcheck pr-label-assigner.sh

      - name: Run integration tests
        run: |
          set -euo pipefail

          SCRIPT="./pr-label-assigner.sh"
          FIXTURES="./tests/fixtures"

          run_test() {
            local name="$1" expected="$2" actual="$3"
            if [[ "$actual" == "$expected" ]]; then
              echo "INTEGRATION_TEST: ${name} | STATUS: PASS | ACTUAL: ${actual}"
            else
              echo "INTEGRATION_TEST: ${name} | STATUS: FAIL | EXPECTED: ${expected} | ACTUAL: ${actual}"
              return 1
            fi
          }

          # Use a temp file for single-value inputs instead of process substitution
          TMPF=$(mktemp)
          trap 'rm -f "$TMPF"' EXIT

          # ── single-file, single-label ──────────────────────────────────────
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-docs.txt")
          run_test "basic-docs" "documentation" "$actual"

          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-api.txt")
          run_test "basic-api" "api" "$actual"

          echo "app.test.js" > "$TMPF"
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$TMPF")
          run_test "test-label" "tests" "$actual"

          echo "utils.spec.ts" > "$TMPF"
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$TMPF")
          run_test "spec-label" "tests" "$actual"

          # ── no match ──────────────────────────────────────────────────────
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-no-match.txt")
          run_test "no-match" "No labels matched" "$actual"

          # ── multiple files → union of labels (sorted) ─────────────────────
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-multi.txt")
          expected=$'api\ndocumentation'
          run_test "multi-file" "$expected" "$actual"

          # ── single file matches multiple rules ────────────────────────────
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-multi-label.txt")
          expected=$'api\ntests'
          run_test "multi-label-file" "$expected" "$actual"

          # ── priority: overlapping rules, both labels applied ──────────────
          actual=$(bash "$SCRIPT" "$FIXTURES/priority-rules.conf" "$FIXTURES/files-priority.txt")
          expected=$'api\nsource'
          run_test "priority-overlap" "$expected" "$actual"

          # ── deduplication: two files each matching the same label ─────────
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-dedup.txt")
          run_test "dedup-labels" "tests" "$actual"

          # ── deeply nested path ────────────────────────────────────────────
          actual=$(bash "$SCRIPT" "$FIXTURES/basic-rules.conf" "$FIXTURES/files-nested.txt")
          run_test "nested-path" "documentation" "$actual"

          echo "All integration tests passed."
