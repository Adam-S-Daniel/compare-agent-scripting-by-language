# PR Label Rules
# Format: priority:glob_pattern:label
# Lower priority number = higher precedence in output ordering

10:docs/**:documentation
20:src/api/**:api
30:**/*.test.*:tests
30:*.test.*:tests
30:tests/**:tests
40:src/**:core
50:**/*.md:documentation
50:*.md:documentation
60:.github/**:ci
70:*.yml:config
70:*.yaml:config
80:*.json:config
90:Dockerfile*:infrastructure
90:docker-compose*:infrastructure
100:**:needs-review
