# Secret Rotation Validator workflow.
#
# Runs the unit tests (pytest) and the validator CLI itself in CI/CD. The
# `validate` job is configurable via four environment variables (FIXTURE,
# FORMAT, WARNING_DAYS, REFERENCE_DATE) so the test harness can drive it
# through `act push --rm --env ...` for each test case.
#
# Triggers cover both the typical CI use (push, pull_request),
# scheduled drift detection (cron Mondays 09:00 UTC), and on-demand runs
# (workflow_dispatch).
name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      fixture:
        description: 'Fixture file under tests/fixtures/'
        required: false
        default: 'secrets-mixed.json'
      format:
        description: 'Output format (markdown or json)'
        required: false
        default: 'markdown'
      warning_days:
        description: 'Days before due-date a secret is flagged as warning'
        required: false
        default: '14'
      reference_date:
        description: 'Reference date YYYY-MM-DD (for deterministic CI testing)'
        required: false
        default: '2026-05-07'

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python3 -m pip install --quiet pytest
      - name: Run pytest
        run: python3 -m pytest tests/ -v

  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run validator
        # FIXTURE/FORMAT/WARNING_DAYS/REFERENCE_DATE come from the runner's
        # environment (set by the test harness via `act --env`). When
        # absent — e.g. for vanilla `act push` or scheduled runs — the
        # `:-default` shell expansions provide sensible mixed-fixture
        # defaults. The marker lines bound the validator output so the
        # harness can extract it from act's interleaved log stream.
        shell: bash
        run: |
          FIXTURE="${FIXTURE:-secrets-mixed.json}"
          FORMAT="${FORMAT:-markdown}"
          WARNING_DAYS="${WARNING_DAYS:-14}"
          REFERENCE_DATE="${REFERENCE_DATE:-2026-05-07}"
          echo "Configuration: fixture=${FIXTURE} format=${FORMAT} warning_days=${WARNING_DAYS} reference_date=${REFERENCE_DATE}"
          echo "=== BEGIN_VALIDATOR_OUTPUT ==="
          python3 src/secret_rotation.py \
            --config "tests/fixtures/${FIXTURE}" \
            --format "${FORMAT}" \
            --warning-days "${WARNING_DAYS}" \
            --reference-date "${REFERENCE_DATE}"
          echo "=== END_VALIDATOR_OUTPUT ==="
