---
# Secret Rotation Validator CI
#
# Runs the bash validator script against several fixture configs to verify
# behaviour end-to-end inside a real GitHub Actions container. The job
# emits sentinel lines (PREFIX=VALUE) which the bats harness greps from
# captured `act` output. Using sentinels keeps test assertions decoupled
# from the human-readable report's exact whitespace.

name: secret-rotation-validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily reminder of any approaching rotations.
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '14'

# Least-privilege: this workflow only reads the repo.
permissions:
  contents: read

env:
  TODAY: '2026-05-07'
  WARNING_DAYS: '14'

jobs:
  validate:
    name: Validate secret rotation fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        shell: bash
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq
          fi
          jq --version

      - name: Make validator executable
        shell: bash
        run: chmod +x bin/secret-rotation-validator.sh

      - name: Fixture A — mixed (markdown)
        shell: bash
        run: |
          set -e
          echo "===== FIXTURE A: mixed (markdown) ====="
          bin/secret-rotation-validator.sh \
            --config tests/fixtures/mixed.json \
            --today "${TODAY}" \
            --warning-days "${WARNING_DAYS}" \
            --format markdown

      - name: Fixture A — fail-on-expired exit code
        shell: bash
        run: |
          set +e
          bin/secret-rotation-validator.sh \
            --config tests/fixtures/mixed.json \
            --today "${TODAY}" \
            --warning-days "${WARNING_DAYS}" \
            --fail-on-expired \
            >/dev/null 2>&1
          rc=$?
          echo "FAIL_ON_EXPIRED_EXIT=${rc}"

      - name: Fixture B — all-ok (markdown + fail-on-expired)
        shell: bash
        run: |
          set -e
          echo "===== FIXTURE B: all-ok ====="
          bin/secret-rotation-validator.sh \
            --config tests/fixtures/all-ok.json \
            --today "${TODAY}" \
            --warning-days "${WARNING_DAYS}" \
            --format markdown
          set +e
          bin/secret-rotation-validator.sh \
            --config tests/fixtures/all-ok.json \
            --today "${TODAY}" \
            --warning-days "${WARNING_DAYS}" \
            --fail-on-expired \
            >/dev/null 2>&1
          rc=$?
          echo "ALLGOOD_EXIT=${rc}"

      - name: Fixture C — json output and grouping
        shell: bash
        run: |
          set -e
          echo "===== FIXTURE C: json ====="
          json_out=$(bin/secret-rotation-validator.sh \
            --config tests/fixtures/json-only.json \
            --today "${TODAY}" \
            --warning-days "${WARNING_DAYS}" \
            --format json)
          echo "${json_out}"
          # Extract group counts via jq for a deterministic sentinel.
          ec=$(echo "${json_out}" | jq '.groups.expired | length')
          wc=$(echo "${json_out}" | jq '.groups.warning | length')
          oc=$(echo "${json_out}" | jq '.groups.ok      | length')
          echo "JSON_GROUPS=expired:${ec},warning:${wc},ok:${oc}"
          # Verify the JSON carries the documented fields on every record.
          if echo "${json_out}" | jq -e '
            [.groups.expired[], .groups.warning[], .groups.ok[]]
            | all(has("name") and has("status") and has("days_overdue"))
          ' >/dev/null; then
            echo "JSON_FIELDS_OK=true"
          else
            echo "JSON_FIELDS_OK=false"
            exit 1
          fi

      - name: Fixture D — tight warning window flips GITHUB_TOKEN to OK
        shell: bash
        run: |
          set -e
          echo "===== FIXTURE D: tight warning window ====="
          out=$(bin/secret-rotation-validator.sh \
            --config tests/fixtures/mixed.json \
            --today "${TODAY}" \
            --warning-days 5 \
            --format markdown)
          echo "${out}"
          status=$(echo "${out}" \
            | awk -F'|' '/GITHUB_TOKEN/ { gsub(/^ +| +$/, "", $6); print $6; exit }')
          echo "TIGHT_WINDOW_GITHUB_STATUS=${status}"

      - name: Error path — malformed JSON
        shell: bash
        run: |
          set +e
          err_out=$(bin/secret-rotation-validator.sh \
            --config tests/fixtures/malformed.json \
            --today "${TODAY}" 2>&1)
          rc=$?
          echo "MALFORMED_OUTPUT: ${err_out}"
          if [ "${rc}" -ne 0 ] && echo "${err_out}" | grep -q 'not valid JSON'; then
            echo "MALFORMED_JSON_HANDLED=true"
          else
            echo "MALFORMED_JSON_HANDLED=false"
            exit 1
          fi

      - name: Error path — missing config file
        shell: bash
        run: |
          set +e
          err_out=$(bin/secret-rotation-validator.sh \
            --config tests/fixtures/does-not-exist.json 2>&1)
          rc=$?
          echo "MISSING_OUTPUT: ${err_out}"
          if [ "${rc}" -ne 0 ] && echo "${err_out}" | grep -q 'not found'; then
            echo "MISSING_FILE_HANDLED=true"
          else
            echo "MISSING_FILE_HANDLED=false"
            exit 1
          fi
