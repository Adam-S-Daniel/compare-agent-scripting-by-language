name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  REFERENCE_DATE: "2026-05-07"
  WARNING_DAYS: "14"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Verify script syntax
        run: bash -n secret-rotation-validator.sh

      - name: Run bats test suite
        run: bats --tap test/secret-rotation-validator.bats

      - name: Run validator - basic secrets (markdown)
        run: |
          bash secret-rotation-validator.sh \
            --config test/fixtures/basic-secrets.json \
            --reference-date "$REFERENCE_DATE" \
            --warning-days "$WARNING_DAYS" \
            --format markdown || true

      - name: Run validator - basic secrets (JSON)
        run: |
          bash secret-rotation-validator.sh \
            --config test/fixtures/basic-secrets.json \
            --reference-date "$REFERENCE_DATE" \
            --warning-days "$WARNING_DAYS" \
            --format json || true

      - name: Run validator - all expired
        run: |
          bash secret-rotation-validator.sh \
            --config test/fixtures/all-expired.json \
            --reference-date "$REFERENCE_DATE" \
            --format json || true

      - name: Run validator - all ok
        run: |
          bash secret-rotation-validator.sh \
            --config test/fixtures/all-ok.json \
            --reference-date "$REFERENCE_DATE" \
            --format json

      - name: Run validator - empty secrets
        run: |
          bash secret-rotation-validator.sh \
            --config test/fixtures/empty-secrets.json \
            --reference-date "$REFERENCE_DATE" \
            --format json
