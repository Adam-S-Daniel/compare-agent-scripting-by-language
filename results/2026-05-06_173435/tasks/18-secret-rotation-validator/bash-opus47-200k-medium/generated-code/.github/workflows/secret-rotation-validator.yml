name: Secret Rotation Validator

# Run on every push and PR (so the validator gates merges), and on a daily
# schedule so an unrotated secret eventually flips a red CI even when the
# repo is quiet. Manual dispatch lets operators pick the warning window
# and which fixture to run on demand.
on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '14'
      fixture:
        description: 'Fixture file under tests/fixtures'
        required: false
        default: 'mixed.json'

permissions:
  contents: read

env:
  # Pin the reference date so scheduled runs and ad-hoc runs both agree
  # with the bats fixtures' expected output.
  REPORT_NOW: '2026-05-08'
  # WARNING_DAYS / FIXTURE are intentionally left to runner-level env so
  # callers (workflow_dispatch, or `act --env ...` in tests) can override
  # them; the run steps below provide bash-level defaults.

jobs:
  validate:
    name: Run validator and bats tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies (jq, shellcheck, bats)
        run: |
          set -euo pipefail
          # act containers run as root and may not have `sudo`, while real
          # GitHub runners have sudo but are non-root. Handle both.
          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; fi
          missing=""
          for pkg in jq shellcheck bats; do
            command -v "$pkg" >/dev/null 2>&1 || missing="$missing $pkg"
          done
          if [ -n "$missing" ]; then
            $SUDO apt-get update -y
            # shellcheck disable=SC2086
            $SUDO apt-get install -y --no-install-recommends $missing
          fi
          jq --version
          shellcheck --version | head -n 2
          bats --version

      - name: Lint shell script
        run: |
          bash -n secret-rotation-validator.sh
          shellcheck secret-rotation-validator.sh

      - name: Run bats test suite
        run: bats tests/test_validator.bats

      - name: Generate rotation report (markdown)
        id: report
        run: |
          set -euo pipefail
          : "${FIXTURE:=${{ github.event.inputs.fixture || 'mixed.json' }}}"
          : "${WARNING_DAYS:=${{ github.event.inputs.warning_days || '14' }}}"
          echo "Using fixture=${FIXTURE} warning_days=${WARNING_DAYS} now=${REPORT_NOW}"
          set +e
          ./secret-rotation-validator.sh \
            --config "tests/fixtures/${FIXTURE}" \
            --warning-days "${WARNING_DAYS}" \
            --format markdown \
            --now "${REPORT_NOW}" | tee rotation-report.md
          rc=${PIPESTATUS[0]}
          set -e
          echo "validator_exit=${rc}" >> "$GITHUB_OUTPUT"
          echo "Validator exit code: ${rc}"

      - name: Generate rotation report (json)
        run: |
          set -euo pipefail
          : "${FIXTURE:=${{ github.event.inputs.fixture || 'mixed.json' }}}"
          : "${WARNING_DAYS:=${{ github.event.inputs.warning_days || '14' }}}"
          set +e
          ./secret-rotation-validator.sh \
            --config "tests/fixtures/${FIXTURE}" \
            --warning-days "${WARNING_DAYS}" \
            --format json \
            --now "${REPORT_NOW}" > rotation-report.json
          rc=$?
          set -e
          echo "Validator JSON exit code: ${rc}"
          jq . rotation-report.json

      - name: Print summary counts
        run: |
          set -euo pipefail
          jq -r '"EXPIRED=\(.summary.expired) WARNING=\(.summary.warning) OK=\(.summary.ok)"' \
            rotation-report.json
