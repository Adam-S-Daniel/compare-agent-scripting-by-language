name: Secret Rotation Validator

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'secret-rotation-validator.sh'
      - 'tests/**'
      - '.github/workflows/secret-rotation-validator.yml'
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Path to secret config file'
        required: false
        default: 'tests/fixtures/sample-config.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Secret Rotations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y jq bats

      - name: Validate script syntax
        run: |
          bash -n secret-rotation-validator.sh
          shellcheck secret-rotation-validator.sh || true

      - name: Run unit tests
        run: |
          bats tests/secret-rotation-validator.bats

      - name: Check secret rotation status
        run: |
          CONFIG_FILE="${{ inputs.config_file || 'tests/fixtures/sample-config.json' }}"
          if [[ -f "$CONFIG_FILE" ]]; then
            echo "=== Secret Rotation Status ==="
            ./secret-rotation-validator.sh \
              --config "$CONFIG_FILE" \
              --warning-days 7 \
              --format markdown
            echo ""
            echo "=== JSON Report ==="
            ./secret-rotation-validator.sh \
              --config "$CONFIG_FILE" \
              --warning-days 7 \
              --format json
          else
            echo "Config file not found: $CONFIG_FILE"
            exit 1
          fi
