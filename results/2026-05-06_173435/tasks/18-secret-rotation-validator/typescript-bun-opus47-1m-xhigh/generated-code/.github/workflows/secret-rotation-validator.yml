name: Secret Rotation Validator

# Runs the validator against the committed fixture on push/PR plus a weekly
# cron sweep so expired secrets get surfaced even when the repo is idle.
# workflow_dispatch lets operators kick off an ad-hoc check.
on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-rotation:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Show environment
        run: |
          bun --version
          node --version

      - name: Validate fixtures exist
        run: |
          if [ ! -f fixtures/secrets.json ]; then
            echo "fixtures/secrets.json is missing — required input for the validator"
            exit 1
          fi
          if [ ! -f validator.ts ]; then
            echo "validator.ts is missing — cannot run validator"
            exit 1
          fi

      - name: Run secret rotation validator
        run: bun run ci-run.ts
