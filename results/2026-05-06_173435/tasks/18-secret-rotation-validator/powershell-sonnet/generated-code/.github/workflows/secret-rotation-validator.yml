name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    # Run every Monday at 08:00 UTC so secrets are checked before the work week
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to secrets config file'
        required: false
        default: 'fixtures/secrets-mixed.json'
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '30'
      format:
        description: 'Output format: markdown or json'
        required: false
        default: 'markdown'

permissions:
  contents: read

jobs:
  validate-secrets:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest
    # Pinned reference date makes CI output deterministic regardless of when the
    # job actually runs — matches the dates baked into the fixture files.
    env:
      REFERENCE_DATE: "2026-05-07"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (idempotent — already present in custom act image)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge '5.0' })) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0

      - name: Run unit and structure tests
        shell: pwsh
        run: |
          Invoke-Pester ./SecretRotationValidator.Tests.ps1 -CI

      - name: Report - Expired secrets only (markdown)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-expired-only.json `
            -Format markdown `
            -ReferenceDateStr $env:REFERENCE_DATE

      - name: Report - Warning secrets only (markdown)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-warning-only.json `
            -Format markdown `
            -ReferenceDateStr $env:REFERENCE_DATE

      - name: Report - OK secrets only (markdown)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-ok-only.json `
            -Format markdown `
            -ReferenceDateStr $env:REFERENCE_DATE

      - name: Report - Mixed secrets (markdown)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-mixed.json `
            -Format markdown `
            -ReferenceDateStr $env:REFERENCE_DATE

      - name: Report - Mixed secrets (JSON)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-mixed.json `
            -Format json `
            -ReferenceDateStr $env:REFERENCE_DATE
