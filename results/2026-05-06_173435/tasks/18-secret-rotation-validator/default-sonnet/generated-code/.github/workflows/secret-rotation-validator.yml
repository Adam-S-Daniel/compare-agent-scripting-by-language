name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    # Run every Monday at 08:00 UTC to catch expiring secrets early
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip3 install pytest pyyaml --break-system-packages

      - name: Run unit and structure tests
        run: pytest test_secret_rotation.py -v

      - name: Run secret rotation validator
        run: |
          # Use secrets-config.json if present; fall back to the mixed fixture.
          CONFIG="secrets-config.json"
          if [ ! -f "$CONFIG" ]; then
            CONFIG="fixtures/mixed_case.json"
            echo "secrets-config.json not found, using default fixture: $CONFIG"
          fi
          python3 secret_rotation_validator.py \
            --config "$CONFIG" \
            --format json \
            --reference-date 2024-03-15

      - name: Run validator in markdown format
        run: |
          CONFIG="secrets-config.json"
          if [ ! -f "$CONFIG" ]; then
            CONFIG="fixtures/mixed_case.json"
          fi
          python3 secret_rotation_validator.py \
            --config "$CONFIG" \
            --format markdown \
            --reference-date 2024-03-15
