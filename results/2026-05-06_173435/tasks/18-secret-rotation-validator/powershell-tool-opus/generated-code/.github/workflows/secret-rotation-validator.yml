name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '14'
      output_format:
        description: 'Output format (json or markdown)'
        required: false
        default: 'json'

permissions:
  contents: read

env:
  WARNING_DAYS: '14'
  OUTPUT_FORMAT: 'json'
  REFERENCE_DATE: '2026-05-07'

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $results = Invoke-Pester -Path ./SecretRotationValidator.Tests.ps1 -Output Detailed -PassThru
          if ($results.FailedCount -gt 0) {
            throw "$($results.FailedCount) test(s) failed"
          }

      - name: Run Secret Rotation Validator - JSON
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1
          $warningDays = [int]$env:WARNING_DAYS
          $refDate = [datetime]$env:REFERENCE_DATE
          $report = Invoke-SecretRotationValidator `
            -ConfigPath './fixtures/secrets.json' `
            -ReferenceDate $refDate `
            -WarningDays $warningDays `
            -Format 'json'
          Write-Output "::group::JSON Report"
          Write-Output $report
          Write-Output "::endgroup::"
          $parsed = $report | ConvertFrom-Json
          Write-Output "SUMMARY: total=$($parsed.summary.total) expired=$($parsed.summary.expired) warning=$($parsed.summary.warning) ok=$($parsed.summary.ok)"

      - name: Run Secret Rotation Validator - Markdown
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1
          $warningDays = [int]$env:WARNING_DAYS
          $refDate = [datetime]$env:REFERENCE_DATE
          $report = Invoke-SecretRotationValidator `
            -ConfigPath './fixtures/secrets.json' `
            -ReferenceDate $refDate `
            -WarningDays $warningDays `
            -Format 'markdown'
          Write-Output "::group::Markdown Report"
          Write-Output $report
          Write-Output "::endgroup::"
