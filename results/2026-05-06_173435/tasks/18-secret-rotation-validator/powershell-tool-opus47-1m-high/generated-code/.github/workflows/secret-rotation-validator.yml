name: Secret Rotation Validator

# push/PR catches changes to the script or config; the daily cron means an
# unrotated secret eventually trips an alert without code churn;
# workflow_dispatch lets operators force-run with a tighter warning window.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      warning_window_days:
        description: 'Days before expiry to flag as "warning"'
        required: false
        default: '14'

permissions:
  contents: read

env:
  CONFIG_PATH: secrets.json
  WARNING_WINDOW_DAYS: ${{ github.event.inputs.warning_window_days || '14' }}

jobs:
  test:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        shell: pwsh
        run: |
          $today = if (Test-Path 'today.txt') {
              (Get-Content -Raw 'today.txt').Trim()
          } else {
              ''
          }
          Write-Host "ConfigPath        : $env:CONFIG_PATH"
          Write-Host "WarningWindowDays : $env:WARNING_WINDOW_DAYS"
          Write-Host "Today             : $(if ($today) { $today } else { '(default: now)' })"

      - name: Markdown report
        shell: pwsh
        run: |
          $params = @{
            ConfigPath        = $env:CONFIG_PATH
            WarningWindowDays = [int]$env:WARNING_WINDOW_DAYS
            Format            = 'markdown'
          }
          if (Test-Path 'today.txt') {
            $params['Today'] = (Get-Content -Raw 'today.txt').Trim()
          }
          ./Invoke-SecretRotationValidator.ps1 @params

      - name: JSON report
        shell: pwsh
        run: |
          $params = @{
            ConfigPath        = $env:CONFIG_PATH
            WarningWindowDays = [int]$env:WARNING_WINDOW_DAYS
            Format            = 'json'
          }
          if (Test-Path 'today.txt') {
            $params['Today'] = (Get-Content -Raw 'today.txt').Trim()
          }
          $json = ./Invoke-SecretRotationValidator.ps1 @params
          $json
          # Emit a single, machine-readable line that the act harness greps to
          # assert exact expected values per fixture.
          $report = $json | ConvertFrom-Json
          Write-Host ("SUMMARY total={0} expired={1} warning={2} ok={3}" -f `
            $report.summary.total, $report.summary.expired, `
            $report.summary.warning, $report.summary.ok)
          # Echo names so the harness can verify which secret landed where.
          $expiredNames = ($report.expired | ForEach-Object name) -join ','
          $warningNames = ($report.warning | ForEach-Object name) -join ','
          $okNames      = ($report.ok      | ForEach-Object name) -join ','
          Write-Host "EXPIRED_NAMES=$expiredNames"
          Write-Host "WARNING_NAMES=$warningNames"
          Write-Host "OK_NAMES=$okNames"
