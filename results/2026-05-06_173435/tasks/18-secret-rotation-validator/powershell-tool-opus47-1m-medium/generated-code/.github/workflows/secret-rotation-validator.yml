name: secret-rotation-validator

# The validator runs:
#   - on every push / PR (catch regressions)
#   - on a weekly schedule (Mondays 08:00 UTC) so a secret that rolls into
#     the warning window between commits still gets surfaced
#   - on demand via workflow_dispatch
on:
  push:
  pull_request:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      warningDays:
        description: 'Days before expiry to start warning'
        required: false
        default: '14'

permissions:
  contents: read

env:
  PESTER_VERSION: '5.7.1'

jobs:
  test:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './SecretRotationValidator.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  validate:
    name: Run secret rotation validator
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show harness config
        shell: pwsh
        run: Get-Content -Raw ./harness.config.json

      - name: Validate secrets (JSON report)
        shell: pwsh
        run: |
          $h = Get-Content -Raw ./harness.config.json | ConvertFrom-Json
          Write-Host "=== BEGIN VALIDATOR JSON ==="
          ./Invoke-Validator.ps1 `
            -ConfigPath $h.configPath `
            -WarningDays $h.warningDays `
            -AsOfDate $h.asOfDate `
            -Format json
          Write-Host "=== END VALIDATOR JSON ==="

      - name: Validate secrets (Markdown report)
        shell: pwsh
        run: |
          $h = Get-Content -Raw ./harness.config.json | ConvertFrom-Json
          Write-Host "=== BEGIN VALIDATOR MARKDOWN ==="
          ./Invoke-Validator.ps1 `
            -ConfigPath $h.configPath `
            -WarningDays $h.warningDays `
            -AsOfDate $h.asOfDate `
            -Format markdown
          Write-Host "=== END VALIDATOR MARKDOWN ==="
