name: Secret Rotation Validator

# Triggers:
#   - push / pull_request: validate the committed secrets.json on every change
#   - schedule:            re-validate weekly so passing time alone surfaces drift
#   - workflow_dispatch:   on-demand run with overrideable inputs
on:
  push:
  pull_request:
  schedule:
    # 08:00 UTC every Monday
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      config-path:
        description: 'Path to the secrets config JSON'
        required: false
        default: 'secrets.json'
      format:
        description: "Output format ('markdown' or 'json')"
        required: false
        default: ''
      warning-days:
        description: 'Override warning window (days). Empty = use config.'
        required: false
        default: ''
      fail-on-expired:
        description: 'Fail the workflow if any secret is expired'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    env:
      CONFIG_PATH: ${{ github.event.inputs.config-path || 'secrets.json' }}
      OUTPUT_FORMAT: ${{ github.event.inputs.format || '' }}
      WARNING_DAYS: ${{ github.event.inputs.warning-days || '' }}
      FAIL_ON_EXPIRED: ${{ github.event.inputs.fail-on-expired || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify PowerShell is available
        shell: bash
        run: |
          set -e
          if ! command -v pwsh >/dev/null 2>&1; then
            echo "PowerShell (pwsh) is not installed in this runner; aborting." >&2
            exit 1
          fi
          pwsh --version

      - name: Run secret rotation validator
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $configPath = $env:CONFIG_PATH
          if (-not (Test-Path -LiteralPath $configPath)) {
              throw "Config file '$configPath' not found in repo"
          }

          # Build splat from env-driven inputs so empty overrides cleanly fall back
          # to the values inside the config file itself.
          $invokeArgs = @{ ConfigPath = $configPath }
          if ($env:OUTPUT_FORMAT) { $invokeArgs['Format'] = $env:OUTPUT_FORMAT }
          if ($env:WARNING_DAYS)  { $invokeArgs['WarningDays'] = [int]$env:WARNING_DAYS }
          if ($env:FAIL_ON_EXPIRED -eq 'true') { $invokeArgs['FailOnExpired'] = $true }

          # Tee output so the human-readable report shows in CI logs AND lands in
          # a file we can post-process for the test harness in the next step.
          & ./Invoke-SecretRotationValidator.ps1 @invokeArgs | Tee-Object -FilePath ./rotation-report.log
          $rc = $LASTEXITCODE
          if ($null -ne $rc -and $rc -ne 0) { exit $rc }

      - name: Emit report digest for test harness
        shell: pwsh
        run: |
          # Strip the script's sentinels and base64-encode the report body. A
          # single-line emission keeps the report immune to any per-line prefix
          # the CI log renderer adds, so the harness can pull an exact byte-for-
          # byte copy back out.
          $raw = Get-Content -LiteralPath ./rotation-report.log -Raw
          if (-not $raw) { throw "rotation-report.log is empty" }

          $body = $raw -replace '(?s).*?::ROTATION_REPORT_BEGIN::\r?\n', ''
          $body = $body -replace '\r?\n::ROTATION_REPORT_END::.*', ''
          $body = $body.TrimEnd("`r", "`n")

          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          $b64 = [Convert]::ToBase64String($bytes)
          Write-Output "::ROTATION_REPORT_B64::${b64}::"
