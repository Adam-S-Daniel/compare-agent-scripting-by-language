name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      config_file:
        description: "Path to secrets config JSON file"
        default: "fixtures/config-mixed.json"
      warning_window_days:
        description: "Days before expiry to warn"
        default: "14"
      output_format:
        description: "Output format: markdown or json"
        default: "markdown"
      reference_date:
        description: "Reference date for testing (yyyy-MM-dd), defaults to today"
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -ge '5.0')) {
            Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          }
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run unit tests (excluding act integration)
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $config = [PesterConfiguration]::Default
          $config.Run.Path = "./tests/SecretRotationValidator.Tests.ps1"
          $config.Run.Exit = $true
          $config.Output.Verbosity = "Detailed"
          # Exclude act integration tests to avoid recursive act invocation in CI
          $config.Filter.ExcludeTag = @("ActIntegration")
          Invoke-Pester -Configuration $config

  validate:
    name: Run Secret Rotation Validator
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester | Where-Object Version -ge '5.0')) {
            Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          }

      - name: Determine configuration
        shell: pwsh
        run: |
          # Resolve config: env vars from act harness take precedence, then defaults.
          # workflow_dispatch inputs are available via env vars prefixed with INPUT_.
          $configFile   = if ($env:INPUT_CONFIG_FILE)          { $env:INPUT_CONFIG_FILE }          else { 'fixtures/config-mixed.json' }
          $warningDays  = if ($env:INPUT_WARNING_WINDOW_DAYS)  { $env:INPUT_WARNING_WINDOW_DAYS }  else { '14' }
          $outputFormat = if ($env:INPUT_OUTPUT_FORMAT)        { $env:INPUT_OUTPUT_FORMAT }        else { 'markdown' }
          $refDate      = if ($env:INPUT_REFERENCE_DATE)       { $env:INPUT_REFERENCE_DATE }       else { '' }

          "CONFIG_FILE=$configFile"      | Out-File -Append $env:GITHUB_ENV
          "WARNING_DAYS=$warningDays"    | Out-File -Append $env:GITHUB_ENV
          "OUTPUT_FORMAT=$outputFormat"  | Out-File -Append $env:GITHUB_ENV
          "REFERENCE_DATE=$refDate"      | Out-File -Append $env:GITHUB_ENV

          Write-Host "Config: $configFile | Warning window: $warningDays days | Format: $outputFormat | Date: $refDate"

      - name: Run Secret Rotation Validator
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1

          $params = @{
            ConfigPath        = $env:CONFIG_FILE
            WarningWindowDays = [int]$env:WARNING_DAYS
            OutputFormat      = $env:OUTPUT_FORMAT
          }
          if ($env:REFERENCE_DATE) {
            $params.CurrentDate = [datetime]$env:REFERENCE_DATE
          }

          Write-Host "=== Secret Rotation Report ==="
          $report = Invoke-SecretRotationValidator @params
          Write-Host $report
          Write-Host "=== End Report ==="

      - name: Run validator with JSON output
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1

          $params = @{
            ConfigPath        = $env:CONFIG_FILE
            WarningWindowDays = [int]$env:WARNING_DAYS
            OutputFormat      = "json"
          }
          if ($env:REFERENCE_DATE) {
            $params.CurrentDate = [datetime]$env:REFERENCE_DATE
          }

          Write-Host "=== JSON Report ==="
          $jsonReport = Invoke-SecretRotationValidator @params
          Write-Host $jsonReport
          Write-Host "=== End JSON Report ==="

          # Validate the JSON is parseable
          $parsed = $jsonReport | ConvertFrom-Json
          Write-Host "Total secrets: $($parsed.summary.total)"
          Write-Host "Expired: $($parsed.summary.total_expired)"
          Write-Host "Warning: $($parsed.summary.total_warning)"
          Write-Host "OK: $($parsed.summary.total_ok)"
