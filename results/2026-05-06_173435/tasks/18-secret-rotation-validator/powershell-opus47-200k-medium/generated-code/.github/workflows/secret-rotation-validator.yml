name: Secret Rotation Validator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      warning_days:
        description: Days before expiry to start warning
        required: false
        default: '14'
      format:
        description: Output format (markdown or json)
        required: false
        default: 'markdown'
      today:
        description: Override "today" (yyyy-MM-dd) for deterministic runs
        required: false
        default: '2026-05-08'
  schedule:
    # Daily at 06:00 UTC: catch newly-expired secrets without a push.
    - cron: '0 6 * * *'

permissions:
  contents: read

env:
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
  REPORT_FORMAT: ${{ github.event.inputs.format    || 'markdown' }}
  TODAY:         ${{ github.event.inputs.today     || '2026-05-08' }}
  CONFIG_PATH:   fixtures/secrets.json

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = '.'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  validate-secrets:
    name: Validate secret rotation
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run rotation validator
        id: validate
        shell: pwsh
        # Don't fail the job on non-zero from the script; we want to print and
        # surface the exit code in our own assertions.
        continue-on-error: true
        run: |
          Write-Host "::group::Rotation report"
          & ./Invoke-Validator.ps1 `
              -ConfigPath $env:CONFIG_PATH `
              -WarningDays ([int]$env:WARNING_DAYS) `
              -Format $env:REPORT_FORMAT `
              -Today $env:TODAY
          $code = $LASTEXITCODE
          Write-Host "::endgroup::"
          Write-Host "validator exit code: $code"
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Summarize
        shell: pwsh
        run: |
          $code = [int]'${{ steps.validate.outputs.exit_code }}'
          switch ($code) {
            0 { Write-Host 'All secrets are within policy.' }
            1 { Write-Host 'Warnings present (no expired).' }
            2 { Write-Host 'Expired secrets detected.' }
            default { Write-Host "Validator error (exit $code)." }
          }
