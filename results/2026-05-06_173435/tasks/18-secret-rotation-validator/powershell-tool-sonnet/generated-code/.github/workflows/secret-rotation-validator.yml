name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]"5.0" })) {
            Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0

      - name: Run unit tests
        shell: pwsh
        run: |
          $result = Invoke-Pester ./SecretRotationValidator.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Error "Tests failed: $($result.FailedCount) test(s) failed"
            exit 1
          }
          Write-Output "All tests passed: $($result.PassedCount)"

  validate:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]"5.0" })) {
            Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }

      - name: Run validator - Markdown output
        shell: pwsh
        run: |
          $output = ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/secrets-standard.json `
            -ReferenceDate "2024-06-01" -WarningWindowDays 30 -OutputFormat Markdown
          Write-Output $output

      - name: Run validator - JSON output with assertions
        shell: pwsh
        run: |
          $output = ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/secrets-standard.json `
            -ReferenceDate "2024-06-01" -WarningWindowDays 30 -OutputFormat JSON
          Write-Output $output

          $parsed = $output | ConvertFrom-Json
          Write-Output "Expired count: $($parsed.Expired.Count)"
          Write-Output "Warning count: $($parsed.Warning.Count)"
          Write-Output "OK count: $($parsed.Ok.Count)"
          Write-Output "Expired secret: $($parsed.Expired[0].Name)"
          Write-Output "Warning secret: $($parsed.Warning[0].Name)"
          Write-Output "OK secret: $($parsed.Ok[0].Name)"

          if ($parsed.Expired.Count -ne 1) { throw "Expected 1 expired secret, got $($parsed.Expired.Count)" }
          if ($parsed.Warning.Count -ne 1) { throw "Expected 1 warning secret, got $($parsed.Warning.Count)" }
          if ($parsed.Ok.Count      -ne 1) { throw "Expected 1 ok secret, got $($parsed.Ok.Count)" }
          if ($parsed.Expired[0].Name -ne "DB_PASSWORD") { throw "Expected expired secret DB_PASSWORD" }
          if ($parsed.Warning[0].Name -ne "API_KEY")     { throw "Expected warning secret API_KEY" }
          if ($parsed.Ok[0].Name      -ne "JWT_SECRET")  { throw "Expected ok secret JWT_SECRET" }
          Write-Output "All assertions passed"
