name: Secret Rotation Validator

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Invoke-SecretRotationValidator.ps1'
      - 'Validate-SecretRotation.ps1'
      - 'Test-*.ps1'
      - 'fixtures/**'
      - '.github/workflows/secret-rotation-validator.yml'
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PowerShell (if needed)
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            apt-get update
            apt-get install -y pwsh
          fi

      - name: Run unit tests with Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          Invoke-Pester -Path Test-SecretRotationValidator.ps1 -Output Detailed -PassThru | `
            Where-Object { $_.Result -eq 'Failed' } | `
            ForEach-Object { throw $_ }

  validate-healthy-secrets:
    name: Validate Healthy Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run validator on healthy secrets
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $result = & ./Validate-SecretRotation.ps1 -ConfigPath fixtures/healthy-secrets.json -OutputFormat markdown
          Write-Host $result

          # Verify output contains healthy status
          if ($result -notmatch 'Healthy Secrets') {
            throw 'Expected "Healthy Secrets" section in output'
          }

  validate-mixed-secrets:
    name: Validate Mixed Secrets (Expired, Warning, OK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run validator on mixed secrets
        continue-on-error: true
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          $result = & ./Validate-SecretRotation.ps1 -ConfigPath fixtures/mixed-secrets.json -OutputFormat markdown
          $exitCode = $LASTEXITCODE
          Write-Host $result

          # Verify output contains all categories
          if ($result -notmatch 'Expired Secrets') {
            Write-Error 'Expected "Expired Secrets" section in output'
            exit 1
          }
          if ($result -notmatch 'Healthy Secrets') {
            Write-Error 'Expected "Healthy Secrets" section in output'
            exit 1
          }

          # Verify specific secrets are present
          if ($result -notmatch 'expired-db-password') {
            Write-Error 'Expected expired-db-password in output'
            exit 1
          }

          # Expect exit code 1 due to expired secrets
          if ($exitCode -ne 1) {
            Write-Error "Expected exit code 1 (expired secrets present), got $exitCode"
            exit 1
          }

          # All checks passed
          exit 0

  validate-json-output:
    name: Validate JSON Output Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run validator with JSON output
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          Write-Host "Running validator with JSON output..."
          $jsonOutput = & ./Validate-SecretRotation.ps1 -ConfigPath fixtures/healthy-secrets.json -OutputFormat json
          $jsonOutputStr = $jsonOutput | Out-String
          Write-Host "Raw JSON output: $jsonOutputStr"

          # Verify valid JSON
          try {
            $parsed = $jsonOutputStr | ConvertFrom-Json
            Write-Host "JSON parsed successfully"
          } catch {
            Write-Host "Parse error: $_"
            throw "Failed to parse JSON output: $_"
          }

          if ($null -eq $parsed) {
            throw 'Parsed JSON is null'
          }

          # Verify expected properties
          if ($null -eq $parsed.ok) {
            throw 'Expected "ok" property in JSON output'
          }
          Write-Host "Found $($parsed.ok.Count) healthy secrets"
          if ($parsed.ok.Count -ne 3) {
            throw "Expected 3 healthy secrets, got $($parsed.ok.Count)"
          }
          Write-Host "JSON validation passed"
