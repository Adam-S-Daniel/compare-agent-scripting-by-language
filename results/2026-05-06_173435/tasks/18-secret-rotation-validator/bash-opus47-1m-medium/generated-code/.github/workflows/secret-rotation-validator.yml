name: Secret Rotation Validator

# Triggers: PR/push validate the inventory; weekly cron acts as a recurring
# audit; workflow_dispatch lets an operator run an ad-hoc check.
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Warning window in days"
        required: false
        default: "14"
  schedule:
    - cron: '0 9 * * 1'  # Mondays 09:00 UTC

permissions:
  contents: read

jobs:
  validate:
    name: Validate secret rotation inventory
    runs-on: ubuntu-latest
    env:
      # Defaults — overridable per-test via test-params.env in the repo.
      WARNING_DAYS: "14"
      NOW_DATE: "2026-05-07"
      CONFIG_FILE: "secrets.json"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies (jq)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Load test parameters (if present)
        run: |
          if [ -f test-params.env ]; then
            echo "Loading overrides from test-params.env:"
            cat test-params.env
            cat test-params.env >> "$GITHUB_ENV"
          else
            echo "No test-params.env override; using defaults."
          fi

      - name: Verify validator script exists
        run: |
          test -x ./validate-rotation.sh || {
            echo "validate-rotation.sh missing or not executable" >&2
            exit 1
          }
          bash -n ./validate-rotation.sh

      - name: Run validator (markdown report)
        run: |
          ./validate-rotation.sh \
            --config "$CONFIG_FILE" \
            --warning-days "$WARNING_DAYS" \
            --format markdown \
            --now "$NOW_DATE" \
            | tee rotation-report.md
          echo "---END-MARKDOWN---"

      - name: Run validator (JSON report)
        run: |
          ./validate-rotation.sh \
            --config "$CONFIG_FILE" \
            --warning-days "$WARNING_DAYS" \
            --format json \
            --now "$NOW_DATE" \
            | tee rotation-report.json
          echo "---END-JSON---"

      - name: Summarize counts
        run: |
          EXPIRED=$(jq '.expired | length' rotation-report.json)
          WARNING=$(jq '.warning | length' rotation-report.json)
          OK=$(jq '.ok      | length' rotation-report.json)
          echo "ROTATION_SUMMARY expired=$EXPIRED warning=$WARNING ok=$OK"
