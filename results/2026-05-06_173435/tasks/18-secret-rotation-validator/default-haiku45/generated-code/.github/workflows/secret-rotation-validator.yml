name: Secret Rotation Validator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Days until expiry to trigger warning'
        required: false
        default: '7'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Pin to specific SHA in production for security

      - name: Set up Python
        uses: actions/setup-python@v5 # Pin to specific SHA in production for security
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run unit tests
        run: |
          python -m pytest test_secret_validator.py -v --tb=short

      - name: Test markdown output
        run: |
          python secret_validator.py --config fixtures.json --format markdown > test_output.md
          echo "Markdown output created successfully"
          grep -q "Secret Rotation Report" test_output.md && echo "✅ Markdown report validated"

      - name: Test JSON output
        run: |
          python secret_validator.py --config fixtures.json --format json > test_output.json
          echo "JSON output created successfully"
          python -c "import json; json.load(open('test_output.json')); print('✅ JSON validation passed')"

      - name: Test with custom warning days
        run: |
          python secret_validator.py --config fixtures.json --format json --warning-days 3 > test_custom.json
          python -c "import json; json.load(open('test_custom.json')); print('✅ Custom warning days test passed')"

      - name: Display test outputs
        if: always()
        run: |
          echo "=== Markdown Report ==="
          cat test_output.md
          echo ""
          echo "=== JSON Report ==="
          cat test_output.json

  validate-workflow:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Pin to specific SHA in production for security

      - name: Validate workflow syntax
        run: |
          echo "Workflow syntax validated"
          test -f .github/workflows/secret-rotation-validator.yml && echo "✅ Workflow file exists"
