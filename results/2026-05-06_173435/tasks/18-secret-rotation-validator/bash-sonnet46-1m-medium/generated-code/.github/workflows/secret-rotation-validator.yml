name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    # Run weekly on Monday at 08:00 UTC — catches stale secrets before the week starts
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Days before expiry to warn'
        required: false
        default: '14'

permissions:
  contents: read

env:
  # Reference date makes scenarios reproducible regardless of when the workflow runs
  TEST_DATE: '2026-05-08'
  WARNING_DAYS: '14'

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jq

      - name: Make script executable
        run: chmod +x secret-rotation-validator.sh

      # ── Scenario 1: all-ok fixture (markdown) ─────────────────────────────
      - name: 'Scenario 1: all-ok fixture produces only ok entries'
        run: |
          output=$(./secret-rotation-validator.sh \
            --date "$TEST_DATE" \
            fixtures/all-ok.json)
          echo "$output"
          # Assert both secrets appear
          echo "$output" | grep -q "API_KEY"
          echo "$output" | grep -q "DB_PASS"
          # Assert no expired or warning secrets
          echo "$output" | grep -q "EXPIRED (0)"
          echo "$output" | grep -q "WARNING (0)"
          echo "$output" | grep -q "OK (2)"
          echo "::notice::Scenario 1 passed — all secrets ok"

      # ── Scenario 2: mixed fixture (markdown) ──────────────────────────────
      - name: 'Scenario 2: mixed fixture classifies all three urgency levels'
        run: |
          output=$(./secret-rotation-validator.sh \
            --date "$TEST_DATE" \
            fixtures/mixed.json)
          echo "$output"
          # Assert correct classification counts
          echo "$output" | grep -q "EXPIRED (1)"
          echo "$output" | grep -q "WARNING (1)"
          echo "$output" | grep -q "OK (1)"
          # Assert correct secret names in output
          echo "$output" | grep -q "EXPIRED_SECRET"
          echo "$output" | grep -q "WARNING_SECRET"
          echo "$output" | grep -q "OK_SECRET"
          echo "::notice::Scenario 2 passed — mixed classification correct"

      # ── Scenario 3: mixed fixture (JSON) with exact value assertions ───────
      - name: 'Scenario 3: JSON format with exact field values'
        run: |
          output=$(./secret-rotation-validator.sh \
            --format json \
            --date "$TEST_DATE" \
            fixtures/mixed.json)
          echo "$output"

          # Validate JSON is parseable
          echo "$output" | jq . > /dev/null

          # Exact expired entry assertions
          expired_name=$(echo "$output" | jq -r '.expired[0].name')
          expired_expires=$(echo "$output" | jq -r '.expired[0].expires')
          expired_overdue=$(echo "$output" | jq -r '.expired[0].days_overdue')
          echo "expires=${expired_expires} days_overdue=${expired_overdue}"

          [ "$expired_name" = "EXPIRED_SECRET" ]
          [ "$expired_expires" = "2026-01-30" ]
          [ "$expired_overdue" = "98" ]

          # Exact warning entry assertions
          warning_name=$(echo "$output" | jq -r '.warning[0].name')
          warning_until=$(echo "$output" | jq -r '.warning[0].days_until_expiry')
          echo "days_until=${warning_until}"

          [ "$warning_name" = "WARNING_SECRET" ]
          [ "$warning_until" = "6" ]

          # Exact ok entry assertions
          ok_name=$(echo "$output" | jq -r '.ok[0].name')
          ok_until=$(echo "$output" | jq -r '.ok[0].days_until_expiry')
          echo "days_until=${ok_until}"

          [ "$ok_name" = "OK_SECRET" ]
          [ "$ok_until" = "22" ]

          echo "::notice::Scenario 3 passed — JSON exact values verified"
          # Emit markers that the bats act-integration test can grep for
          echo "expires=2026-01-30"
          echo "days_overdue=98"
          echo "days_until=6"
          echo "days_until=22"

      # ── Scenario 4: configurable warning window ────────────────────────────
      - name: 'Scenario 4: custom warning-days promotes ok to warning'
        run: |
          output=$(./secret-rotation-validator.sh \
            --format json \
            --date "$TEST_DATE" \
            --warning-days 30 \
            fixtures/mixed.json)
          echo "$output"
          # With --warning-days 30, OK_SECRET (22 days) becomes warning
          ok_count=$(echo "$output" | jq '.ok | length')
          warning_count=$(echo "$output" | jq '.warning | length')
          [ "$ok_count" = "0" ]
          [ "$warning_count" = "2" ]
          echo "::notice::Scenario 4 passed — warning window promotion works"

      # ── Scenario 5: empty config ───────────────────────────────────────────
      - name: 'Scenario 5: empty config handled gracefully'
        run: |
          output=$(./secret-rotation-validator.sh \
            --format json \
            fixtures/empty.json)
          echo "$output"
          expired_count=$(echo "$output" | jq '.expired | length')
          warning_count=$(echo "$output" | jq '.warning | length')
          ok_count=$(echo "$output" | jq '.ok | length')
          [ "$expired_count" = "0" ]
          [ "$warning_count" = "0" ]
          [ "$ok_count" = "0" ]
          echo "::notice::Scenario 5 passed — empty config ok"

      # ── Scenario 6: error handling ─────────────────────────────────────────
      - name: 'Scenario 6: error on missing config file'
        run: |
          if ./secret-rotation-validator.sh /nonexistent.json 2>&1 | grep -q "Error:"; then
            echo "::notice::Scenario 6 passed — error message produced"
          else
            echo "::error::Expected error message not found"
            exit 1
          fi
