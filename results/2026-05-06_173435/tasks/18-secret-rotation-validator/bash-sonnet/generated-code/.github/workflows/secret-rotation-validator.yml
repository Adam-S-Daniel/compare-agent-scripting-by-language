name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest

    env:
      REFERENCE_DATE: "2024-03-15"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (bats, jq, shellcheck, actionlint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bats jq shellcheck
          ACTIONLINT_VERSION="1.7.7"
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin actionlint

      - name: Verify tool versions
        run: |
          bats --version
          jq --version
          shellcheck --version
          actionlint --version

      - name: Make script executable
        run: chmod +x secret-rotation-validator.sh

      - name: Lint script with shellcheck
        run: shellcheck secret-rotation-validator.sh

      - name: Validate bash syntax
        run: bash -n secret-rotation-validator.sh

      - name: Run bats test suite
        run: bats tests/secret-rotation-validator.bats --tap

      # ── Direct script runs for exact value verification ────────────────────
      # The run-act-tests.sh harness parses these step outputs for exact values.

      - name: Run script - mixed fixture markdown output
        run: |
          echo "=== MIXED FIXTURE MARKDOWN OUTPUT ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --format markdown

      - name: Run script - mixed fixture JSON output
        run: |
          echo "=== MIXED FIXTURE JSON OUTPUT ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --format json

      - name: Run script - expired fixture JSON output
        run: |
          echo "=== EXPIRED FIXTURE JSON OUTPUT ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-expired.json \
            --date "$REFERENCE_DATE" \
            --format json

      - name: Run script - ok fixture JSON output
        run: |
          echo "=== OK FIXTURE JSON OUTPUT ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-ok.json \
            --date "$REFERENCE_DATE" \
            --format json

      - name: Run script - custom warning window
        run: |
          echo "=== CUSTOM WARNING WINDOW (1 day) ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --warning-days 1 \
            --format json

      - name: Verify expired secret exact values
        run: |
          output=$(./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --format json)

          expired_name=$(echo "$output" | jq -r '.notifications.expired[0].name')
          expired_days=$(echo "$output" | jq -r '.notifications.expired[0].days_remaining')
          expired_expires=$(echo "$output" | jq -r '.notifications.expired[0].expires')

          echo "Expired secret name: $expired_name"
          echo "Expired days_remaining: $expired_days"
          echo "Expired expires: $expired_expires"

          [ "$expired_name"    = "EXPIRED_SECRET" ] || { echo "FAIL: name mismatch"; exit 1; }
          [ "$expired_days"    = "-44"            ] || { echo "FAIL: days_remaining mismatch (got $expired_days)"; exit 1; }
          [ "$expired_expires" = "2024-01-31"     ] || { echo "FAIL: expires date mismatch"; exit 1; }
          echo "PASS: Expired secret exact values verified"

      - name: Verify warning secret exact values
        run: |
          output=$(./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --format json)

          warning_name=$(echo "$output" | jq -r '.notifications.warning[0].name')
          warning_days=$(echo "$output" | jq -r '.notifications.warning[0].days_remaining')
          warning_expires=$(echo "$output" | jq -r '.notifications.warning[0].expires')

          echo "Warning secret name: $warning_name"
          echo "Warning days_remaining: $warning_days"
          echo "Warning expires: $warning_expires"

          [ "$warning_name"    = "WARNING_SECRET" ] || { echo "FAIL: name mismatch"; exit 1; }
          [ "$warning_days"    = "2"              ] || { echo "FAIL: days_remaining mismatch"; exit 1; }
          [ "$warning_expires" = "2024-03-17"     ] || { echo "FAIL: expires date mismatch"; exit 1; }
          echo "PASS: Warning secret exact values verified"

      - name: Verify ok secret exact values
        run: |
          output=$(./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --format json)

          ok_name=$(echo "$output" | jq -r '.notifications.ok[0].name')
          ok_days=$(echo "$output" | jq -r '.notifications.ok[0].days_remaining')
          ok_expires=$(echo "$output" | jq -r '.notifications.ok[0].expires')

          echo "OK secret name: $ok_name"
          echo "OK days_remaining: $ok_days"
          echo "OK expires: $ok_expires"

          [ "$ok_name"    = "OK_SECRET"   ] || { echo "FAIL: name mismatch"; exit 1; }
          [ "$ok_days"    = "76"          ] || { echo "FAIL: days_remaining mismatch"; exit 1; }
          [ "$ok_expires" = "2024-05-30"  ] || { echo "FAIL: expires date mismatch"; exit 1; }
          echo "PASS: OK secret exact values verified"

      - name: Verify summary counts
        run: |
          output=$(./secret-rotation-validator.sh \
            --config fixtures/secrets-mixed.json \
            --date "$REFERENCE_DATE" \
            --format json)

          expired=$(echo "$output" | jq -r '.summary.expired')
          warning=$(echo "$output" | jq -r '.summary.warning')
          ok=$(echo "$output" | jq -r '.summary.ok')

          echo "Summary: $expired expired, $warning warning, $ok ok"

          [ "$expired" = "1" ] || { echo "FAIL: expired count mismatch"; exit 1; }
          [ "$warning" = "1" ] || { echo "FAIL: warning count mismatch"; exit 1; }
          [ "$ok"      = "1" ] || { echo "FAIL: ok count mismatch"; exit 1; }
          echo "PASS: Summary counts verified (1 expired, 1 warning, 1 ok)"
