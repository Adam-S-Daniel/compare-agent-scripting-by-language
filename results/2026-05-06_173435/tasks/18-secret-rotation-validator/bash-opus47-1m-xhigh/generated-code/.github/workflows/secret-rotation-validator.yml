name: Secret Rotation Validator

# Triggers cover the day-to-day inner loop (push, pull_request), a daily
# scheduled scan to surface secrets approaching expiry, and manual
# workflow_dispatch for ad-hoc audits. The bats harness exercises this
# workflow via `act push --rm`.
on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIG_FILE: fixture/secrets.txt
  PARAMS_FILE: fixture/params.env

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show fixture inputs
        run: |
          echo "===BEGIN-FIXTURE==="
          echo "config_file=${CONFIG_FILE}"
          echo "params_file=${PARAMS_FILE}"
          echo "--- params ---"
          cat "$PARAMS_FILE"
          echo "--- secrets ---"
          cat "$CONFIG_FILE"
          echo "===END-FIXTURE==="

      - name: Lint validator (bash -n + shellcheck)
        run: |
          bash -n secret-rotation-validator.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck secret-rotation-validator.sh
          else
            echo "shellcheck not present in container; skipping."
          fi

      - name: Load fixture parameters into job env
        # The fixture file is a trusted line-oriented KEY=value document
        # checked into the repo by the bats harness. Appending to
        # GITHUB_ENV exposes NOW and WARNING_DAYS to subsequent steps.
        run: cat "$PARAMS_FILE" >> "$GITHUB_ENV"

      - name: Run validator (markdown report)
        run: |
          echo "===BEGIN-MARKDOWN==="
          bash secret-rotation-validator.sh \
            --config "$CONFIG_FILE" \
            --now "$NOW" \
            --warning-days "$WARNING_DAYS" \
            --format markdown
          echo "===END-MARKDOWN==="

      - name: Run validator (JSON report)
        run: |
          echo "===BEGIN-JSON==="
          bash secret-rotation-validator.sh \
            --config "$CONFIG_FILE" \
            --now "$NOW" \
            --warning-days "$WARNING_DAYS" \
            --format json
          echo "===END-JSON==="

      - name: Validate JSON output is well-formed
        run: |
          json=$(bash secret-rotation-validator.sh \
            --config "$CONFIG_FILE" \
            --now "$NOW" \
            --warning-days "$WARNING_DAYS" \
            --format json)
          printf '%s' "$json" | python3 -m json.tool > /dev/null
          echo "JSON_OUTPUT_VALID=true"
