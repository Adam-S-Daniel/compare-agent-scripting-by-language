name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC — weekly rotation check
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (no-op when already present)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge [version]'5.0' })) {
            Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0

      - name: Run Pester unit tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./tests/SecretRotationValidator.Tests.ps1"
          $config.Output.Verbosity = "Detailed"
          $config.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $config
          Write-Host "PESTER-RESULT: Passed=$($result.PassedCount) Failed=$($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester tests failed: $($result.FailedCount) test(s) failed"
            exit 1
          }

      - name: Generate Markdown rotation report
        shell: pwsh
        run: |
          $report = ./Invoke-SecretRotationValidator.ps1 `
            -ConfigPath "./fixtures/test-secrets.json" `
            -WarningWindowDays 14 `
            -ReferenceDate "2026-05-08" `
            -OutputFormat "markdown"
          Write-Host $report

      - name: Emit structured status lines for assertion
        shell: pwsh
        run: |
          # Run with JSON format so we can extract per-secret status deterministically
          $jsonOutput = ./Invoke-SecretRotationValidator.ps1 `
            -ConfigPath "./fixtures/test-secrets.json" `
            -WarningWindowDays 14 `
            -ReferenceDate "2026-05-08" `
            -OutputFormat "json"
          $rep = $jsonOutput | ConvertFrom-Json
          foreach ($s in $rep.Expired) {
            Write-Host "ROTATION-STATUS: $($s.Name)=Expired($($s.DaysOverdue))"
          }
          foreach ($s in $rep.Warning) {
            Write-Host "ROTATION-STATUS: $($s.Name)=Warning($($s.DaysUntilExpiry))"
          }
          foreach ($s in $rep.OK) {
            Write-Host "ROTATION-STATUS: $($s.Name)=OK($($s.DaysUntilExpiry))"
          }
