name: Secret Rotation Validator

# Triggers:
#   - push / pull_request: gate every change against the rotation policy
#   - schedule: weekly drift check so secrets don't silently age past their window
#   - workflow_dispatch: on-demand manual run
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      warning_window_days:
        description: "Days before expiry that count as 'warning'"
        required: false
        default: "14"

permissions:
  contents: read

# Default to a deterministic clock so the workflow is reproducible under `act`
# and so test harnesses can pin assertions. Override per-job via job env if needed.
env:
  FAKE_NOW: "2026-05-07T00:00:00Z"
  WARNING_WINDOW_DAYS: ${{ github.event.inputs.warning_window_days || '14' }}

jobs:
  validate:
    name: Validate secret rotation status
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Run unit tests
        # Run only the pure-script unit tests inside the workflow. The
        # workflow.test.ts harness drives `act` itself and would recurse.
        run: bun test tests/classify.test.ts tests/format.test.ts tests/cli.test.ts

      - name: Generate JSON report
        id: json
        run: |
          set +e
          bun run src/cli.ts \
            --config secrets.json \
            --warning-window "$WARNING_WINDOW_DAYS" \
            --format json \
            --ignore-expired --ignore-warning > report.json
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "----- BEGIN_REPORT_JSON -----"
          cat report.json
          echo "----- END_REPORT_JSON -----"

      - name: Generate Markdown report
        run: |
          set +e
          bun run src/cli.ts \
            --config secrets.json \
            --warning-window "$WARNING_WINDOW_DAYS" \
            --format markdown \
            --ignore-expired --ignore-warning > report.md
          set -e
          echo "----- BEGIN_REPORT_MD -----"
          cat report.md
          echo "----- END_REPORT_MD -----"

      - name: Emit summary line for harness
        run: |
          expired=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('report.json','utf8')).totals.expired)")
          warning=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('report.json','utf8')).totals.warning)")
          ok=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('report.json','utf8')).totals.ok)")
          echo "ROTATION_SUMMARY expired=$expired warning=$warning ok=$ok"

      - name: Enforce rotation policy
        # Re-run without --ignore flags so the workflow fails when secrets are
        # actually expired or in the warning window. ROTATION_FAIL_ON controls
        # severity ("expired" | "warning" | "none"). Default "none" keeps the
        # default workflow advisory; flip to "expired" or "warning" to gate.
        env:
          ROTATION_FAIL_ON: ${{ vars.ROTATION_FAIL_ON || 'none' }}
        run: |
          case "$ROTATION_FAIL_ON" in
            warning)
              bun run src/cli.ts \
                --config secrets.json \
                --warning-window "$WARNING_WINDOW_DAYS" \
                --format markdown
              ;;
            expired)
              bun run src/cli.ts \
                --config secrets.json \
                --warning-window "$WARNING_WINDOW_DAYS" \
                --format markdown \
                --ignore-warning
              ;;
            none|*)
              echo "ROTATION_FAIL_ON=none — advisory mode, not failing the build."
              bun run src/cli.ts \
                --config secrets.json \
                --warning-window "$WARNING_WINDOW_DAYS" \
                --format markdown \
                --ignore-expired --ignore-warning
              ;;
          esac
