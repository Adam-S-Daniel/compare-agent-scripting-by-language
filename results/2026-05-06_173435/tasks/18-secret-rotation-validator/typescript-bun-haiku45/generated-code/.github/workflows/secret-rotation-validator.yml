name: Secret Rotation Validator

on:
  push:
    branches: [ main, master ]
    paths:
      - 'validator.ts'
      - 'cli.ts'
      - 'secrets-config.json'
      - '.github/workflows/secret-rotation-validator.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'validator.ts'
      - 'cli.ts'
      - 'secrets-config.json'
      - '.github/workflows/secret-rotation-validator.yml'
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    name: Test Suite and Secret Validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run test suite
        run: bun test
        id: run-tests

      - name: Validate secrets (markdown format)
        run: bun run cli.ts secrets-config.json markdown
        id: validate-markdown
        continue-on-error: true

      - name: Validate secrets (JSON format)
        run: bun run cli.ts secrets-config.json json
        id: validate-json
        continue-on-error: true

      - name: Report results
        if: always()
        run: |
          echo "## Secret Rotation Validation Report" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then
            echo "✅ All tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Tests failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ "${{ steps.validate-markdown.outcome }}" = "success" ]; then
            echo "✅ All secrets are within rotation policy" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Some secrets are expired or expiring soon" >> "$GITHUB_STEP_SUMMARY"
          fi
