name: Secret Rotation Validator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-rotation-validator:
    name: Test Secret Rotation Validator
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/powershell:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Force -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          $testFile = Join-Path -Path ${{ github.workspace }} -ChildPath "Test-SecretRotationValidator.ps1"
          $result = Invoke-Pester -Path $testFile -PassThru
          if ($result.FailedCount -gt 0) {
              exit 1
          }

      - name: Validate script execution
        shell: pwsh
        run: |
          $validatorScript = Join-Path -Path ${{ github.workspace }} -ChildPath "SecretRotationValidator.ps1"
          . $validatorScript

          $testConfig = @"
          [
              {
                  "name": "test-secret-1",
                  "lastRotated": "2026-03-01",
                  "rotationPolicyDays": 20,
                  "requiredByServices": ["service-a"]
              },
              {
                  "name": "test-secret-2",
                  "lastRotated": "2026-04-05",
                  "rotationPolicyDays": 30,
                  "requiredByServices": ["service-b", "service-c"]
              }
          ]
          "@

          Write-Output "=== Markdown Report ==="
          $result = Invoke-SecretRotationValidator `
              -ConfigJson $testConfig `
              -ReferenceDate (Get-Date "2026-04-06") `
              -Format "markdown" `
              -WarningDays 5
          Write-Output $result

          Write-Output ""
          Write-Output "=== JSON Report ==="
          $jsonResult = Invoke-SecretRotationValidator `
              -ConfigJson $testConfig `
              -ReferenceDate (Get-Date "2026-04-06") `
              -Format "json" `
              -WarningDays 5
          Write-Output $jsonResult
