name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run validator with mixed config (JSON)
        run: |
          echo "===JSON_MIXED_START==="
          python3 secret_rotation_validator.py \
            --config fixtures/mixed_config.json \
            --format json \
            --reference-date 2026-05-07
          echo "===JSON_MIXED_END==="

      - name: Run validator with mixed config (Markdown)
        run: |
          echo "===MARKDOWN_MIXED_START==="
          python3 secret_rotation_validator.py \
            --config fixtures/mixed_config.json \
            --format markdown \
            --reference-date 2026-05-07
          echo "===MARKDOWN_MIXED_END==="

      - name: Run validator with all-expired config (JSON)
        run: |
          echo "===JSON_EXPIRED_START==="
          python3 secret_rotation_validator.py \
            --config fixtures/all_expired_config.json \
            --format json \
            --reference-date 2026-05-07
          echo "===JSON_EXPIRED_END==="

      - name: Run validator with warning window override
        run: |
          echo "===JSON_OVERRIDE_START==="
          python3 secret_rotation_validator.py \
            --config fixtures/mixed_config.json \
            --format json \
            --reference-date 2026-05-07 \
            --warning-window 20
          echo "===JSON_OVERRIDE_END==="

      - name: Run pytest
        run: python3 -m pytest test_secret_rotation_validator.py -v
