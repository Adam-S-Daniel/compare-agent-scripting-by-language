name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          which unzip || (apt-get update -qq && apt-get install -y -qq unzip)
          curl -fsSL https://bun.sh/install | bash
          echo "${HOME}/.bun/bin" >> "${GITHUB_PATH}"

      - name: Run tests
        run: bun test

      - name: Run validator JSON output
        run: |
          echo "=== JSON_OUTPUT_START ==="
          bun run main.ts --config fixtures/test-secrets.json --format json --reference-date 2026-05-07 --warning-days 14
          echo "=== JSON_OUTPUT_END ==="

      - name: Run validator Markdown output
        run: |
          echo "=== MARKDOWN_OUTPUT_START ==="
          bun run main.ts --config fixtures/test-secrets.json --format markdown --reference-date 2026-05-07 --warning-days 14
          echo "=== MARKDOWN_OUTPUT_END ==="
