name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./SecretRotationValidator.Tests.ps1"
          $config.Output.Verbosity = "Detailed"
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Validate mixed secrets (JSON output)
        shell: pwsh
        run: |
          $output = pwsh -NoProfile -File ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/mixed-secrets.json -OutputFormat json -ReferenceDate '2026-05-07' -WarningDays 7
          $global:LASTEXITCODE = 0
          Write-Output "=== JSON Report ==="
          Write-Output ($output -join "`n")
          $parsed = $output | ConvertFrom-Json
          Write-Output "Total secrets: $($parsed.total_secrets)"
          Write-Output "Expired: $($parsed.summary.expired)"
          Write-Output "Warning: $($parsed.summary.warning)"
          Write-Output "OK: $($parsed.summary.ok)"

      - name: Validate all-ok secrets
        shell: pwsh
        run: |
          $output = & ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/all-ok.json -OutputFormat json -ReferenceDate '2026-05-07' -WarningDays 7
          $parsed = $output | ConvertFrom-Json
          Write-Output "=== All OK Report ==="
          Write-Output "Total: $($parsed.total_secrets), Expired: $($parsed.summary.expired), Warning: $($parsed.summary.warning), OK: $($parsed.summary.ok)"
          if ($parsed.summary.expired -ne 0) { throw "Expected 0 expired secrets" }
          if ($parsed.summary.ok -ne 2) { throw "Expected 2 ok secrets" }

      - name: Validate all-expired secrets (expect failure)
        shell: pwsh
        run: |
          $output = pwsh -NoProfile -File ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/all-expired.json -OutputFormat json -ReferenceDate '2026-05-07' -WarningDays 7
          $exitCode = $LASTEXITCODE
          $global:LASTEXITCODE = 0
          $parsed = $output | ConvertFrom-Json
          Write-Output "=== All Expired Report ==="
          Write-Output "Total: $($parsed.total_secrets), Expired: $($parsed.summary.expired)"
          if ($parsed.summary.expired -ne 2) { throw "Expected 2 expired secrets, got $($parsed.summary.expired)" }
          Write-Output "Exit code was $exitCode (expected 1 for expired secrets)"
          if ($exitCode -ne 1) { throw "Expected exit code 1" }

      - name: Validate markdown output
        shell: pwsh
        run: |
          $output = pwsh -NoProfile -File ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/mixed-secrets.json -OutputFormat markdown -ReferenceDate '2026-05-07' -WarningDays 7
          $global:LASTEXITCODE = 0
          $md = $output -join "`n"
          Write-Output "=== Markdown Report ==="
          Write-Output $md
          if ($md -notmatch '# Secret Rotation Report') { throw "Missing report header" }
          if ($md -notmatch '## Expired Secrets') { throw "Missing expired section" }
          if ($md -notmatch 'DB_PASSWORD') { throw "Missing DB_PASSWORD in report" }

      - name: Validate custom warning window
        shell: pwsh
        run: |
          $output = pwsh -NoProfile -File ./SecretRotationValidator.ps1 -ConfigPath ./fixtures/mixed-secrets.json -OutputFormat json -ReferenceDate '2026-05-07' -WarningDays 30
          $global:LASTEXITCODE = 0
          $parsed = $output | ConvertFrom-Json
          Write-Output "=== Custom Warning Window (30 days) ==="
          Write-Output "Total: $($parsed.total_secrets), Expired: $($parsed.summary.expired), Warning: $($parsed.summary.warning), OK: $($parsed.summary.ok)"
          $nonOk = $parsed.summary.expired + $parsed.summary.warning
          if ($nonOk -lt 2) { throw "Expected at least 2 non-ok secrets with 30-day window, got $nonOk" }
