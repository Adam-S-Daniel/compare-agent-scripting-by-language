name: secret-rotation-validator

# Triggers:
#  - push / pull_request: validate changes to the secrets config or the script
#  - schedule: nightly check so warnings reach humans before secrets expire
#  - workflow_dispatch: manual run with a configurable warning window
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Warning window in days"
        required: false
        default: "7"
      config_path:
        description: "Path to secrets JSON config"
        required: false
        default: "fixtures/mixed.json"

permissions:
  contents: read

# Pin everything via env so the script and tests use the same values.
env:
  CONFIG_PATH: ${{ github.event.inputs.config_path || 'fixtures/mixed.json' }}
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}
  # Deterministic "today" so CI output is stable for assertion-based tests.
  TODAY: "2026-05-01"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v

  validate-secrets:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Markdown report
        id: md_report
        run: |
          set -e
          python validator.py \
            --config "$CONFIG_PATH" \
            --warning-days "$WARNING_DAYS" \
            --today "$TODAY" \
            --format markdown > report.md || RC=$?
          RC=${RC:-0}
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"
          echo "----- markdown report -----"
          cat report.md

      - name: JSON report
        run: |
          set -e
          python validator.py \
            --config "$CONFIG_PATH" \
            --warning-days "$WARNING_DAYS" \
            --today "$TODAY" \
            --format json > report.json || true
          echo "----- json report -----"
          cat report.json

      - name: Summarize
        run: |
          echo "Validator exit code: ${{ steps.md_report.outputs.exit_code }}"
          if [ "${{ steps.md_report.outputs.exit_code }}" = "2" ]; then
            echo "::warning::One or more secrets are EXPIRED"
          fi
