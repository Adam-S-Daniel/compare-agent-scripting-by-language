name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 06:00 UTC so the team gets a fresh expiry report each morning.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Days of headroom before expiry that should be flagged as warning'
        required: false
        default: '7'
      as_of:
        description: 'Override the evaluation date (yyyy-MM-dd). Empty = today.'
        required: false
        default: ''

permissions:
  contents: read

env:
  CONFIG_PATH: secrets.json
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}
  AS_OF: ${{ github.event.inputs.as_of || '' }}

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve evaluation date
        shell: pwsh
        run: |
          # Allow a repo-local .as-of file to pin the evaluation date.
          # Useful for deterministic CI fixtures and reproducible reports.
          if ((-not $env:AS_OF) -and (Test-Path '.as-of')) {
              $asOf = (Get-Content '.as-of' -Raw).Trim()
              "AS_OF=$asOf" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              Write-Host "Using AS_OF=$asOf from .as-of"
          }

      - name: Run validator (markdown report)
        shell: pwsh
        env:
          CONFIG_PATH: ${{ env.CONFIG_PATH }}
          WARNING_DAYS: ${{ env.WARNING_DAYS }}
          AS_OF: ${{ env.AS_OF }}
        run: |
          $params = @{
              ConfigPath  = $env:CONFIG_PATH
              Format      = 'markdown'
              WarningDays = [int]$env:WARNING_DAYS
          }
          if ($env:AS_OF) { $params.AsOf = $env:AS_OF }
          ./src/Invoke-SecretRotationValidator.ps1 @params | Tee-Object -FilePath rotation-report.md
          Write-Host "::notice::Markdown report written to rotation-report.md"

      - name: Run validator (JSON report)
        shell: pwsh
        env:
          CONFIG_PATH: ${{ env.CONFIG_PATH }}
          WARNING_DAYS: ${{ env.WARNING_DAYS }}
          AS_OF: ${{ env.AS_OF }}
        run: |
          $params = @{
              ConfigPath  = $env:CONFIG_PATH
              Format      = 'json'
              WarningDays = [int]$env:WARNING_DAYS
          }
          if ($env:AS_OF) { $params.AsOf = $env:AS_OF }
          ./src/Invoke-SecretRotationValidator.ps1 @params | Tee-Object -FilePath rotation-report.json
          $obj = Get-Content rotation-report.json -Raw | ConvertFrom-Json
          Write-Host "SUMMARY total=$($obj.summary.total) expired=$($obj.summary.expired) warning=$($obj.summary.warning) ok=$($obj.summary.ok)"

      - name: Print grouped notifications
        shell: pwsh
        run: |
          $obj = Get-Content rotation-report.json -Raw | ConvertFrom-Json
          foreach ($s in $obj.expired) { Write-Host "::error title=Expired secret::$($s.name) overdue $($s.days_overdue) day(s)" }
          foreach ($s in $obj.warning) { Write-Host "::warning title=Rotation warning::$($s.name) due in $($s.days_until_due) day(s)" }
          foreach ($s in $obj.ok)      { Write-Host "OK $($s.name) due in $($s.days_until_due) day(s)" }
