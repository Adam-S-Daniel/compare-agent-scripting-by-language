name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run every Monday at 09:00 UTC — useful for catching expiring secrets weekly
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      format:
        description: "Output format (json or markdown)"
        required: false
        default: "json"

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Generate JSON report — output is parsed by the test harness for exact-value assertions
      - name: Run validator (JSON)
        run: bun run main.ts --config secrets-config.json --format json

      # Generate Markdown report — suitable for GitHub Actions Job Summary
      - name: Run validator (Markdown)
        run: bun run main.ts --config secrets-config.json --format markdown

      # Run unit tests (validator logic only); workflow structure / act integration
      # tests are run by the local test harness (workflow.test.ts) outside Docker.
      - name: Run unit tests
        run: bun test validator.test.ts
