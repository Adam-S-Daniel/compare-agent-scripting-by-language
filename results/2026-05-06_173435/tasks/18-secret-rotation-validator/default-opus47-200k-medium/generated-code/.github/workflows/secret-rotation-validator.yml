name: Secret Rotation Validator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      config:
        description: Path to secrets config JSON
        default: fixtures/secrets.json
        required: false
      now:
        description: Reference date (YYYY-MM-DD)
        default: "2026-05-08"
        required: false
      warn_days:
        description: Warning window in days
        default: "7"
        required: false
      fail_on_expired:
        description: Fail the job if any secret is expired
        default: "false"
        required: false
  schedule:
    # Daily at 06:00 UTC — catches secrets that just expired overnight.
    - cron: "0 6 * * *"

permissions:
  contents: read

env:
  CONFIG_PATH: ${{ github.event.inputs.config || 'fixtures/secrets.json' }}
  NOW_DATE: ${{ github.event.inputs.now || '2026-05-08' }}
  WARN_DAYS: ${{ github.event.inputs.warn_days || '7' }}
  FAIL_ON_EXPIRED: ${{ github.event.inputs.fail_on_expired || 'false' }}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pytest
        run: |
          python3 -m pip install --quiet --break-system-packages pytest

      - name: Run pytest
        run: |
          python3 -m pytest -v test_validator.py

  validate:
    name: Validate secrets (${{ matrix.format }})
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        format: [json, markdown]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validator
        id: run
        run: |
          set -euo pipefail
          flags=()
          if [ "${FAIL_ON_EXPIRED}" = "true" ]; then
            flags+=(--fail-on-expired)
          fi
          echo "::group::Validator output (${{ matrix.format }})"
          python3 validator.py \
            --config "${CONFIG_PATH}" \
            --now "${NOW_DATE}" \
            --warn-days "${WARN_DAYS}" \
            --format "${{ matrix.format }}" \
            "${flags[@]}" | tee "report.${{ matrix.format }}"
          echo "::endgroup::"

      - name: Print summary marker
        run: |
          echo "VALIDATOR_RUN_OK format=${{ matrix.format }}"
