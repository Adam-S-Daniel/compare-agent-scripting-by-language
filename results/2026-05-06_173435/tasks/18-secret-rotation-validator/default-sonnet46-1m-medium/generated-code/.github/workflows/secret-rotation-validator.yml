name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    # Run every Monday at 09:00 UTC to catch secrets that expired over the weekend.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days before expiry to warn (default: 14)"
        required: false
        default: "14"
      reference_date:
        description: "Override today's date as YYYY-MM-DD (leave blank for today)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install --break-system-packages pytest pyyaml

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.12"
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Run all tests (validator + workflow structure)
        run: pytest tests/ -v

  report:
    name: Generate Rotation Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up date and warning window
        id: params
        run: |
          REF_DATE="${{ github.event.inputs.reference_date }}"
          if [ -z "$REF_DATE" ]; then
            REF_DATE=$(date +%Y-%m-%d)
          fi
          WARN_DAYS="${{ github.event.inputs.warning_days }}"
          if [ -z "$WARN_DAYS" ]; then
            WARN_DAYS="14"
          fi
          echo "ref_date=$REF_DATE" >> "$GITHUB_OUTPUT"
          echo "warn_days=$WARN_DAYS" >> "$GITHUB_OUTPUT"

      - name: Generate Markdown report
        run: |
          echo "=== Secret Rotation Report (Markdown) ==="
          python3 secret_rotation_validator.py \
            fixtures/secrets_mixed.json \
            --date "${{ steps.params.outputs.ref_date }}" \
            --warning-days "${{ steps.params.outputs.warn_days }}" \
            --format markdown

      - name: Generate JSON report
        run: |
          echo "=== Secret Rotation Report (JSON) ==="
          python3 secret_rotation_validator.py \
            fixtures/secrets_mixed.json \
            --date "${{ steps.params.outputs.ref_date }}" \
            --warning-days "${{ steps.params.outputs.warn_days }}" \
            --format json
