name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/semantic-version-bumper.yml'
      - 'bump-version.ts'
      - 'semantic-version.ts'
      - 'conventional-commits.ts'
      - 'changelog.ts'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      commit_log:
        description: 'Conventional commits (comma-separated)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "${HOME}/.bun/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: bun test

      - name: Test bump with fixture (patch)
        id: bump
        run: |
          # Create test package.json
          cat > package-test.json <<'EOF'
          {
            "name": "test-project",
            "version": "1.0.0"
          }
          EOF

          # Test patch bump
          COMMIT_LOG="fix: resolve bug
          fix(api): improve performance"
          bun bump-version.ts package-test.json -c "$COMMIT_LOG" -o CHANGELOG.test.md 2>&1 | tail -1 > /tmp/version.txt
          NEW_VERSION=$(cat /tmp/version.txt)

          # Set outputs for next jobs
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bump_type=patch" >> "$GITHUB_OUTPUT"

      - name: Verify version file updated
        run: |
          cat package-test.json
          if grep -q "1.0.1" package-test.json; then
            echo "✓ Version correctly bumped to 1.0.1"
          else
            echo "✗ Version bump failed"
            exit 1
          fi

      - name: Verify changelog generated
        run: |
          if [ -f CHANGELOG.test.md ]; then
            echo "✓ Changelog generated"
            cat CHANGELOG.test.md
          else
            echo "✗ Changelog not found"
            exit 1
          fi

  test-minor-bump:
    name: Test Minor Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Test minor bump
        run: |
          cat > package-minor.json <<'EOF'
          {
            "name": "test-project",
            "version": "2.0.0"
          }
          EOF

          COMMIT_LOG="feat: add new feature
          feat(api): add endpoint
          fix: resolve bug"

          bun bump-version.ts package-minor.json -c "$COMMIT_LOG" > /dev/null 2>&1

          if grep -q "2.1.0" package-minor.json; then
            echo "✓ Version correctly bumped to 2.1.0"
          else
            echo "✗ Minor bump failed: expected 2.1.0"
            cat package-minor.json
            exit 1
          fi

  test-major-bump:
    name: Test Major Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Test major bump with breaking change
        run: |
          cat > package-major.json <<'EOF'
          {
            "name": "test-project",
            "version": "1.5.0"
          }
          EOF

          COMMIT_LOG="feat!: redesign API
          feat: add new feature"

          bun bump-version.ts package-major.json -c "$COMMIT_LOG" > /dev/null 2>&1

          if grep -q "2.0.0" package-major.json; then
            echo "✓ Version correctly bumped to 2.0.0"
          else
            echo "✗ Major bump failed: expected 2.0.0"
            cat package-major.json
            exit 1
          fi

  test-version-file:
    name: Test VERSION File Handling
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Test VERSION file
        run: |
          echo "1.0.0" > VERSION

          COMMIT_LOG="feat(core): add core feature"

          bun bump-version.ts VERSION -c "$COMMIT_LOG" > /dev/null 2>&1

          if grep -q "1.1.0" VERSION; then
            echo "✓ VERSION file correctly updated to 1.1.0"
          else
            echo "✗ VERSION file update failed: expected 1.1.0"
            cat VERSION
            exit 1
          fi

  test-workflow-structure:
    name: Validate Workflow Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          if command -v yamllint &> /dev/null; then
            yamllint .github/workflows/semantic-version-bumper.yml
          else
            echo "yamllint not available, skipping YAML validation"
          fi

      - name: Check workflow references correct scripts
        run: |
          # Verify script files exist
          if [ ! -f "bump-version.ts" ]; then
            echo "✗ bump-version.ts not found"
            exit 1
          fi

          if [ ! -f "semantic-version.ts" ]; then
            echo "✗ semantic-version.ts not found"
            exit 1
          fi

          if [ ! -f "conventional-commits.ts" ]; then
            echo "✗ conventional-commits.ts not found"
            exit 1
          fi

          if [ ! -f "changelog.ts" ]; then
            echo "✗ changelog.ts not found"
            exit 1
          fi

          echo "✓ All required script files found"

  report-status:
    name: Report Status
    runs-on: ubuntu-latest
    needs: [version-bump, test-minor-bump, test-major-bump, test-version-file, test-workflow-structure]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.version-bump.result }}" = "success" ] && \
             [ "${{ needs.test-minor-bump.result }}" = "success" ] && \
             [ "${{ needs.test-major-bump.result }}" = "success" ] && \
             [ "${{ needs.test-version-file.result }}" = "success" ] && \
             [ "${{ needs.test-workflow-structure.result }}" = "success" ]; then
            echo "✓ All workflow jobs succeeded"
            exit 0
          else
            echo "✗ One or more workflow jobs failed"
            exit 1
          fi
