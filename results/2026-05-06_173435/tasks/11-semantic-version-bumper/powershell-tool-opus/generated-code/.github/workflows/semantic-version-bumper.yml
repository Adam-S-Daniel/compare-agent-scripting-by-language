name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./Bump-SemanticVersion.Tests.ps1"
          $config.Output.Verbosity = "Detailed"
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

  bump-patch:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup version
        shell: pwsh
        run: |
          Set-Content -Path "VERSION" -Value "1.0.0" -NoNewline

      - name: Bump version (patch)
        shell: pwsh
        run: |
          . ./Bump-SemanticVersion.ps1
          $commits = Get-Content "fixtures/patch-commits.txt" | Where-Object { $_.Trim() -ne '' }
          $result = Invoke-SemanticVersionBump -ProjectPath "." -CommitMessages $commits
          Write-Host "BUMP_TYPE=$($result.BumpType)"
          Write-Host "OLD_VERSION=$($result.OldVersion)"
          Write-Host "NEW_VERSION=$($result.NewVersion)"
          Write-Host "---CHANGELOG---"
          Write-Host $result.Changelog
          Write-Host "---END_CHANGELOG---"

  bump-minor:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup version
        shell: pwsh
        run: |
          Set-Content -Path "VERSION" -Value "1.1.0" -NoNewline

      - name: Bump version (minor)
        shell: pwsh
        run: |
          . ./Bump-SemanticVersion.ps1
          $commits = Get-Content "fixtures/minor-commits.txt" | Where-Object { $_.Trim() -ne '' }
          $result = Invoke-SemanticVersionBump -ProjectPath "." -CommitMessages $commits
          Write-Host "BUMP_TYPE=$($result.BumpType)"
          Write-Host "OLD_VERSION=$($result.OldVersion)"
          Write-Host "NEW_VERSION=$($result.NewVersion)"
          Write-Host "---CHANGELOG---"
          Write-Host $result.Changelog
          Write-Host "---END_CHANGELOG---"

  bump-major:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup version
        shell: pwsh
        run: |
          Set-Content -Path "VERSION" -Value "2.3.1" -NoNewline

      - name: Bump version (major)
        shell: pwsh
        run: |
          . ./Bump-SemanticVersion.ps1
          $commits = Get-Content "fixtures/major-commits.txt" | Where-Object { $_.Trim() -ne '' }
          $result = Invoke-SemanticVersionBump -ProjectPath "." -CommitMessages $commits
          Write-Host "BUMP_TYPE=$($result.BumpType)"
          Write-Host "OLD_VERSION=$($result.OldVersion)"
          Write-Host "NEW_VERSION=$($result.NewVersion)"
          Write-Host "---CHANGELOG---"
          Write-Host $result.Changelog
          Write-Host "---END_CHANGELOG---"
