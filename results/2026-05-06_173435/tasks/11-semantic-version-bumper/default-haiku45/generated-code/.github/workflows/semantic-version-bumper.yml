name: Semantic Version Bumper

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      commits:
        description: 'Commit messages to process'
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --silent

      - name: Verify CLI script
        run: |
          chmod +x ./cli.js
          ./cli.js . > /tmp/cli-test.json
          cat /tmp/cli-test.json
          grep -q '"success": true' /tmp/cli-test.json

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test with feature commit
        env:
          COMMITS: |
            feat(ui): add new dashboard component
            fix: correct navigation styling
        run: |
          chmod +x ./cli.js
          output=$(./cli.js . 2>&1)
          echo "$output"
          version=$(echo "$output" | grep -o '"newVersion": "[^"]*"' | cut -d'"' -f4)
          if [ "$version" != "1.1.0" ]; then
            echo "Expected version 1.1.0, got $version"
            exit 1
          fi

      - name: Test with breaking change commit
        env:
          COMMITS: |
            feat!: redesign authentication system
            BREAKING CHANGE: old login endpoint removed
        run: |
          chmod +x ./cli.js
          output=$(./cli.js . 2>&1)
          echo "$output"
          version=$(echo "$output" | grep -o '"newVersion": "[^"]*"' | cut -d'"' -f4)
          if [ "$version" != "2.0.0" ]; then
            echo "Expected version 2.0.0, got $version"
            exit 1
          fi

      - name: Test with no relevant commits
        env:
          COMMITS: |
            docs: update README
            chore: update dependencies
        run: |
          chmod +x ./cli.js
          output=$(./cli.js . 2>&1)
          echo "$output"
          version=$(echo "$output" | grep -o '"newVersion": "[^"]*"' | cut -d'"' -f4)
          if [ "$version" != "1.0.0" ]; then
            echo "Expected version 1.0.0 (unchanged), got $version"
            exit 1
          fi

  validation:
    name: Workflow Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate workflow with actionlint
        run: |
          # Install actionlint
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          # Validate workflow
          actionlint '.github/workflows/semantic-version-bumper.yml'

      - name: Validate YAML syntax
        run: |
          # Check if YAML is valid
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/semantic-version-bumper.yml'))" && echo "YAML is valid"
