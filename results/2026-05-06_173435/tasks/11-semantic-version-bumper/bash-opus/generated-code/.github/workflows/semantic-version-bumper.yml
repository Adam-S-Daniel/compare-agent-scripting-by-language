name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          if apt-get update -qq; then
            apt-get install -y -qq shellcheck >/dev/null 2>&1
          fi
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh /usr/local
        shell: bash

      - name: Validate script with shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck semver-bump.sh
          else
            echo "shellcheck not available, skipping"
          fi
        shell: bash

      - name: Validate script syntax
        run: bash -n semver-bump.sh
        shell: bash

      - name: Run bats tests
        run: bats test/semver-bump.bats
        shell: bash

  bump:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Demo version bump with fix commits
        run: |
          echo "1.0.0" > VERSION
          bash semver-bump.sh \
            --version-file VERSION \
            --commit-log test/fixtures/commits-fix.txt \
            --changelog CHANGELOG.md
          echo "--- VERSION ---"
          cat VERSION
          echo "--- CHANGELOG ---"
          cat CHANGELOG.md
        shell: bash

      - name: Demo version bump with feat commits
        run: |
          echo "2.3.1" > VERSION
          bash semver-bump.sh \
            --version-file VERSION \
            --commit-log test/fixtures/commits-feat.txt \
            --changelog CHANGELOG.md
          echo "--- VERSION ---"
          cat VERSION
          echo "--- CHANGELOG ---"
          cat CHANGELOG.md
        shell: bash

      - name: Demo version bump with breaking change
        run: |
          echo "1.5.2" > VERSION
          bash semver-bump.sh \
            --version-file VERSION \
            --commit-log test/fixtures/commits-breaking.txt \
            --changelog CHANGELOG.md
          echo "--- VERSION ---"
          cat VERSION
          echo "--- CHANGELOG ---"
          cat CHANGELOG.md
        shell: bash
