name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      commit_fixture:
        description: "Path to commit fixture file (relative to repo root)"
        required: false
        default: "fixtures/patch-commits.txt"
      initial_version:
        description: "Initial version to set before bumping"
        required: false
        default: "1.0.0"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./Bump-Version.Tests.ps1"
          $config.Output.Verbosity = "Detailed"
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

  bump-version:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set initial version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.initial_version }}"
          if ([string]::IsNullOrEmpty($version)) { $version = "1.0.0" }
          Set-Content -Path VERSION -Value $version -NoNewline
          Write-Output "Initial version: $version"

      - name: Determine commit fixture
        shell: pwsh
        run: |
          $fixture = "${{ github.event.inputs.commit_fixture }}"
          if ([string]::IsNullOrEmpty($fixture)) { $fixture = "fixtures/patch-commits.txt" }
          Write-Output "COMMIT_FIXTURE=$fixture" >> $env:GITHUB_ENV
          Write-Output "Using fixture: $fixture"

      - name: Run Version Bumper
        shell: pwsh
        run: |
          $output = & ./Bump-Version.ps1 -VersionFile "VERSION" -CommitLogFile $env:COMMIT_FIXTURE -ChangelogFile "CHANGELOG.md"
          $output | ForEach-Object { Write-Output $_ }
          Write-Output "VERSION_OUTPUT<<EOF" >> $env:GITHUB_ENV
          $output | ForEach-Object { Write-Output $_ >> $env:GITHUB_ENV }
          Write-Output "EOF" >> $env:GITHUB_ENV

      - name: Display Results
        shell: pwsh
        run: |
          Write-Output "=== VERSION FILE ==="
          Get-Content VERSION -Raw
          Write-Output ""
          Write-Output "=== CHANGELOG ==="
          if (Test-Path CHANGELOG.md) { Get-Content CHANGELOG.md -Raw }
