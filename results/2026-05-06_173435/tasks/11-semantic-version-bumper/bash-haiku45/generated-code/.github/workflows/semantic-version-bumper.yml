name: Semantic Version Bumper CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - 'semantic-version-bumper.sh'
      - 'semantic-version-bumper.bats'
      - '.github/workflows/semantic-version-bumper.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'semantic-version-bumper.sh'
      - 'semantic-version-bumper.bats'
      - '.github/workflows/semantic-version-bumper.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y npm
          npm install -g bats
          apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck semantic-version-bumper.sh
        continue-on-error: false

      - name: Run syntax validation
        run: bash -n semantic-version-bumper.sh

      - name: Run bats tests
        run: bats semantic-version-bumper.bats

  demo:
    name: Demonstrate Functionality
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Setup test environment
        run: |
          mkdir -p test-demo
          cd test-demo
          git init
          git config user.email "ci@example.com"
          git config user.name "CI Bot"

      - name: Create initial package.json
        run: |
          cat > test-demo/package.json <<'EOF'
          {
            "name": "demo-project",
            "version": "1.0.0"
          }
          EOF

      - name: Create initial commit
        run: |
          cd test-demo
          git add package.json
          git commit -m "Initial version 1.0.0"

      - name: Add feature commit
        run: |
          cd test-demo
          echo "new feature" >> README.md
          git add README.md
          git commit -m "feat: add new feature"

      - name: Parse current version
        run: |
          current_version=$("$GITHUB_WORKSPACE/semantic-version-bumper.sh" --parse-version test-demo/package.json)
          echo "Current version: $current_version"
          echo "CURRENT_VERSION=$current_version" >> "$GITHUB_ENV"

      - name: Determine next version
        run: |
          cd test-demo
          next_version=$("$GITHUB_WORKSPACE/semantic-version-bumper.sh" --determine-next-version "${{ env.CURRENT_VERSION }}")
          echo "Next version: $next_version"
          echo "NEXT_VERSION=$next_version" >> "$GITHUB_ENV"

      - name: Update version
        run: |
          "$GITHUB_WORKSPACE/semantic-version-bumper.sh" --update-version test-demo/package.json "${{ env.NEXT_VERSION }}"

      - name: Verify version update
        run: |
          updated_version=$("$GITHUB_WORKSPACE/semantic-version-bumper.sh" --parse-version test-demo/package.json)
          echo "Updated version: $updated_version"
          if [ "$updated_version" = "${{ env.NEXT_VERSION }}" ]; then
            echo "✓ Version updated successfully"
          else
            echo "✗ Version update failed"
            exit 1
          fi

      - name: Generate changelog
        run: |
          cd test-demo
          changelog=$("$GITHUB_WORKSPACE/semantic-version-bumper.sh" --generate-changelog 1.0.0 "${{ env.NEXT_VERSION }}")
          echo "Changelog generated:"
          echo "$changelog"

      - name: Output results
        run: |
          echo "==== VERSION BUMP SUMMARY ===="
          echo "Old Version: ${{ env.CURRENT_VERSION }}"
          echo "New Version: ${{ env.NEXT_VERSION }}"
          echo "================================"
