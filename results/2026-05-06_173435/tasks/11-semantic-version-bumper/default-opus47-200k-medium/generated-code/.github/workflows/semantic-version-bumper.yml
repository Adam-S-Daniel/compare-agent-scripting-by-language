name: Semantic Version Bumper

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  bump:
    name: Bump version from conventional commits
    runs-on: ubuntu-latest
    env:
      VERSION_FILE: VERSION
      COMMITS_FILE: commits.log
      CHANGELOG_FILE: CHANGELOG.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show python version
        shell: bash
        run: python3 --version

      - name: Run unit tests
        shell: bash
        run: python3 -m unittest test_bumper.py -v

      - name: Run version bumper
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$VERSION_FILE" ] || [ ! -f "$COMMITS_FILE" ]; then
            echo "Missing $VERSION_FILE or $COMMITS_FILE; nothing to do."
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OLD=$(cat "$VERSION_FILE")
          echo "Old version: $OLD"
          OUT=$(python3 bumper.py \
            --version-file "$VERSION_FILE" \
            --commits-file "$COMMITS_FILE" \
            --changelog "$CHANGELOG_FILE")
          echo "Script output: $OUT"
          NEW=$(cat "$VERSION_FILE")
          echo "New version: $NEW"
          {
            echo "BUMP_RESULT=${OUT}"
            echo "OLD_VERSION=${OLD}"
            echo "NEW_VERSION=${NEW}"
          } >> "$GITHUB_ENV"
          echo "result=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Print summary
        shell: bash
        run: |
          echo "=== BUMP SUMMARY ==="
          echo "OLD_VERSION=${OLD_VERSION:-unknown}"
          echo "NEW_VERSION=${NEW_VERSION:-unknown}"
          echo "BUMP_RESULT=${BUMP_RESULT:-none}"
          if [ -f "$CHANGELOG_FILE" ]; then
            echo "--- CHANGELOG (head) ---"
            head -n 30 "$CHANGELOG_FILE"
          fi
