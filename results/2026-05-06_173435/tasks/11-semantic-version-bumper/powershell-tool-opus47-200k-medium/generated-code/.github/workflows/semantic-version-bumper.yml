name: Semantic Version Bumper

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version_file:
        description: 'Path to the version file (package.json or VERSION)'
        required: false
        default: 'fixture/package.json'
      commits_file:
        description: 'Path to the mock commits file'
        required: false
        default: 'fixture/commits.txt'

permissions:
  contents: read

env:
  VERSION_FILE: fixture/package.json
  COMMITS_FILE: fixture/commits.txt
  CHANGELOG_FILE: fixture/CHANGELOG.md

jobs:
  test:
    name: Run Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './Bump-Version.Tests.ps1'
          $cfg.Run.Throw = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  bump:
    name: Bump version from fixture
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run version bumper on fixture
        id: bump
        shell: pwsh
        run: |
          if (-not (Test-Path $env:VERSION_FILE)) {
            Write-Error "Version file not found: $env:VERSION_FILE"
            exit 1
          }
          if (-not (Test-Path $env:COMMITS_FILE)) {
            Write-Error "Commits file not found: $env:COMMITS_FILE"
            exit 1
          }
          $output = & ./Bump-Version.ps1 `
            -VersionFile $env:VERSION_FILE `
            -CommitsFile $env:COMMITS_FILE `
            -ChangelogFile $env:CHANGELOG_FILE
          $output | ForEach-Object { Write-Host $_ }
          # Surface the parsed values as their own log lines for easy
          # consumption by the test harness.
          $output | Where-Object { $_ -match '^[A-Z_]+=' } | ForEach-Object {
              Write-Host "BUMPER_$_"
          }

      - name: Show updated files
        shell: pwsh
        run: |
          Write-Host '--- package.json ---'
          Get-Content $env:VERSION_FILE
          Write-Host ''
          Write-Host '--- CHANGELOG.md ---'
          if (Test-Path $env:CHANGELOG_FILE) { Get-Content $env:CHANGELOG_FILE }
