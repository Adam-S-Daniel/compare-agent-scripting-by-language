name: Dependency License Checker

# Run on push and PR (so the gate guards every change), on a daily schedule
# (so a newly-published license/CVE breaks a build even without a code change),
# and on manual dispatch (so reviewers can trigger ad-hoc checks).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Default to read-only — the workflow only inspects the repo and prints a
# report; no commits, no comments, no artifacts beyond stdout.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  # Manifest filenames the workflow auto-detects at the repo root.
  MANIFEST_CANDIDATES: "package.json requirements.txt"
  CONFIG_FILE: "config.json"
  LICENSE_DB_FILE: "license_db.json"

jobs:
  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pytest
        run: python3 -m pip install --quiet pytest

      - name: Run unit tests
        run: python3 -m pytest tests/ -v

  license-check:
    name: License compliance check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Detect manifest at repo root
        id: detect
        run: |
          set -euo pipefail
          found=""
          for candidate in $MANIFEST_CANDIDATES; do
            if [ -f "$candidate" ]; then
              found="$candidate"
              break
            fi
          done
          if [ -z "$found" ]; then
            echo "No manifest at repo root (looked for: $MANIFEST_CANDIDATES)" >&2
            exit 1
          fi
          echo "manifest=$found" >> "$GITHUB_OUTPUT"
          echo "Detected manifest: $found"

      - name: Run license checker
        id: check
        env:
          MANIFEST: ${{ steps.detect.outputs.manifest }}
        run: |
          set -uo pipefail
          # Run the checker but do NOT fail the step on non-zero exit — the
          # exit code is captured and reported below so the workflow always
          # finishes and the harness can assert on the printed output.
          set +e
          python3 license_checker.py \
            "$MANIFEST" \
            --config "$CONFIG_FILE" \
            --license-db "$LICENSE_DB_FILE" \
            --format text
          rc=$?
          set -e
          echo "script_exit=$rc" >> "$GITHUB_OUTPUT"
          echo "SCRIPT_EXIT_CODE=$rc"

      - name: Emit JSON report (machine-readable artifact)
        env:
          MANIFEST: ${{ steps.detect.outputs.manifest }}
        run: |
          set +e
          python3 license_checker.py \
            "$MANIFEST" \
            --config "$CONFIG_FILE" \
            --license-db "$LICENSE_DB_FILE" \
            --format json \
            --output report.json
          rc=$?
          set -e
          echo "JSON_EXIT_CODE=$rc"
          echo "----- report.json -----"
          cat report.json
          echo "----- end report.json -----"

      - name: Echo final compliance verdict
        env:
          SCRIPT_EXIT: ${{ steps.check.outputs.script_exit }}
        run: |
          if [ "$SCRIPT_EXIT" = "0" ]; then
            echo "VERDICT: COMPLIANT"
          else
            echo "VERDICT: NON_COMPLIANT (script exit $SCRIPT_EXIT)"
          fi
