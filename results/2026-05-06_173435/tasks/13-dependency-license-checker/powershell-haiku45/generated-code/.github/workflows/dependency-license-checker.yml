name: Dependency License Checker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run License Compliance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create license config
        shell: pwsh
        run: |
          $config = @{
              allowed = @("MIT", "Apache-2.0", "BSD-3-Clause", "ISC")
              denied = @("GPL-3.0", "AGPL-3.0")
          } | ConvertTo-Json
          $config | Set-Content -Path "./license-config.json" -Encoding UTF8

      - name: Run Pester tests
        shell: pwsh
        run: |
          $results = Invoke-Pester -Path "./Check-DependencyLicenses.Tests.ps1" -Output Detailed -PassThru
          if ($results.FailedCount -gt 0) {
              exit 1
          }

      - name: Run license check on package.json
        shell: pwsh
        run: |
          . ./Check-DependencyLicenses.ps1

          $mockLicenses = @{
              "lodash" = "MIT"
              "express" = "MIT"
              "react" = "MIT"
              "jest" = "MIT"
          }

          $config = Get-Content "./license-config.json" | ConvertFrom-Json | ConvertTo-Hashtable
          $deps = Get-Dependencies -ManifestPath "./test-fixtures/simple-package.json"
          $report = New-ComplianceReport -Dependencies $deps -Config $config -MockLicenses $mockLicenses

          Format-ComplianceReport -Report $report

          if ($report.denied.Count -gt 0) {
              Write-Error "Non-compliant dependencies found!"
              exit 1
          }

      - name: Run license check on requirements.txt
        shell: pwsh
        run: |
          . ./Check-DependencyLicenses.ps1

          $mockLicenses = @{
              "requests" = "Apache-2.0"
              "django" = "BSD-3-Clause"
              "flask" = "BSD-3-Clause"
          }

          $config = Get-Content "./license-config.json" | ConvertFrom-Json | ConvertTo-Hashtable
          $deps = Get-Dependencies -ManifestPath "./test-fixtures/requirements.txt"
          $report = New-ComplianceReport -Dependencies $deps -Config $config -MockLicenses $mockLicenses

          Format-ComplianceReport -Report $report

          if ($report.denied.Count -gt 0) {
              Write-Error "Non-compliant dependencies found!"
              exit 1
          }

      - name: Generate compliance report
        shell: pwsh
        if: always()
        run: |
          $reportPath = "compliance-report.txt"
          @"
          # Dependency License Compliance Report

          Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')

          ## Summary
          - All Pester tests passed
          - License compliance check completed for package.json
          - License compliance check completed for requirements.txt

          ## Configuration
          - Allowed: MIT, Apache-2.0, BSD-3-Clause, ISC
          - Denied: GPL-3.0, AGPL-3.0

          ## Test Status
          All tests: PASSED
          "@ | Set-Content -Path $reportPath -Encoding UTF8

          Write-Host "Compliance report generated: $reportPath"
