---
name: Dependency License Checker

# Runs on pushes / PRs and on a weekly cron so we catch newly-added deps that
# violate policy. Also exposes workflow_dispatch so reviewers can run on demand.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # 06:00 UTC every Monday
  workflow_dispatch:
    inputs:
      manifest:
        description: 'Manifest path (relative to repo root)'
        required: false
        default: 'tests/fixtures/package.json'

permissions:
  contents: read

env:
  # Default fixture-based inputs let the job run unattended in CI / act.
  MANIFEST: ${{ github.event.inputs.manifest || 'tests/fixtures/package.json' }}
  CONFIG: tests/fixtures/config.env
  LICENSE_DB: tests/fixtures/licenses.db

jobs:
  license-check:
    name: License compliance scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          bash --version | head -n1
          echo "Manifest: ${MANIFEST}"
          echo "Config:   ${CONFIG}"
          echo "DB:       ${LICENSE_DB}"

      - name: Make script executable
        run: chmod +x check-licenses.sh

      - name: Run license check (allowed to fail; we inspect output)
        id: scan
        # Mirror exit codes through the step but don't abort the job; the
        # report itself is the artifact downstream tests rely on.
        run: |
          set +e
          ./check-licenses.sh "${MANIFEST}" "${CONFIG}" | tee report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          LICENSE_DB: ${{ env.LICENSE_DB }}

      - name: Print report and exit code
        run: |
          echo "----- BEGIN REPORT -----"
          cat report.txt
          echo "----- END REPORT -----"
          echo "scan_exit_code=${{ steps.scan.outputs.exit_code }}"

  workflow-tests:
    name: Run bats tests
    runs-on: ubuntu-latest
    needs: license-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          if ! command -v bats >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq bats
          fi
          bats --version

      - name: Run bats suite
        run: |
          chmod +x check-licenses.sh
          # Only the unit-level bats file runs in CI; tests/workflow.bats
          # invokes act and is meant for the local harness, not nested act.
          bats tests/check_licenses.bats
