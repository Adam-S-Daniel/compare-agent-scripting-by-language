name: Dependency License Checker

# Triggers: regular CI plus a weekly schedule (catches new releases that swap
# their license out from under us) and manual dispatch.
on:
  push:
  pull_request:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:
    inputs:
      manifest_path:
        description: 'Path to manifest file (relative to repo root)'
        required: false
        default: 'fixtures/case1/package.json'

permissions:
  contents: read

# Default fixture and policy paths. The integration test harness overrides
# TEST_MANIFEST_PATH (and TEST_FAIL_ON_VIOLATION) per case via `act --env`.
env:
  CONFIG_PATH:   fixtures/license-config.json
  DATABASE_PATH: fixtures/license-database.json
  REPORT_PATH:   license-report.json

jobs:

  pester-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show pwsh / Pester versions
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          Get-Module -ListAvailable Pester | Select-Object Name, Version

      - name: Run Pester unit tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests/DependencyLicenseChecker.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  license-check:
    name: License compliance check
    runs-on: ubuntu-latest
    needs: pester-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve fixture inputs
        id: resolve
        shell: pwsh
        run: |
          # The harness sets TEST_MANIFEST_PATH per fixture via --env.
          $manifest = $env:TEST_MANIFEST_PATH
          if ([string]::IsNullOrWhiteSpace($manifest)) {
            $manifest = '${{ github.event.inputs.manifest_path }}'
          }
          if ([string]::IsNullOrWhiteSpace($manifest)) {
            $manifest = 'fixtures/case1/package.json'
          }
          Write-Host "Resolved manifest: $manifest"
          "manifest=$manifest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run license compliance check
        shell: pwsh
        env:
          MANIFEST: ${{ steps.resolve.outputs.manifest }}
        run: |
          $manifest = $env:MANIFEST
          $config   = $env:CONFIG_PATH
          $database = $env:DATABASE_PATH
          $report   = $env:REPORT_PATH

          Write-Host "=== Inputs ==="
          Write-Host "manifest=$manifest"
          Write-Host "config=$config"
          Write-Host "database=$database"
          Write-Host "report=$report"

          # Run the entry-point script. It exits non-zero when violations are
          # found; we capture the code and decide whether to fail the step
          # based on TEST_FAIL_ON_VIOLATION (defaults to false so the act
          # harness can verify report content even on Denied/Unknown deps).
          & ./src/Invoke-LicenseCheck.ps1 `
              -ManifestPath $manifest `
              -ConfigPath   $config   `
              -DatabasePath $database `
              -ReportPath   $report
          $rc = $LASTEXITCODE
          Write-Host "license-check-exit-code: $rc"

          $strict = $env:TEST_FAIL_ON_VIOLATION
          if ($strict -eq 'true' -and $rc -ne 0) {
            Write-Host 'Failing build because TEST_FAIL_ON_VIOLATION=true and violations were found.'
            exit 1
          }
          exit 0

      - name: Print generated report
        if: always()
        shell: pwsh
        run: |
          if (Test-Path $env:REPORT_PATH) {
            Write-Host '=== JSON report contents ==='
            Get-Content $env:REPORT_PATH -Raw
          } else {
            Write-Host "No report at $env:REPORT_PATH"
          }
