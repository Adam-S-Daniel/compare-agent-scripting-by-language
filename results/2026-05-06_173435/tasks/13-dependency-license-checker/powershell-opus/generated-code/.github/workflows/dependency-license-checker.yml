name: Dependency License Checker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester unit tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./DependencyLicenseChecker.Tests.ps1"
          $config.Output.Verbosity = "Detailed"
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

  check-packagejson:
    name: Check package.json licenses
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run license check on package.json
        shell: pwsh
        run: |
          ./DependencyLicenseChecker.ps1 -ManifestPath ./fixtures/package.json -ConfigPath ./fixtures/license-config.json

  check-requirements:
    name: Check requirements.txt licenses
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run license check on requirements.txt
        id: reqcheck
        shell: pwsh
        continue-on-error: true
        run: |
          ./DependencyLicenseChecker.ps1 -ManifestPath ./fixtures/requirements.txt -ConfigPath ./fixtures/license-config.json

      - name: Verify denied licenses were detected
        shell: pwsh
        run: |
          if ("${{ steps.reqcheck.outcome }}" -eq "success") {
            Write-Output "ERROR: Expected denied licenses but checker passed"
            exit 1
          }
          Write-Output "Correctly detected denied licenses (checker exited non-zero)"
