name: Dependency License Checker

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/dependency-license-checker.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

jobs:
  test:
    name: Test License Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test

      - name: Run license check on sample project
        run: |
          bun run src/cli.ts \
            --manifest sample-package.json \
            --config sample-config.json \
            --format text

  check-project:
    name: Check Project Dependencies
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check this project's licenses
        run: |
          # Create a config for this project's checks
          cat > project-config.json <<'EOF'
          {
            "allowList": ["MIT", "Apache-2.0", "ISC", "BSD-2-Clause", "BSD-3-Clause"],
            "denyList": ["GPL-2.0", "GPL-3.0", "Proprietary"]
          }
          EOF

          # Run the license checker
          bun run src/cli.ts \
            --manifest package.json \
            --config project-config.json || true
