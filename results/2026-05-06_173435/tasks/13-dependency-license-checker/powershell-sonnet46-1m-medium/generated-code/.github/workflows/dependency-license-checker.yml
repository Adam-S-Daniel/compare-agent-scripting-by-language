name: Dependency License Checker

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-licenses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (no-op when pre-installed)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]"5.0" })) {
            Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          }
          Import-Module Pester

      - name: Run unit tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./tests/Unit.Tests.ps1 -PassThru -Output Normal
          if ($result.FailedCount -gt 0) {
            Write-Error "Unit tests failed: $($result.FailedCount) test(s) failed"
            exit 1
          }
          Write-Output "Unit tests passed: $($result.PassedCount) test(s)"

      - name: Run license compliance check
        shell: pwsh
        run: |
          ./DependencyLicenseChecker.ps1 `
            -ManifestPath    ./fixtures/package.json `
            -ConfigPath      ./config/license-config.json `
            -MockLicensesPath ./fixtures/mock-licenses.json
