name: Dependency License Checker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = "./DependencyLicenseChecker.Tests.ps1"
          $cfg.Output.Verbosity = "Detailed"
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = "test-results.xml"
          $result = Invoke-Pester -Configuration $cfg
          if ($result.FailedCount -gt 0) { exit 1 }

  check-package-json:
    name: Check package.json licenses
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run license check on package.json
        shell: pwsh
        run: |
          ./check-licenses.ps1 -ManifestPath ./fixtures/package.json -ConfigPath ./fixtures/license-config.json
        continue-on-error: true
        id: license_check

      - name: Report result
        shell: pwsh
        run: |
          if ("${{ steps.license_check.outcome }}" -eq "failure") {
            Write-Host "LICENSE_CHECK_RESULT=FAIL"
            Write-Host "::warning::License check found denied dependencies"
          } else {
            Write-Host "LICENSE_CHECK_RESULT=PASS"
          }

  check-requirements-txt:
    name: Check requirements.txt licenses
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run license check on requirements.txt
        shell: pwsh
        run: |
          ./check-licenses.ps1 -ManifestPath ./fixtures/requirements.txt -ConfigPath ./fixtures/license-config.json
        continue-on-error: true
        id: license_check

      - name: Report result
        shell: pwsh
        run: |
          if ("${{ steps.license_check.outcome }}" -eq "failure") {
            Write-Host "LICENSE_CHECK_RESULT=FAIL"
            Write-Host "::warning::License check found denied dependencies"
          } else {
            Write-Host "LICENSE_CHECK_RESULT=PASS"
          }
