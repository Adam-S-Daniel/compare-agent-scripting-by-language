name: Dependency License Checker

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1"   # weekly on Mondays at 06:00 UTC
  workflow_dispatch:
    inputs:
      manifest_file:
        description: "Path to the dependency manifest (relative to repo root)"
        required: false
        default: "fixtures/all-approved-package.json"

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies (bats-core, jq, shellcheck, actionlint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq shellcheck
          # Install actionlint from upstream release
          ACTIONLINT_VER="1.7.4"
          curl -sSLf \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VER}/actionlint_${ACTIONLINT_VER}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin actionlint

      - name: Validate scripts with shellcheck and bash -n
        run: |
          bash -n license-checker.sh
          shellcheck license-checker.sh

      - name: Run bats unit tests
        run: bats tests/license-checker.bats

  license-check:
    name: License Compliance Report
    runs-on: ubuntu-latest
    needs: test
    env:
      LICENSE_CONFIG: fixtures/license-config.json
      MOCK_DB: fixtures/license-mock-db.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Run license checker
        run: |
          MANIFEST="${MANIFEST_FILE:-fixtures/all-approved-package.json}"
          echo "=== Running license checker on: ${MANIFEST} ==="
          ./license-checker.sh \
            --manifest  "${MANIFEST}" \
            --config    "${LICENSE_CONFIG}" \
            --mock-db   "${MOCK_DB}"

      - name: Run license checker on requirements.txt
        run: |
          echo "=== Running license checker on: fixtures/requirements.txt ==="
          ./license-checker.sh \
            --manifest  fixtures/requirements.txt \
            --config    "${LICENSE_CONFIG}" \
            --mock-db   "${MOCK_DB}"
