name: artifact-cleanup-script

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly cleanup, Mondays at 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      config_path:
        description: "Path to cleanup config JSON"
        required: false
        default: "fixtures/cleanup.config.json"

permissions:
  contents: read

env:
  CLEANUP_CONFIG: ${{ github.event.inputs.config_path || 'fixtures/cleanup.config.json' }}

jobs:
  unit-tests:
    name: Unit tests (bun test)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -eo pipefail
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Show Bun version
        run: bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test

  cleanup-plan:
    name: Generate cleanup plan
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -eo pipefail
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run cleanup
        run: bun run src/run-from-config.ts "$CLEANUP_CONFIG"
