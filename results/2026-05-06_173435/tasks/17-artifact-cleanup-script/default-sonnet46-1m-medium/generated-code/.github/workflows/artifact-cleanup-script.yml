name: Artifact Cleanup Script

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run artifact cleanup tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: python3 -m pip install pytest --break-system-packages

      - name: Run tests
        run: python3 -m pytest tests/ -v -s

      - name: Demo script (dry-run)
        run: python3 artifact_cleanup.py --dry-run
