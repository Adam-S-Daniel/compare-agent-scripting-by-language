name: Artifact Cleanup

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Max artifact age in days'
        required: false
        default: '30'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Run unit tests
        run: python -m pytest test_cleanup.py -v

  cleanup-plan:
    name: Run cleanup plan
    needs: unit-tests
    runs-on: ubuntu-latest
    env:
      FIXTURE: ${{ vars.ARTIFACT_FIXTURE || 'fixtures/artifacts.json' }}
      MAX_AGE_DAYS: ${{ vars.MAX_AGE_DAYS || '30' }}
      KEEP_LATEST: ${{ vars.KEEP_LATEST || '2' }}
      MAX_TOTAL_BYTES: ${{ vars.MAX_TOTAL_BYTES || '1000000000' }}
      NOW_OVERRIDE: ${{ vars.NOW_OVERRIDE || '2026-05-07T12:00:00Z' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate cleanup plan (dry-run)
        run: |
          python cleanup.py \
            --input "$FIXTURE" \
            --max-age-days "$MAX_AGE_DAYS" \
            --keep-latest-per-workflow "$KEEP_LATEST" \
            --max-total-size-bytes "$MAX_TOTAL_BYTES" \
            --now "$NOW_OVERRIDE" \
            --dry-run
