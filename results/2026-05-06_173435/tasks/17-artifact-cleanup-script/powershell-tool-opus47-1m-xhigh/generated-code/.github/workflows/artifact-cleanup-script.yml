name: artifact-cleanup-script

# Run the artifact-cleanup script in CI:
#   * on every push and pull-request that might touch the script,
#   * on a daily schedule for the real "clean things up" use case,
#   * and manually via workflow_dispatch with a fixture override.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      fixture:
        description: 'Fixture file path (relative to repo root)'
        required: false
        default: 'fixtures/case1-age.json'

# Read-only by default. The cleanup script does not delete anything in
# GitHub itself (we use mock data), so we don't need any write scopes.
permissions:
  contents: read

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          # Pester is pre-installed in the act-ubuntu-pwsh image.
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests/ArtifactCleanup.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  cleanup-run:
    name: Run cleanup script against fixture
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve fixture path
        shell: pwsh
        run: |
          # Priority: runner-injected FIXTURE_PATH env (used by the act
          # harness to test multiple cases), then workflow_dispatch input,
          # then a sensible default. We promote the resolved value to
          # GITHUB_ENV so subsequent steps see it via $env:FIXTURE_PATH.
          $fixture = $env:FIXTURE_PATH
          if (-not $fixture) { $fixture = '${{ github.event.inputs.fixture }}' }
          if (-not $fixture) { $fixture = 'fixtures/case1-age.json' }
          if (-not (Test-Path -LiteralPath $fixture)) {
            throw "Fixture not found: $fixture"
          }
          "FIXTURE_PATH=$fixture" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Resolved fixture: $fixture"

      - name: Generate cleanup plan
        shell: pwsh
        run: |
          ./Invoke-Cleanup.ps1 -FixturePath $env:FIXTURE_PATH -OutDir ./out

      - name: Verify expected values match plan
        shell: pwsh
        run: |
          # Cross-check: the plan JSON we just wrote must agree with the
          # fixture's `expected` block. Catches drift between the script
          # and its fixtures inside CI in addition to the outer harness.
          $fixture = Get-Content -Raw -LiteralPath $env:FIXTURE_PATH | ConvertFrom-Json
          $plan = Get-Content -Raw -LiteralPath './out/plan.json' | ConvertFrom-Json
          $exp = $fixture.expected
          $checks = @{
            deletedCount        = $plan.deletedCount
            retainedCount       = $plan.retainedCount
            totalReclaimedBytes = $plan.totalReclaimedBytes
            totalRetainedBytes  = $plan.totalRetainedBytes
            dryRun              = $plan.dryRun
          }
          $failed = $false
          foreach ($key in $checks.Keys) {
            $expectedVal = $exp.$key
            $actualVal = $checks[$key]
            if ($expectedVal -ne $actualVal) {
              Write-Host "MISMATCH ${key}: expected=$expectedVal actual=$actualVal"
              $failed = $true
            } else {
              Write-Host "OK ${key}: $actualVal"
            }
          }
          if ($failed) { throw 'Plan does not match fixture.expected' }
          Write-Host 'PLAN_VERIFIED: yes'
