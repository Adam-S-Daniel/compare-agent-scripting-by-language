name: Semantic Version Bumper

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version_file:
        description: Path to version file (relative to repo root)
        required: false
        default: fixtures/package.json
      commits_file:
        description: Path to commits fixture (relative to repo root)
        required: false
        default: fixtures/commits-feat.txt

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION_FILE: ${{ github.event.inputs.version_file }}
      INPUT_COMMITS_FILE: ${{ github.event.inputs.commits_file }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Pester unit tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./SemanticVersionBumper.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Resolve fixture paths
        shell: pwsh
        run: |
          # Precedence: explicit env override (e.g. set by `act --env`) > workflow_dispatch input > default.
          $version = if ($env:VERSION_FILE)            { $env:VERSION_FILE }
                     elseif ($env:INPUT_VERSION_FILE)  { $env:INPUT_VERSION_FILE }
                     else                              { 'fixtures/package.json' }
          $commits = if ($env:COMMITS_FILE)            { $env:COMMITS_FILE }
                     elseif ($env:INPUT_COMMITS_FILE)  { $env:INPUT_COMMITS_FILE }
                     else                              { 'fixtures/commits-feat.txt' }
          "RESOLVED_VERSION_FILE=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RESOLVED_COMMITS_FILE=$commits" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Take a working copy so we don't mutate the source-of-truth fixture in the workspace.
          $workVersion = "work-version$([System.IO.Path]::GetExtension($version))"
          Copy-Item $version $workVersion -Force
          "WORK_VERSION_FILE=$workVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using version file: $version"
          Write-Host "Using commits file: $commits"

      - name: Bump version
        id: bump
        shell: pwsh
        run: |
          $lines = ./bump-version.ps1 `
            -VersionFile $env:WORK_VERSION_FILE `
            -CommitsFile $env:RESOLVED_COMMITS_FILE `
            -ChangelogFile CHANGELOG.md `
            -Date '2026-04-17'
          # Echo the script output to the job log AND export it as step outputs.
          foreach ($line in $lines) {
            Write-Host $line
            if ($line -match '^[A-Z_]+=.+$') {
              $line | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            }
          }

      - name: Show resulting version and changelog
        shell: pwsh
        run: |
          Write-Host "RESULT_PREVIOUS=${{ steps.bump.outputs.PREVIOUS_VERSION }}"
          Write-Host "RESULT_BUMP=${{ steps.bump.outputs.BUMP_TYPE }}"
          Write-Host "RESULT_NEW=${{ steps.bump.outputs.NEW_VERSION }}"
          if (Test-Path CHANGELOG.md) {
            Write-Host '----- CHANGELOG.md -----'
            Get-Content CHANGELOG.md
            Write-Host '----- END CHANGELOG -----'
          }
