name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run tests
        run: python -m pytest test_version_bumper.py -v --tb=short

  bump:
    name: Version bump demo
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create test VERSION file
        run: echo "1.2.3" > VERSION

      - name: Run version bumper with fixture data
        id: bumper
        run: |
          NEW_VERSION=$(python version_bumper.py VERSION fixtures/commits_minor.txt --changelog CHANGELOG.md --date 2026-04-08)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Display results
        run: |
          echo "Bumped version: ${{ steps.bumper.outputs.new_version }}"
          echo "--- VERSION file ---"
          cat VERSION
          echo "--- CHANGELOG.md ---"
          cat CHANGELOG.md
