name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  PESTER_MIN_VERSION: "5.0"

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Pester unit and integration tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './VersionBumper.Tests.ps1'
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.Run.Exit = $true
          Invoke-Pester -Configuration $cfg

  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run version bump
        shell: pwsh
        run: |
          $commitLog = if (Test-Path './commit-log.txt') { './commit-log.txt' } else { '' }
          ./Bump-SemanticVersion.ps1 -VersionFile VERSION -CommitLogFile $commitLog

      - name: Show results
        shell: pwsh
        run: |
          Write-Host "=== VERSION ==="
          Get-Content VERSION
          Write-Host ""
          Write-Host "=== CHANGELOG ==="
          if (Test-Path CHANGELOG.md) { Get-Content CHANGELOG.md }
