name: Environment Matrix Generator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pwsh and Pester are pre-installed in the act-ubuntu-pwsh image (and on
      # real GitHub-hosted runners), but we guard with a no-op install so the
      # workflow is portable to vanilla Ubuntu images too.
      - name: Ensure Pester is available
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester)) {
            Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0
          Write-Host "Pester $(Get-Module Pester | Select-Object -ExpandProperty Version) is ready"

      # Install actionlint into ~/.local/bin and add it to $GITHUB_PATH so
      # subsequent steps (including the Pester test that shells out to actionlint)
      # can find it without a full path.
      - name: Install actionlint
        run: |
          mkdir -p "$HOME/.local/bin"
          if ! command -v actionlint &>/dev/null; then
            curl -sSL \
              https://github.com/rhysd/actionlint/releases/download/v1.7.4/actionlint_1.7.4_linux_amd64.tar.gz \
              | tar -xz -C "$HOME/.local/bin" actionlint
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/actionlint" --version

      - name: Run unit tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path       = './New-BuildMatrix.Tests.ps1'
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.Run.Exit       = $true
          # Exclude workflow/act tests from the in-workflow run
          # (those tests verify the workflow itself and run separately via act)
          $cfg.Filter.ExcludeTag = @('ActOnly')
          Invoke-Pester -Configuration $cfg

      - name: Generate matrix from basic fixture
        shell: pwsh
        run: |
          Write-Host "=== BASIC FIXTURE OUTPUT ==="
          ./New-BuildMatrix.ps1 -ConfigFile ./fixtures/basic.json
          Write-Host "=== END BASIC FIXTURE OUTPUT ==="

      - name: Generate matrix from with-includes fixture
        shell: pwsh
        run: |
          Write-Host "=== WITH-INCLUDES FIXTURE OUTPUT ==="
          ./New-BuildMatrix.ps1 -ConfigFile ./fixtures/with-includes.json
          Write-Host "=== END WITH-INCLUDES FIXTURE OUTPUT ==="

      - name: Generate matrix from with-excludes fixture
        shell: pwsh
        run: |
          Write-Host "=== WITH-EXCLUDES FIXTURE OUTPUT ==="
          ./New-BuildMatrix.ps1 -ConfigFile ./fixtures/with-excludes.json
          Write-Host "=== END WITH-EXCLUDES FIXTURE OUTPUT ==="

      - name: Generate matrix from default config
        shell: pwsh
        run: |
          Write-Host "=== DEFAULT CONFIG OUTPUT ==="
          ./New-BuildMatrix.ps1 -ConfigFile ./config.json
          Write-Host "=== END DEFAULT CONFIG OUTPUT ==="
