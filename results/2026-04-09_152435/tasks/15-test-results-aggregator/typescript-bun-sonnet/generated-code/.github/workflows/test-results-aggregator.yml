name: Test Results Aggregator

# Runs on every push and PR, can also be triggered manually or on a schedule.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # weekly on Sunday midnight

permissions:
  contents: read

jobs:
  aggregate:
    name: Aggregate Test Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests (parser, aggregator, formatter)
        env:
          # Skip the act integration test inside CI to avoid recursive Docker calls
          SKIP_ACT_TESTS: "true"
        run: bun test tests/parser.test.ts tests/aggregator.test.ts tests/formatter.test.ts

      - name: Run test results aggregator on fixture data
        run: bun run aggregator.ts fixtures/

      - name: Append results to GitHub Actions job summary
        run: bun run aggregator.ts fixtures/ >> "$GITHUB_STEP_SUMMARY"
