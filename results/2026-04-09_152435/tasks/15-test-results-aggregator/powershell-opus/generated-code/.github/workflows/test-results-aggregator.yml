name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate Test Results
        shell: pwsh
        run: ./TestResultsAggregator.ps1 -FixturesPath ./fixtures
