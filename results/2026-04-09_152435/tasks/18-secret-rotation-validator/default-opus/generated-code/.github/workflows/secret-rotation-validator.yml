name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 8am UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  REFERENCE_DATE: "2026-04-10"

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install --break-system-packages pytest

      - name: Run unit tests
        run: pytest test_secret_rotation_validator.py -v

      - name: Validate mixed secrets (JSON)
        run: |
          echo "=== JSON OUTPUT ==="
          python3 secret_rotation_validator.py fixtures/mixed_secrets.json \
            --date "$REFERENCE_DATE" --format json

      - name: Validate mixed secrets (Markdown)
        run: |
          echo "=== MARKDOWN OUTPUT ==="
          python3 secret_rotation_validator.py fixtures/mixed_secrets.json \
            --date "$REFERENCE_DATE" --format markdown

      - name: Validate all-expired secrets (JSON)
        run: |
          echo "=== ALL EXPIRED JSON ==="
          python3 secret_rotation_validator.py fixtures/all_expired.json \
            --date "$REFERENCE_DATE" --format json
