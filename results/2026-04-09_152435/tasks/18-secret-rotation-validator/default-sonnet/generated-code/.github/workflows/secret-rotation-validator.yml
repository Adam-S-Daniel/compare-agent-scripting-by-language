name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run daily at 08:00 UTC to catch secrets expiring today
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      reference_date:
        description: "Override reference date (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""
      output_format:
        description: "Report format: markdown or json"
        required: false
        default: "markdown"

permissions:
  contents: read

jobs:
  validate-secrets:
    name: Validate Secret Rotation Policies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pytest pyyaml

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin actionlint
          actionlint --version

      - name: Run unit tests
        run: python -m pytest test_secret_rotation.py -v --ignore=run_act_tests.py

      - name: Run secret rotation validator (markdown report)
        run: |
          REF_DATE="${{ github.event.inputs.reference_date }}"
          if [ -n "$REF_DATE" ]; then
            REF_ARG="--reference-date $REF_DATE"
          else
            REF_ARG=""
          fi
          # Run with fixtures/secrets_basic.json and allow exit 2 (expired secrets found)
          # shellcheck disable=SC2086
          python secret_rotation.py fixtures/secrets_basic.json $REF_ARG --format markdown || true
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run secret rotation validator (JSON report)
        run: |
          REF_DATE="${{ github.event.inputs.reference_date }}"
          if [ -n "$REF_DATE" ]; then
            REF_ARG="--reference-date $REF_DATE"
          else
            REF_ARG=""
          fi
          # shellcheck disable=SC2086
          python secret_rotation.py fixtures/secrets_basic.json $REF_ARG --format json || true
        env:
          PYTHONUNBUFFERED: "1"

      - name: Validate all fixture files
        run: |
          for f in fixtures/*.json; do
            echo "=== Validating: $f ==="
            python secret_rotation.py "$f" --format json || true
            echo ""
          done

      - name: Check for expired secrets (CI gate)
        run: |
          echo "Checking for expired secrets in basic fixture..."
          # Exit code 2 means expired secrets exist; we allow it and inspect the report
          python secret_rotation.py fixtures/secrets_basic.json \
            --reference-date 2026-04-10 \
            --format json > /tmp/rotation-report.json || true
          cat /tmp/rotation-report.json
          {
            echo "ROTATION_EXPIRED=$(python -c "import json; d=json.load(open('/tmp/rotation-report.json')); print(d['summary']['expired'])")"
            echo "ROTATION_WARNING=$(python -c "import json; d=json.load(open('/tmp/rotation-report.json')); print(d['summary']['warning'])")"
            echo "ROTATION_OK=$(python -c "import json; d=json.load(open('/tmp/rotation-report.json')); print(d['summary']['ok'])")"
          } >> "$GITHUB_ENV"
          python -c "
          import json
          d = json.load(open('/tmp/rotation-report.json'))
          print(f\"Expired: {d['summary']['expired']} | Warning: {d['summary']['warning']} | OK: {d['summary']['ok']}\")
          "

      - name: Write job summary
        run: |
          python secret_rotation.py fixtures/secrets_basic.json \
            --reference-date 2026-04-10 \
            --format markdown >> "$GITHUB_STEP_SUMMARY" || true
