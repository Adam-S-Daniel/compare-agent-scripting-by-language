name: Secret Rotation Validator

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    # Run every Monday at 09:00 UTC to catch secrets expiring during the week
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      reference_date:
        description: "Reference date for validation (yyyy-MM-dd, default: today)"
        required: false
        default: "2026-04-10"
      warning_window_days:
        description: "Days before expiry to trigger a warning"
        required: false
        default: "14"

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install actionlint for workflow validation (used in structure tests)
      - name: Install actionlint
        shell: bash
        run: |
          if command -v actionlint &>/dev/null; then
            echo "actionlint already installed: $(actionlint --version)"
          else
            ACTIONLINT_VERSION="1.7.7"
            wget -q "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
              -O /tmp/actionlint.tar.gz
            tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
            sudo mv /tmp/actionlint /usr/local/bin/actionlint
            echo "Installed actionlint $(actionlint --version)"
          fi

      # Pester is pre-installed in the act-ubuntu-pwsh container and on GitHub-hosted runners.
      # Include explicit install for portability on vanilla Ubuntu images.
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge '5.0' })) {
            Write-Host "Installing Pester..."
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          } else {
            Write-Host "Pester is already available."
          }

      - name: Run Pester unit and structure tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './SecretRotationValidator.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Generate JSON rotation report (mixed secrets)
        shell: pwsh
        run: |
          Write-Host "=== JSON ROTATION REPORT ==="
          $refDate = "${{ github.event.inputs.reference_date }}"
          if ([string]::IsNullOrEmpty($refDate)) { $refDate = "2026-04-10" }
          $warnDays = "${{ github.event.inputs.warning_window_days }}"
          if ([string]::IsNullOrEmpty($warnDays)) { $warnDays = "14" }
          ./SecretRotationValidator.ps1 `
            -ConfigFile ./fixtures/mixed-secrets.json `
            -Format json `
            -ReferenceDate $refDate `
            -WarningWindowDays ([int]$warnDays)

      - name: Generate Markdown rotation report (mixed secrets)
        shell: pwsh
        run: |
          Write-Host "=== MARKDOWN ROTATION REPORT ==="
          $refDate = "${{ github.event.inputs.reference_date }}"
          if ([string]::IsNullOrEmpty($refDate)) { $refDate = "2026-04-10" }
          $warnDays = "${{ github.event.inputs.warning_window_days }}"
          if ([string]::IsNullOrEmpty($warnDays)) { $warnDays = "14" }
          ./SecretRotationValidator.ps1 `
            -ConfigFile ./fixtures/mixed-secrets.json `
            -Format markdown `
            -ReferenceDate $refDate `
            -WarningWindowDays ([int]$warnDays)

      - name: Generate report for expired-only fixture
        shell: pwsh
        run: |
          Write-Host "=== EXPIRED-ONLY FIXTURE REPORT ==="
          ./SecretRotationValidator.ps1 `
            -ConfigFile ./fixtures/expired-only.json `
            -Format json `
            -ReferenceDate "2026-04-10" `
            -WarningWindowDays 14
