name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 8am UTC to catch approaching expirations
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_window:
        description: "Warning window in days"
        required: false
        default: "7"

permissions:
  contents: read

env:
  # Default reference date and warning window (overridable per step)
  DEFAULT_WARNING_WINDOW: "7"
  REFERENCE_DATE: "2026-04-10"

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          which jq || (sudo apt-get update && sudo apt-get install -y jq)
          jq --version

      - name: Make script executable
        run: chmod +x secret-rotation-validator.sh

      # --- Test 1: Mixed secrets, markdown output ---
      - name: Test mixed secrets markdown
        run: |
          echo "=== TEST: mixed-secrets-markdown ==="
          exit_code=0
          ./secret-rotation-validator.sh \
            -c test/fixtures/mixed-secrets.json \
            -f markdown \
            -d "$REFERENCE_DATE" \
            -w 7 || exit_code=$?
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          # Expect exit code 1 (expired secrets found)
          if [[ "$exit_code" -ne 1 ]]; then
            echo "FAIL: Expected exit code 1 but got ${exit_code}"
            exit 1
          fi
          echo "PASS: Exit code is 1 as expected"

      # --- Test 2: Mixed secrets, JSON output ---
      - name: Test mixed secrets JSON
        run: |
          echo "=== TEST: mixed-secrets-json ==="
          exit_code=0
          output=$(./secret-rotation-validator.sh \
            -c test/fixtures/mixed-secrets.json \
            -f json \
            -d "$REFERENCE_DATE" \
            -w 7 2>&1) || exit_code=$?
          echo "$output"
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          # Verify JSON structure and values
          total=$(echo "$output" | jq -r '.summary.total')
          expired=$(echo "$output" | jq -r '.summary.expired')
          warning=$(echo "$output" | jq -r '.summary.warning')
          ok=$(echo "$output" | jq -r '.summary.ok')
          echo "SUMMARY: total=$total expired=$expired warning=$warning ok=$ok"
          [[ "$total" == "3" ]] && echo "PASS: total=3"
          [[ "$expired" == "1" ]] && echo "PASS: expired=1"
          [[ "$warning" == "1" ]] && echo "PASS: warning=1"
          [[ "$ok" == "1" ]] && echo "PASS: ok=1"
          # Verify specific secret statuses
          db_status=$(echo "$output" | jq -r '.expired[0].name')
          tls_status=$(echo "$output" | jq -r '.warning[0].name')
          api_status=$(echo "$output" | jq -r '.ok[0].name')
          echo "EXPIRED_SECRET=$db_status"
          echo "WARNING_SECRET=$tls_status"
          echo "OK_SECRET=$api_status"
          [[ "$db_status" == "DB_PASSWORD" ]] && echo "PASS: DB_PASSWORD is expired"
          [[ "$tls_status" == "TLS_CERT" ]] && echo "PASS: TLS_CERT is warning"
          [[ "$api_status" == "API_KEY" ]] && echo "PASS: API_KEY is ok"

      # --- Test 3: All OK secrets ---
      - name: Test all OK secrets
        run: |
          echo "=== TEST: all-ok ==="
          exit_code=0
          ./secret-rotation-validator.sh \
            -c test/fixtures/all-ok.json \
            -f markdown \
            -d "$REFERENCE_DATE" \
            -w 7 || exit_code=$?
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          if [[ "$exit_code" -ne 0 ]]; then
            echo "FAIL: Expected exit code 0 but got ${exit_code}"
            exit 1
          fi
          echo "PASS: Exit code is 0 as expected (all secrets OK)"

      # --- Test 4: All expired secrets ---
      - name: Test all expired secrets
        run: |
          echo "=== TEST: all-expired ==="
          exit_code=0
          output=$(./secret-rotation-validator.sh \
            -c test/fixtures/all-expired.json \
            -f json \
            -d "$REFERENCE_DATE" \
            -w 7 2>&1) || exit_code=$?
          echo "$output"
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          expired=$(echo "$output" | jq -r '.summary.expired')
          ok=$(echo "$output" | jq -r '.summary.ok')
          warning=$(echo "$output" | jq -r '.summary.warning')
          echo "SUMMARY: expired=$expired warning=$warning ok=$ok"
          [[ "$expired" == "2" ]] && echo "PASS: expired=2"
          [[ "$warning" == "0" ]] && echo "PASS: warning=0"
          [[ "$ok" == "0" ]] && echo "PASS: ok=0"
          if [[ "$exit_code" -ne 1 ]]; then
            echo "FAIL: Expected exit code 1 but got ${exit_code}"
            exit 1
          fi
          echo "PASS: Exit code is 1 as expected"

      # --- Test 5: Custom warning window (30 days) ---
      - name: Test custom warning window
        run: |
          echo "=== TEST: custom-warning-window ==="
          exit_code=0
          output=$(./secret-rotation-validator.sh \
            -c test/fixtures/all-ok.json \
            -f json \
            -d "$REFERENCE_DATE" \
            -w 90 2>&1) || exit_code=$?
          echo "$output"
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          # With 90-day window, SESSION_KEY (81 days) should be WARNING
          warning=$(echo "$output" | jq -r '.summary.warning')
          ok=$(echo "$output" | jq -r '.summary.ok')
          echo "SUMMARY: warning=$warning ok=$ok"
          [[ "$warning" == "1" ]] && echo "PASS: warning=1 (SESSION_KEY within 90-day window)"
          [[ "$ok" == "1" ]] && echo "PASS: ok=1 (SMTP_PASSWORD still OK at 154 days)"

      # --- Test 6: Error handling - missing file ---
      - name: Test error missing file
        run: |
          echo "=== TEST: error-missing-file ==="
          exit_code=0
          output=$(./secret-rotation-validator.sh -c nonexistent.json 2>&1) || exit_code=$?
          echo "$output"
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          if [[ "$exit_code" -ne 2 ]]; then
            echo "FAIL: Expected exit code 2 but got ${exit_code}"
            exit 1
          fi
          echo "PASS: Exit code is 2 for missing file"
          if echo "$output" | grep -q "Config file not found"; then
            echo "PASS: Error message mentions missing config file"
          else
            echo "FAIL: Expected error message about missing config"
            exit 1
          fi

      # --- Test 7: Error handling - invalid JSON ---
      - name: Test error invalid JSON
        run: |
          echo "=== TEST: error-invalid-json ==="
          echo "this is not json" > /tmp/bad.json
          exit_code=0
          output=$(./secret-rotation-validator.sh -c /tmp/bad.json 2>&1) || exit_code=$?
          echo "$output"
          echo "SCRIPT_EXIT_CODE=${exit_code}"
          if [[ "$exit_code" -ne 2 ]]; then
            echo "FAIL: Expected exit code 2 but got ${exit_code}"
            exit 1
          fi
          echo "PASS: Exit code is 2 for invalid JSON"

      - name: All tests passed
        run: echo "All secret rotation validator tests passed successfully"
