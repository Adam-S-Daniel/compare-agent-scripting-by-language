name: Secret Rotation Validator

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    # Run weekly on Monday at 9 AM UTC to catch secrets expiring soon
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Warning window in days"
        required: false
        default: "14"
      format:
        description: "Output format (json or markdown)"
        required: false
        default: "json"

permissions:
  contents: read

jobs:
  validate-secrets:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "${HOME}/.bun/bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun test tests/validator.test.ts tests/formatter.test.ts

      - name: Generate rotation report (JSON)
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run app.ts \
            --config fixtures/test-secrets.json \
            --warning-days 14 \
            --format json \
            --today 2026-04-10

      - name: Generate rotation report (Markdown)
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run app.ts \
            --config fixtures/test-secrets.json \
            --warning-days 14 \
            --format markdown \
            --today 2026-04-10

      - name: Validate report structure and exact values
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          output=$(bun run app.ts \
            --config fixtures/test-secrets.json \
            --warning-days 14 \
            --format json \
            --today 2026-04-10)
          echo "$output"

          # Assert PROD_DB_PASSWORD is in expired group with exact values
          echo "$output" | grep -q '"name": "PROD_DB_PASSWORD"'
          echo "$output" | grep -q '"expiryDate": "2026-01-31"'
          echo "$output" | grep -q '"daysUntilExpiry": -69'
          echo "$output" | grep -q '"urgency": "expired"'

          # Assert API_KEY is in warning group with exact values
          echo "$output" | grep -q '"name": "API_KEY"'
          echo "$output" | grep -q '"expiryDate": "2026-04-11"'
          echo "$output" | grep -q '"daysUntilExpiry": 1'
          echo "$output" | grep -q '"urgency": "warning"'

          # Assert JWT_SECRET is in ok group with exact values
          echo "$output" | grep -q '"name": "JWT_SECRET"'
          echo "$output" | grep -q '"expiryDate": "2026-07-04"'
          echo "$output" | grep -q '"daysUntilExpiry": 85'
          echo "$output" | grep -q '"urgency": "ok"'

          # Assert summary counts
          echo "$output" | grep -q '"expired": 1'
          echo "$output" | grep -q '"warning": 1'
          echo "$output" | grep -q '"ok": 1'

          echo "All structural validations passed!"
