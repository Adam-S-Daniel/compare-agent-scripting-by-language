name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8am UTC
  workflow_dispatch:
    inputs:
      format:
        description: "Output format (json or markdown)"
        required: false
        default: "markdown"
      reference_date:
        description: "Reference date for validation (YYYY-MM-DD)"
        required: false
        default: "2026-04-10"

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    env:
      OUTPUT_FORMAT: ${{ github.event.inputs.format || 'markdown' }}
      REFERENCE_DATE: ${{ github.event.inputs.reference_date || '2026-04-10' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: echo "No external dependencies needed"

      - name: Run unit tests
        run: bun test

      - name: Validate secrets (JSON)
        run: |
          bun run src/main.ts \
            --config fixtures/secrets.json \
            --format json \
            --reference-date "$REFERENCE_DATE" || true

      - name: Validate secrets (Markdown)
        run: |
          bun run src/main.ts \
            --config fixtures/secrets.json \
            --format markdown \
            --reference-date "$REFERENCE_DATE" || true

      - name: Validate all-ok fixture
        run: |
          bun run src/main.ts \
            --config fixtures/all-ok.json \
            --format json \
            --reference-date "$REFERENCE_DATE"
