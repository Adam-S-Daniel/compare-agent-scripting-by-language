name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    env:
      REFERENCE_DATE: '2026-04-10'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets (Markdown)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 -ConfigPath "./secrets-config.json" -OutputFormat markdown -ReferenceDate $env:REFERENCE_DATE

      - name: Validate secrets (JSON)
        shell: pwsh
        run: |
          ./SecretRotationValidator.ps1 -ConfigPath "./secrets-config.json" -OutputFormat json -ReferenceDate $env:REFERENCE_DATE
