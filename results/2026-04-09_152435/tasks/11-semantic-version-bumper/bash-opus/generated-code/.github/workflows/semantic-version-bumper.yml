name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  TERM: xterm

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats shellcheck

      - name: Run shellcheck
        run: shellcheck semver-bump.sh

      - name: Run syntax check
        run: bash -n semver-bump.sh

      - name: Run bats unit tests
        run: bats tests.bats

  bump:
    name: Version Bump
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI Bot"

      - name: Run version bump
        run: |
          chmod +x semver-bump.sh
          bash semver-bump.sh --version-file VERSION --changelog CHANGELOG.md

      - name: Show results
        run: |
          echo "=== VERSION ==="
          cat VERSION
          echo ""
          echo "=== CHANGELOG ==="
          cat CHANGELOG.md 2>/dev/null || echo "No changelog generated"
