name: Docker Image Tag Generator

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name override"
        required: false
        default: "main"
      commit_sha:
        description: "Commit SHA override"
        required: false
        default: "abc1234567890"

permissions:
  contents: read

jobs:
  generate-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester (if not already installed)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0')) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run unit tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./New-DockerImageTag.Tests.ps1"
          $config.Run.PassThru = $true
          $config.Output.Verbosity = "Normal"
          # Exclude act integration tests from workflow (avoid Docker-in-Docker)
          $config.Filter.ExcludeTag = @("act-integration")
          $result = Invoke-Pester -Configuration $config
          $passed = $result.PassedCount
          $failed = $result.FailedCount
          Write-Host "PESTER_RESULT: Passed=$passed Failed=$failed"
          if ($failed -gt 0) {
            Write-Host "::error::$failed test(s) failed"
            exit 1
          }

      - name: Generate tags - demo scenarios
        shell: pwsh
        run: |
          # Load the tag generator functions
          . ./New-DockerImageTag.ps1

          # --- Scenario 1: main branch push ---
          $tags = @(Get-DockerImageTags -BranchName "main" -CommitSha "abc1234567890" -GitTags @() -PrNumber "")
          Write-Host "DEMO_MAIN_TAGS: $($tags -join ',')"

          # --- Scenario 2: Pull Request ---
          $tags = @(Get-DockerImageTags -BranchName "feature/my-feature" -CommitSha "def5678901234" -GitTags @() -PrNumber "42")
          Write-Host "DEMO_PR_TAGS: $($tags -join ',')"

          # --- Scenario 3: Semver tag on main ---
          $tags = @(Get-DockerImageTags -BranchName "main" -CommitSha "abc1234567890" -GitTags @("v1.2.3") -PrNumber "")
          Write-Host "DEMO_TAG_TAGS: $($tags -join ',')"

          # --- Scenario 4: Feature branch with special chars ---
          $tags = @(Get-DockerImageTags -BranchName "feature/my-feature" -CommitSha "abc1234567890" -GitTags @() -PrNumber "")
          Write-Host "DEMO_FEATURE_TAGS: $($tags -join ',')"

      - name: Generate tags from actual git context
        shell: pwsh
        run: |
          . ./New-DockerImageTag.ps1

          # Determine values from git/GitHub Actions context
          $branchName = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } `
                        elseif ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } `
                        else { "unknown" }
          $commitSha  = if ($env:GITHUB_SHA) { $env:GITHUB_SHA } else { "0000000" }
          $prNumber   = if ($env:GITHUB_EVENT_NAME -eq "pull_request") { "$env:GITHUB_REF".Split('/')[-2] } else { "" }
          $gitTagsStr = if ($env:GITHUB_REF -match '^refs/tags/') { $env:GITHUB_REF_NAME } else { "" }
          $gitTags    = @($gitTagsStr | Where-Object { $_ -ne "" })

          Write-Host "=== Git Context ==="
          Write-Host "Branch : $branchName"
          Write-Host "SHA    : $commitSha"
          Write-Host "PR     : $prNumber"
          Write-Host "Tags   : $($gitTags -join ', ')"

          $tags = @(Get-DockerImageTags -BranchName $branchName -CommitSha $commitSha -GitTags $gitTags -PrNumber $prNumber)

          Write-Host "=== Generated Docker Image Tags ==="
          $tags | ForEach-Object { Write-Host "  $_" }
          Write-Host "GIT_CONTEXT_TAGS: $($tags -join ',')"
