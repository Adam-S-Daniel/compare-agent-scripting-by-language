name: Docker Image Tag Generator

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run bats tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Make script executable
        run: chmod +x generate-tags.sh

      - name: Validate script syntax
        run: bash -n generate-tags.sh

      - name: Run bats tests
        run: bats tests/generate-tags.bats

      - name: Demonstrate tag generation (push context)
        run: |
          echo "=== Tag generation demo ==="
          echo "--- main branch ---"
          ./generate-tags.sh --branch main --sha "${GITHUB_SHA:-abc1234567890}"
          echo "--- feature branch ---"
          ./generate-tags.sh --branch "feature/example" --sha "${GITHUB_SHA:-abc1234567890}"
          echo "--- semver tag ---"
          ./generate-tags.sh --branch main --sha "${GITHUB_SHA:-abc1234567890}" --tag v1.2.3
          echo "--- pull request ---"
          ./generate-tags.sh --branch "feature/pr-demo" --sha "${GITHUB_SHA:-abc1234567890}" --pr 99
          echo "=== Demo complete ==="
