# label-rules.conf
# Production PR label assignment rules.
#
# Format: glob-pattern:label
# Rules are checked in order — first rule = highest priority.
# A single changed file can match multiple rules and receive multiple labels.
# Duplicate labels (same label from multiple rules) are deduplicated;
# the first (highest-priority) occurrence is kept.
#
# In bash pattern matching, '*' matches any string including path separators,
# so 'docs/**' matches docs/README.md AND docs/api/v1/guide.md.

# --- Documentation ---
docs/**:documentation
*.md:documentation

# --- API layer (more specific before general src/) ---
src/api/**:api

# --- Tests ---
*.test.*:tests
*.spec.*:tests

# --- Source code ---
src/**:source

# --- Configuration / build files ---
*.json:config
*.yaml:config
*.yml:config

# --- CI / Infrastructure ---
.github/**:ci
Dockerfile:ci
Makefile:ci
