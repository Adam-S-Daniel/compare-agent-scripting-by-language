name: PR Label Assigner

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test

  label-fixtures:
    name: Run Label Assignment Fixtures
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        fixture:
          - { file: "fixtures/test-case-1.json", case: "feature-pr" }
          - { file: "fixtures/test-case-2.json", case: "ci-only-pr" }
          - { file: "fixtures/test-case-3.json", case: "docs-only-pr" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Run label assigner for ${{ matrix.fixture.case }}
        run: bun run index.ts --fixture ${{ matrix.fixture.file }}

  label-mock:
    name: Run Label Assigner with Built-in Mock
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Run label assigner with built-in mock PR
        run: bun run index.ts
