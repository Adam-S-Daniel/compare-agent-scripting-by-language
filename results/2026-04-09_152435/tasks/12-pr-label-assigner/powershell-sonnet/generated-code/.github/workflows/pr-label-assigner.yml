name: PR Label Assigner

# Trigger on pushes, pull requests, and manual dispatch
on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assign-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pester 5 is pre-installed in the act container; this is a no-op there
      # but ensures portability on vanilla GitHub-hosted runners
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]'5.0' })) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }

      # Install actionlint so the Pester workflow-structure test can validate the YAML
      - name: Install actionlint
        run: |
          curl -fsSL \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      # Run unit tests + workflow-structure tests via Pester
      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path    = './PRLabelAssigner.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit    = $true
          Invoke-Pester -Configuration $config

      # Run end-to-end integration test cases with known inputs and verifiable outputs
      # The act test harness parses these lines to assert exact expected values.
      - name: Run integration test cases
        shell: pwsh
        run: |
          # Load functions (dot-source without triggering CLI execution)
          . ./Invoke-PRLabelAssigner.ps1

          # Load the default label rules
          $rules = Get-LabelRulesFromConfig -ConfigPath ./label-config.json

          # -- Test case 1: docs file -> documentation --
          $labels1 = Get-MatchingLabels -FilePaths @("docs/README.md") -Rules $rules
          Write-Output "TEST_CASE_1_LABELS: $($labels1 -join ', ')"

          # -- Test case 2: src/api source file -> api, backend --
          $labels2 = Get-MatchingLabels -FilePaths @("src/api/users.js") -Rules $rules
          Write-Output "TEST_CASE_2_LABELS: $($labels2 -join ', ')"

          # -- Test case 3: test file in src/api -> api, tests, backend (priority order) --
          $labels3 = Get-MatchingLabels -FilePaths @("src/api/users.test.js") -Rules $rules
          Write-Output "TEST_CASE_3_LABELS: $($labels3 -join ', ')"

          # -- Test case 4: .github workflow file -> ci/cd --
          $labels4 = Get-MatchingLabels -FilePaths @(".github/workflows/ci.yml") -Rules $rules
          Write-Output "TEST_CASE_4_LABELS: $($labels4 -join ', ')"

          # -- Test case 5: unmatched file -> no labels --
          $labels5 = Get-MatchingLabels -FilePaths @("random-file.txt") -Rules $rules
          $labelStr5 = if ($labels5.Count -eq 0) { "(none)" } else { $labels5 -join ', ' }
          Write-Output "TEST_CASE_5_LABELS: $labelStr5"

          Write-Output "Integration tests completed successfully"
