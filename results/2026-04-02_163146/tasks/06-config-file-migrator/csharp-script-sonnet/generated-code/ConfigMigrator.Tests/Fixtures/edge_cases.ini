; edge_cases.ini — exercises parser edge cases and type coercion boundary conditions

; --- Section with empty and whitespace-only values ---
[empty_values]
empty_key =
whitespace_value =

; --- Values that contain = signs ---
[special_chars]
connection_string = host=localhost;port=5432;dbname=mydb
; Note: # inside a value (not at start of line) is kept as part of value
color = #FF0000
path = C:\Users\test\Documents\file.txt

; --- Type coercion edge cases ---
[types]
integer_pos = 42
integer_neg = -17
integer_zero = 0
float_pi = 3.14159
float_neg = -2.718
bool_true_word = true
bool_false_word = false
bool_yes = yes
bool_no = no
bool_on = on
bool_off = off
plain_string = hello world
numeric_string_with_text = 3d6

; --- Multi-line value ---
[multiline]
greeting = Hello \
           World
sql_query = SELECT * FROM users \
            WHERE active = 1 \
            ORDER BY name

; --- Duplicate keys (last value wins) ---
[duplicates]
key = first_value
key = second_value

; --- Numeric port as string that should become integer ---
[networking]
port = 443
retry_count = 3
timeout_ms = 5000
rate_limit = 1.5
