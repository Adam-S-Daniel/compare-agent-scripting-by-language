# complex.ini — realistic app configuration with multiple sections and types
# Used by integration/edge-case tests

; Global keys (before any section)
app_name = MyApp
version = 2.5.0
author = Dev Team

[server]
host = localhost
port = 8080
max_connections = 100
enable_ssl = false
# Comma-separated list of allowed hosts
allowed_hosts = host1, host2, host3
timeout = 30.5

[database]
; Primary database connection
host = db.example.com
port = 5432
name = myapp
user = dbuser
password = s3cr3t!
max_pool_size = 10
use_ssl = yes

[logging]
level = info
file = /var/log/myapp.log
# Multi-line description using backslash continuation
description = This is a very long description that spans \
              multiple lines for testing purposes
rotate = true
max_size_mb = 50

[cache]
enabled = true
ttl = 300
backend = redis
