; Complex configuration with edge cases
# Hash-style comments should also be supported

[application]
name = My Application
version = 2.5
enabled = yes
timeout = 30.5

[paths]
; Multi-line values using line continuation with backslash
description = This is a long \
    multi-line value that \
    spans three lines
data_dir = /var/lib/myapp
log_file = /var/log/myapp.log

[empty_section]

[special_values]
empty_value =
quoted_string = "hello world"
spaces_in_value = some value with spaces
negative_number = -42
float_value = 3.14159
scientific = 1.5e10
true_val = true
false_val = false
yes_val = yes
no_val = no
on_val = on
off_val = off
null_val = null
none_val = none
