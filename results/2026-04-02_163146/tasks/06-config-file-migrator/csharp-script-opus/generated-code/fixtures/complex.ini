; Complex configuration with edge cases
# Supports both comment styles

app_name="My Complex App"
version=3

[database]
host=db.example.com
port=5432
connection_string="host=db.example.com;port=5432;dbname=mydb"
ssl=true
max_pool_size=100
timeout=30.5

[logging]
; Multi-line value example
description=Application logging configuration
  that spans multiple lines
  for detailed documentation
level=debug
enabled=yes
file=/var/log/app.log

[features]
dark_mode=on
beta_features=false
max_retries=3
threshold=0.85

[empty_section]

[special_values]
empty_value=
quoted_double="hello world"
quoted_single='single quotes'
with_equals=key=value;other=thing
large_number=9999999999
scientific=1.5e10
