; Edge case test fixture

; Global keys before any section
global_key=global_value

; Duplicate keys — last value wins
[duplicates]
key=first
key=second

; Section with spaces in name
[  spaced section  ]
key=value

; Empty values
[empty_values]
empty=
also_empty=

; Various boolean representations
[booleans]
b1=true
b2=false
b3=yes
b4=no
b5=on
b6=off
b7=1
b8=0
b9=True
b10=FALSE

; Values with equals signs
[special_chars]
connection=host=localhost;port=5432
equation=1+1=2

; Windows-style paths
[paths]
log_dir=C:\Users\admin\logs
config_file=/etc/app/config.ini

; Numbers
[numbers]
integer=42
negative=-7
big=9999999999
float=3.14
negative_float=-0.5
scientific=1.5e10
zero=0
