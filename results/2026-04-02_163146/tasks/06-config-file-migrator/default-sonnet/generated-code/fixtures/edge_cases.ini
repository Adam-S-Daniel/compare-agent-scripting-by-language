# Edge-case fixture
# Tests: multiline values, empty values, special characters, all boolean forms

[multiline]
; This value spans multiple lines using continuation (leading whitespace)
description = This is the first line
    which continues here
    and ends on this line
short = single line value

[all_booleans]
# All boolean true forms
t1 = true
t2 = yes
t3 = on
t4 = 1
# All boolean false forms
f1 = false
f2 = no
f3 = off
f4 = 0

[empty_and_special]
empty_val =
; Value with equals sign inside
connection_string = user=admin;password=secret;host=localhost
# Version string — must NOT be coerced to a number
version = 2.10.3
# Value that looks like YAML keyword but is a string
yaml_keyword_like = null

[types]
an_int    = 42
a_float   = 3.14159
negative  = -7
big_int   = 1000000
sci_float = 1.5e10
