# Full application configuration
# Realistic fixture with multiple sections

[app]
name = AwesomeService
version = 3.2.1
environment = production
debug = false

[database]
host = db.internal
port = 5432
name = production_db
user = app_user
ssl = true
pool_size = 10
pool_timeout = 30.0

[cache]
host = redis.internal
port = 6379
ttl = 3600
enabled = true

[logging]
level = info
# Multi-line format string
format = %(asctime)s [%(levelname)s]
    %(name)s: %(message)s
file = /var/log/app.log
max_bytes = 10485760
backup_count = 5

[email]
smtp_host = smtp.example.com
smtp_port = 587
use_tls = yes
from_address = noreply@example.com
timeout = 10
