# CI/CD workflow that uses semver_bump.sh to automatically bump versions
# based on conventional commit messages after merges to main.
name: Semantic Version Bumper

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not update files)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  # Run tests on every push and PR
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Validate script syntax
        run: |
          bash -n semver_bump.sh
          shellcheck semver_bump.sh

      - name: Run bats tests
        run: bats test/semver_bump.bats

  # Bump version only on pushes to main (not PRs)
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits since last tag
        id: commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --format='%s' > /tmp/commits.log
          else
            git log "${LAST_TAG}..HEAD" --format='%s' > /tmp/commits.log
          fi
          echo "commits_file=/tmp/commits.log" >> "$GITHUB_OUTPUT"
          echo "Commits since last tag:"
          cat /tmp/commits.log

      - name: Determine dry-run flag
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=--dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        run: |
          chmod +x semver_bump.sh
          NEW_VERSION=$(bash semver_bump.sh \
            --version-file VERSION \
            --commits "${{ steps.commits.outputs.commits_file }}" \
            --changelog CHANGELOG.md \
            ${{ steps.flags.outputs.dry_run }} \
            --quiet)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to version: ${NEW_VERSION}"

      - name: Commit and tag
        if: steps.flags.outputs.dry_run == ''
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags
