name: Dependency License Checker

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  license-check:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          apt-get update -y
          apt-get install -y wget apt-transport-https software-properties-common
          wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
          dpkg -i packages-microsoft-prod.deb
          apt-get update -y
          apt-get install -y powershell

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester tests/LicenseChecker.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Error "Tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }
          Write-Host "All $($result.PassedCount) tests passed."

      - name: Check licenses in package.json
        shell: pwsh
        run: |
          pwsh run.ps1 -Manifest tests/fixtures/package.json -Config tests/fixtures/license-config.json

      - name: Check licenses in requirements.txt
        shell: pwsh
        run: |
          pwsh run.ps1 -Manifest tests/fixtures/requirements.txt -Config tests/fixtures/license-config.json

      - name: Check licenses in MIT-only package (expect all approved)
        shell: pwsh
        run: |
          $report = & {
            . ./LicenseChecker.ps1
            $config = Get-LicenseConfig -Path tests/fixtures/license-config.json
            $db = @{ "express" = "MIT"; "lodash" = "MIT" }
            Invoke-LicenseCheck -ManifestPath tests/fixtures/package-mit-only.json -Config $config -MockDatabase $db
          }
          $denied = $report | Where-Object { $_.Status -eq "denied" }
          if ($denied) {
            Write-Error "Unexpected denied licenses found"
            exit 1
          }
          Write-Host "MIT-only check: all $($report.Count) dependencies approved"
