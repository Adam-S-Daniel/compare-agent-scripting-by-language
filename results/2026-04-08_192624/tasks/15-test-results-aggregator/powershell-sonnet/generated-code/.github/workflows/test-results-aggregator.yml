name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PowerShell is not pre-installed in the catthehacker/ubuntu:act-latest image,
      # so we add the Microsoft package repo and install it.
      - name: Install PowerShell
        run: |
          export DEBIAN_FRONTEND=noninteractive
          . /etc/os-release
          sudo apt-get update -qq
          sudo apt-get install -y curl
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" \
            -o /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update -qq
          sudo apt-get install -y powershell

      # Dot-source the implementation so its functions are in scope, then call
      # the main entry point on the ./fixtures directory that was checked out.
      - name: Aggregate Test Results
        shell: pwsh
        run: |
          . ./Invoke-TestResultsAggregator.ps1
          Invoke-TestResultsAggregator -Path ./fixtures
