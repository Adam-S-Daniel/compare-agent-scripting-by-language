# PR Label Assignment Rules
# Format: glob_pattern:label:priority
# Higher priority = appears first in output
# Multiple rules can match the same file

# Documentation
docs/**:documentation:10
*.md:documentation:10
*.rst:documentation:10

# API layer
src/api/**:api:30

# Tests
**/*.test.*:tests:25
**/*_test.*:tests:25
**/*_spec.*:tests:25
tests/**:tests:25

# CI/CD
.github/**:ci:20
Makefile:ci:15

# Source code (broad catch-all, lower priority)
src/**:backend:5
