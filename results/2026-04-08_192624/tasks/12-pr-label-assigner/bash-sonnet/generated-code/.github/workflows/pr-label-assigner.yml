name: PR Label Assigner

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      files_input:
        description: "Newline-separated list of changed files (optional)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  assign-labels:
    name: Assign PR Labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          npm install -g bats

      - name: Validate script syntax
        run: |
          bash -n pr_label_assigner.sh
          echo "Syntax OK"

      - name: Run bats tests
        run: |
          bats tests/pr_label_assigner.bats

      - name: Demo - docs-only PR
        run: |
          echo "=== Test Case: docs-only PR ==="
          ./pr_label_assigner.sh \
            --config fixtures/rules.conf \
            --files fixtures/changed_files_docs.txt

      - name: Demo - API PR
        run: |
          echo "=== Test Case: API-only PR ==="
          ./pr_label_assigner.sh \
            --config fixtures/rules.conf \
            --files fixtures/changed_files_api.txt

      - name: Demo - mixed PR
        run: |
          echo "=== Test Case: mixed PR (api + tests + docs + backend) ==="
          ./pr_label_assigner.sh \
            --config fixtures/rules.conf \
            --files fixtures/changed_files_mixed.txt

      - name: Demo - custom input via workflow_dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.files_input != ''
        run: |
          echo "=== Test Case: custom input ==="
          echo "${{ github.event.inputs.files_input }}" > /tmp/custom_files.txt
          ./pr_label_assigner.sh \
            --config fixtures/rules.conf \
            --files /tmp/custom_files.txt
