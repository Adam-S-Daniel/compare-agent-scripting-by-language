# Label rules configuration
# Format: priority|glob_pattern|label
# Lower priority number = higher precedence (applied first in conflict resolution)
# Lines starting with # are comments, blank lines are ignored
#
# Glob patterns use bash extglob/fnmatch style:
#   * matches any file in a directory
#   ** matches across directories (recursive)
#   ? matches single character

10|docs/**|documentation
10|*.md|documentation
20|src/api/**|api
20|api/**|api
30|*.test.*|tests
30|*_test.*|tests
30|test/**|tests
30|tests/**|tests
40|src/**/*.js|frontend
40|src/**/*.ts|frontend
40|src/**/*.tsx|frontend
50|*.yml|ci-cd
50|*.yaml|ci-cd
50|.github/**|ci-cd
60|Dockerfile|infrastructure
60|docker-compose.*|infrastructure
60|*.tf|infrastructure
70|src/**/*.css|styles
70|src/**/*.scss|styles
80|db/**|database
80|migrations/**|database
90|src/**|core
