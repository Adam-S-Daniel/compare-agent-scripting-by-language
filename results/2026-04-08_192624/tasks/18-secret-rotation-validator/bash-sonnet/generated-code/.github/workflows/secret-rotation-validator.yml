name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run daily at 08:00 UTC to catch newly-expired secrets
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days before expiry to trigger warning"
        required: false
        default: "30"
      format:
        description: "Output format: json or markdown"
        required: false
        default: "json"

permissions:
  contents: read

env:
  DEFAULT_WARNING_DAYS: "30"
  # SECRETS_CONFIG can be overridden via .env file (for act test cases)
  SECRETS_CONFIG: "fixtures/secrets.csv"

jobs:
  validate-secrets:
    name: Validate Secret Rotation Policies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (shellcheck, bats)
        run: |
          apt-get update -qq
          apt-get install -y shellcheck bats

      - name: Validate script syntax
        run: |
          bash -n secret-rotation-validator.sh
          echo "Syntax check passed"

      - name: Run shellcheck
        run: |
          shellcheck secret-rotation-validator.sh
          echo "shellcheck passed"

      - name: Make script executable
        run: chmod +x secret-rotation-validator.sh

      - name: Run bats test suite
        run: |
          bats test_secret_rotation.bats

      - name: Run secret rotation validator (JSON format)
        id: run_json
        run: |
          WARNING_DAYS="${{ github.event.inputs.warning_days || env.DEFAULT_WARNING_DAYS }}"
          CONFIG="${SECRETS_CONFIG:-fixtures/secrets.csv}"
          ./secret-rotation-validator.sh \
            --config "$CONFIG" \
            --format json \
            --warning-days "$WARNING_DAYS" \
            | tee rotation-report.json

      - name: Run secret rotation validator (Markdown format)
        run: |
          WARNING_DAYS="${{ github.event.inputs.warning_days || env.DEFAULT_WARNING_DAYS }}"
          CONFIG="${SECRETS_CONFIG:-fixtures/secrets.csv}"
          ./secret-rotation-validator.sh \
            --config "$CONFIG" \
            --format markdown \
            --warning-days "$WARNING_DAYS" \
            | tee rotation-report.md

      - name: Display rotation report summary
        run: |
          echo "=== Secret Rotation Report ==="
          cat rotation-report.md

      - name: Assert report contains required sections
        run: |
          # Verify JSON report has all urgency groups
          if ! grep -q '"expired"' rotation-report.json; then
            echo "ERROR: JSON report missing 'expired' section"
            exit 1
          fi
          if ! grep -q '"warning"' rotation-report.json; then
            echo "ERROR: JSON report missing 'warning' section"
            exit 1
          fi
          if ! grep -q '"ok"' rotation-report.json; then
            echo "ERROR: JSON report missing 'ok' section"
            exit 1
          fi
          if ! grep -q '"summary"' rotation-report.json; then
            echo "ERROR: JSON report missing 'summary' section"
            exit 1
          fi
          echo "All required sections present in JSON report"

          # Verify markdown report has section headers
          if grep -q '## Expired' rotation-report.md || \
             grep -q 'Expired Secrets' rotation-report.md; then
            echo "Markdown report structure verified"
          else
            echo "ERROR: Markdown report missing 'Expired' section"
            exit 1
          fi

      - name: Check for expired secrets and report
        run: |
          # Extract expired count from JSON report (handles "expired_count": N with spaces)
          EXPIRED_COUNT=$(grep -oE '"expired_count":[[:space:]]*[0-9]+' rotation-report.json \
            | grep -oE '[0-9]+$' || echo "0")
          echo "Expired secrets count: $EXPIRED_COUNT"
          if [ "$EXPIRED_COUNT" -gt 0 ]; then
            echo "WARNING: $EXPIRED_COUNT secret(s) have expired and need immediate rotation!"
          else
            echo "No expired secrets found."
          fi

      - name: Save rotation reports
        if: always()
        run: |
          echo "=== rotation-report.json ===" >> rotation-reports-combined.txt
          cat rotation-report.json >> rotation-reports-combined.txt 2>/dev/null || echo "(not generated)" >> rotation-reports-combined.txt
          echo "" >> rotation-reports-combined.txt
          echo "=== rotation-report.md ===" >> rotation-reports-combined.txt
          cat rotation-report.md >> rotation-reports-combined.txt 2>/dev/null || echo "(not generated)" >> rotation-reports-combined.txt
          echo "Reports saved to rotation-reports-combined.txt"
