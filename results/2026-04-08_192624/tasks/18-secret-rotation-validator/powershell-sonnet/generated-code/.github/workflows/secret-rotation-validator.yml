name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run daily at 08:00 UTC to catch newly-expired secrets
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      output_format:
        description: "Output format (Markdown or JSON)"
        required: false
        default: "JSON"
      warning_window_days:
        description: "Days before expiry to start warning"
        required: false
        default: "14"
      reference_date:
        description: "Reference date (yyyy-MM-dd). Leave blank for today."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  validate-secrets:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          # Install PowerShell 7 on Ubuntu via Microsoft packages
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb -O /tmp/packages-microsoft-prod.deb
          sudo dpkg -i /tmp/packages-microsoft-prod.deb
          sudo apt-get update -q
          sudo apt-get install -y powershell

      - name: Install Pester
        shell: pwsh
        run: |
          # Install Pester 5 from PSGallery
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser

      - name: Run Secret Rotation Validator (JSON output)
        id: validate-json
        shell: pwsh
        run: |
          # Use fixed reference date for deterministic CI output
          $refDate = if ("${{ github.event.inputs.reference_date }}" -ne "") {
            [datetime]"${{ github.event.inputs.reference_date }}"
          } else {
            [datetime]"2026-04-09"
          }

          $warningDays = if ("${{ github.event.inputs.warning_window_days }}" -ne "") {
            [int]"${{ github.event.inputs.warning_window_days }}"
          } else {
            14
          }

          . ./SecretRotationValidator.ps1

          $jsonOutput = Invoke-SecretRotationValidator `
            -ConfigPath "./fixtures/secrets-fixture.json" `
            -OutputFormat "JSON" `
            -WarningWindowDays $warningDays `
            -ReferenceDate $refDate

          Write-Host "=== JSON Report ==="
          Write-Host $jsonOutput

          # Parse and display summary for easy log parsing
          $report = $jsonOutput | ConvertFrom-Json
          Write-Host "=== Summary ==="
          Write-Host "expiredCount: $($report.summary.expiredCount)"
          Write-Host "warningCount: $($report.summary.warningCount)"
          Write-Host "okCount: $($report.summary.okCount)"
          Write-Host "total: $($report.summary.total)"

          # Show expired secrets
          Write-Host "=== Expired Secrets ==="
          foreach ($s in $report.expired) {
            Write-Host "SECRET: $($s.name) | STATUS: $($s.status) | DAYS_OVERDUE: $($s.daysOverdue)"
          }

          # Exit with failure if any expired secrets found (informational in CI)
          # Change to exit 0 to keep the workflow non-blocking in demo mode
          exit 0

      - name: Run Secret Rotation Validator (Markdown output)
        shell: pwsh
        run: |
          $refDate = [datetime]"2026-04-09"
          . ./SecretRotationValidator.ps1
          $mdOutput = Invoke-SecretRotationValidator `
            -ConfigPath "./fixtures/secrets-fixture.json" `
            -OutputFormat "Markdown" `
            -ReferenceDate $refDate
          Write-Host "=== Markdown Report ==="
          Write-Host $mdOutput

      - name: Upload rotation report
        if: always()
        shell: pwsh
        run: |
          # Generate report artifacts
          $refDate = [datetime]"2026-04-09"
          . ./SecretRotationValidator.ps1
          $json = Invoke-SecretRotationValidator `
            -ConfigPath "./fixtures/secrets-fixture.json" `
            -OutputFormat "JSON" `
            -ReferenceDate $refDate
          $json | Out-File -FilePath rotation-report.json -Encoding utf8
          Write-Host "Report saved to rotation-report.json"
          Get-Content rotation-report.json
