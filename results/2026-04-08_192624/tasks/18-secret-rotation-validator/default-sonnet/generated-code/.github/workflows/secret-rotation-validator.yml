name: Secret Rotation Validator

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    # Run daily at 09:00 UTC to catch any newly-expired secrets
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days before expiry to issue a warning"
        default: "30"
        type: string
      output_format:
        description: "Output format"
        default: "markdown"
        type: choice
        options:
          - markdown
          - json
      reference_date:
        description: "Override today's date (YYYY-MM-DD) for deterministic CI output"
        default: "2024-01-15"
        type: string

# Least-privilege permissions: read-only for all jobs
permissions:
  contents: read

env:
  # Fixed reference date keeps CI output deterministic regardless of when the
  # workflow runs.  All fixture data is calibrated against this date.
  REFERENCE_DATE: "2024-01-15"
  WARNING_DAYS: "30"
  SECRETS_FILE: "fixtures/secrets_config.json"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run the full unit-test suite with pytest
  # Uses the Ubuntu system Python 3 to avoid glibc compatibility issues
  # ---------------------------------------------------------------------------
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run unit tests
        run: python3 -m pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Job 2: Run the validator and emit a Markdown rotation report
  # ---------------------------------------------------------------------------
  validate-markdown:
    name: Rotation Report (Markdown)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run secret rotation validator (markdown)
        run: |
          python3 secret_rotation_validator.py \
            fixtures/secrets_config.json \
            --warning-days 30 \
            --format markdown \
            --reference-date 2024-01-15 || true

  # ---------------------------------------------------------------------------
  # Job 3: Run the validator and emit a JSON rotation report
  # ---------------------------------------------------------------------------
  validate-json:
    name: Rotation Report (JSON)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run secret rotation validator (JSON)
        run: |
          python3 secret_rotation_validator.py \
            fixtures/secrets_config.json \
            --warning-days 30 \
            --format json \
            --reference-date 2024-01-15 || true
