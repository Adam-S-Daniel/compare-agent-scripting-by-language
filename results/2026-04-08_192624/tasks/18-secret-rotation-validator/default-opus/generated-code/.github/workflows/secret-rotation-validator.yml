name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8am UTC
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '14'
      output_format:
        description: 'Output format (json or markdown)'
        required: false
        default: 'json'

permissions:
  contents: read

env:
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
  OUTPUT_FORMAT: ${{ github.event.inputs.output_format || 'json' }}
  CONFIG_FILE: secrets_config.json
  REFERENCE_DATE: '2026-01-15'

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate secret rotation (JSON)
        run: |
          python3 secret_rotation_validator.py \
            --config "$CONFIG_FILE" \
            --warning-days "$WARNING_DAYS" \
            --format json \
            --reference-date "$REFERENCE_DATE"

      - name: Validate secret rotation (Markdown)
        run: |
          python3 secret_rotation_validator.py \
            --config "$CONFIG_FILE" \
            --warning-days "$WARNING_DAYS" \
            --format markdown \
            --reference-date "$REFERENCE_DATE"
