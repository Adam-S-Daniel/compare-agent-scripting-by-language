name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Warning window in days"
        required: false
        default: "7"
      output_format:
        description: "Output format (markdown or json)"
        required: false
        default: "markdown"

permissions:
  contents: read

env:
  WARNING_DAYS: "7"
  REFERENCE_DATE: "2026-04-09"

jobs:
  validate-script:
    name: Validate Script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n secret-rotation-validator.sh

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            apt-get update && apt-get install -y shellcheck
          fi

      - name: Run shellcheck
        run: shellcheck secret-rotation-validator.sh

  test-mixed-status:
    name: Test Mixed Status Secrets
    runs-on: ubuntu-latest
    needs: validate-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            apt-get update && apt-get install -y jq
          fi

      - name: Run validator (JSON)
        run: |
          chmod +x secret-rotation-validator.sh
          output=$(./secret-rotation-validator.sh \
            -c fixtures/mixed-status.json \
            -d "$REFERENCE_DATE" \
            -w "$WARNING_DAYS" \
            -f json)
          echo "$output"
          echo "--- Assertions ---"
          total=$(echo "$output" | jq '.summary.total')
          expired=$(echo "$output" | jq '.summary.expired')
          ok=$(echo "$output" | jq '.summary.ok')
          echo "total=$total expired=$expired ok=$ok"
          [ "$total" -eq 4 ] || { echo "FAIL: expected total=4, got $total"; exit 1; }
          [ "$expired" -eq 3 ] || { echo "FAIL: expected expired=3, got $expired"; exit 1; }
          [ "$ok" -eq 1 ] || { echo "FAIL: expected ok=1, got $ok"; exit 1; }
          db_status=$(echo "$output" | jq -r '.expired[] | select(.name=="DB_PASSWORD") | .status')
          [ "$db_status" = "expired" ] || { echo "FAIL: DB_PASSWORD should be expired"; exit 1; }
          api_status=$(echo "$output" | jq -r '.ok[] | select(.name=="API_KEY") | .status')
          [ "$api_status" = "ok" ] || { echo "FAIL: API_KEY should be ok"; exit 1; }
          echo "ALL ASSERTIONS PASSED"

      - name: Run validator (Markdown)
        run: |
          chmod +x secret-rotation-validator.sh
          output=$(./secret-rotation-validator.sh \
            -c fixtures/mixed-status.json \
            -d "$REFERENCE_DATE" \
            -w "$WARNING_DAYS" \
            -f markdown)
          echo "$output"
          echo "--- Assertions ---"
          echo "$output" | grep -q "Secret Rotation Report" || { echo "FAIL: missing title"; exit 1; }
          echo "$output" | grep -q "Expired | 3" || { echo "FAIL: missing expired count"; exit 1; }
          echo "$output" | grep -q "EXPIRED Secrets" || { echo "FAIL: missing EXPIRED section"; exit 1; }
          echo "$output" | grep -q "DB_PASSWORD" || { echo "FAIL: missing DB_PASSWORD"; exit 1; }
          echo "$output" | grep -q "OK Secrets" || { echo "FAIL: missing OK section"; exit 1; }
          echo "ALL ASSERTIONS PASSED"

  test-all-ok:
    name: Test All OK Secrets
    runs-on: ubuntu-latest
    needs: validate-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            apt-get update && apt-get install -y jq
          fi

      - name: Run validator
        run: |
          chmod +x secret-rotation-validator.sh
          output=$(./secret-rotation-validator.sh \
            -c fixtures/all-ok.json \
            -d "$REFERENCE_DATE" \
            -w "$WARNING_DAYS" \
            -f json)
          echo "$output"
          echo "--- Assertions ---"
          total=$(echo "$output" | jq '.summary.total')
          expired=$(echo "$output" | jq '.summary.expired')
          warning=$(echo "$output" | jq '.summary.warning')
          ok=$(echo "$output" | jq '.summary.ok')
          [ "$total" -eq 2 ] || { echo "FAIL: expected total=2, got $total"; exit 1; }
          [ "$expired" -eq 0 ] || { echo "FAIL: expected expired=0, got $expired"; exit 1; }
          [ "$warning" -eq 0 ] || { echo "FAIL: expected warning=0, got $warning"; exit 1; }
          [ "$ok" -eq 2 ] || { echo "FAIL: expected ok=2, got $ok"; exit 1; }
          echo "ALL ASSERTIONS PASSED"

  test-all-expired:
    name: Test All Expired Secrets
    runs-on: ubuntu-latest
    needs: validate-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            apt-get update && apt-get install -y jq
          fi

      - name: Run validator
        run: |
          chmod +x secret-rotation-validator.sh
          output=$(./secret-rotation-validator.sh \
            -c fixtures/all-expired.json \
            -d "$REFERENCE_DATE" \
            -w "$WARNING_DAYS" \
            -f json)
          echo "$output"
          echo "--- Assertions ---"
          total=$(echo "$output" | jq '.summary.total')
          expired=$(echo "$output" | jq '.summary.expired')
          ok=$(echo "$output" | jq '.summary.ok')
          [ "$total" -eq 2 ] || { echo "FAIL: expected total=2, got $total"; exit 1; }
          [ "$expired" -eq 2 ] || { echo "FAIL: expected expired=2, got $expired"; exit 1; }
          [ "$ok" -eq 0 ] || { echo "FAIL: expected ok=0, got $ok"; exit 1; }
          old_db_days=$(echo "$output" | jq '.expired[] | select(.name=="OLD_DB_PASS") | .days_since')
          [ "$old_db_days" -eq 463 ] || { echo "FAIL: OLD_DB_PASS days_since should be 463, got $old_db_days"; exit 1; }
          echo "ALL ASSERTIONS PASSED"

  test-warning-status:
    name: Test Warning Status
    runs-on: ubuntu-latest
    needs: validate-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            apt-get update && apt-get install -y jq
          fi

      - name: Run validator
        run: |
          chmod +x secret-rotation-validator.sh
          output=$(./secret-rotation-validator.sh \
            -c fixtures/warning-only.json \
            -d "$REFERENCE_DATE" \
            -w 7 \
            -f json)
          echo "$output"
          echo "--- Assertions ---"
          warning=$(echo "$output" | jq '.summary.warning')
          [ "$warning" -eq 1 ] || { echo "FAIL: expected warning=1, got $warning"; exit 1; }
          name=$(echo "$output" | jq -r '.warning[0].name')
          [ "$name" = "EXPIRING_SOON" ] || { echo "FAIL: expected EXPIRING_SOON, got $name"; exit 1; }
          days_until=$(echo "$output" | jq '.warning[0].days_until')
          [ "$days_until" -eq 5 ] || { echo "FAIL: expected days_until=5, got $days_until"; exit 1; }
          echo "ALL ASSERTIONS PASSED"

  test-error-handling:
    name: Test Error Handling
    runs-on: ubuntu-latest
    needs: validate-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            apt-get update && apt-get install -y jq
          fi

      - name: Test missing config
        run: |
          chmod +x secret-rotation-validator.sh
          if ./secret-rotation-validator.sh 2>&1; then
            echo "FAIL: should have exited with error"
            exit 1
          else
            echo "PASS: correctly failed with missing config"
          fi

      - name: Test nonexistent file
        run: |
          if ./secret-rotation-validator.sh -c nonexistent.json 2>&1; then
            echo "FAIL: should have exited with error"
            exit 1
          else
            echo "PASS: correctly failed with nonexistent file"
          fi

      - name: Test invalid format
        run: |
          if ./secret-rotation-validator.sh -c fixtures/mixed-status.json -f xml 2>&1; then
            echo "FAIL: should have exited with error"
            exit 1
          else
            echo "PASS: correctly failed with invalid format"
          fi

      - name: Test empty secrets
        run: |
          if ./secret-rotation-validator.sh -c fixtures/empty.json -d "$REFERENCE_DATE" 2>&1; then
            echo "FAIL: should have exited with error for empty secrets"
            exit 1
          else
            echo "PASS: correctly failed with empty secrets"
          fi
          echo "ALL ERROR HANDLING TESTS PASSED"

  test-custom-warning-window:
    name: Test Custom Warning Window
    runs-on: ubuntu-latest
    needs: validate-script
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            apt-get update && apt-get install -y jq
          fi

      - name: Run with large warning window
        run: |
          chmod +x secret-rotation-validator.sh
          output=$(./secret-rotation-validator.sh \
            -c fixtures/mixed-status.json \
            -d "$REFERENCE_DATE" \
            -w 30 \
            -f json)
          echo "$output"
          echo "--- Assertions ---"
          warning=$(echo "$output" | jq '.summary.warning')
          ok=$(echo "$output" | jq '.summary.ok')
          expired=$(echo "$output" | jq '.summary.expired')
          [ "$expired" -eq 3 ] || { echo "FAIL: expected expired=3, got $expired"; exit 1; }
          [ "$warning" -eq 1 ] || { echo "FAIL: expected warning=1 with 30-day window, got $warning"; exit 1; }
          [ "$ok" -eq 0 ] || { echo "FAIL: expected ok=0 with 30-day window, got $ok"; exit 1; }
          window=$(echo "$output" | jq '.warning_window_days')
          [ "$window" -eq 30 ] || { echo "FAIL: expected warning_window_days=30, got $window"; exit 1; }
          echo "ALL ASSERTIONS PASSED"
