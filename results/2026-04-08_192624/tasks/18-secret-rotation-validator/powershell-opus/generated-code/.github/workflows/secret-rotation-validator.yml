name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Number of days before expiry to trigger warning'
        required: false
        default: '7'
      output_format:
        description: 'Output format (json or markdown)'
        required: false
        default: 'markdown'
      config_file:
        description: 'Path to secrets config file'
        required: false
        default: 'fixtures/mixed-secrets.json'
      reference_date:
        description: 'Reference date for calculations (YYYY-MM-DD)'
        required: false
        default: '2026-04-09'

permissions:
  contents: read

env:
  SRVAL_WARNING_DAYS: '7'
  SRVAL_OUTPUT_FORMAT: 'markdown'
  SRVAL_CONFIG_FILE: 'fixtures/mixed-secrets.json'
  SRVAL_REFERENCE_DATE: '2026-04-09'

jobs:
  validate-secrets:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &> /dev/null; then
            apt-get update && apt-get install -y wget apt-transport-https software-properties-common
            wget -q "https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb"
            dpkg -i packages-microsoft-prod.deb
            apt-get update && apt-get install -y powershell
          fi
          pwsh --version

      - name: Run secret rotation validator (Markdown)
        id: validate_md
        run: |
          pwsh -File Validate-SecretRotation.ps1 \
            -ConfigPath "$SRVAL_CONFIG_FILE" \
            -WarningDays "$SRVAL_WARNING_DAYS" \
            -OutputFormat markdown \
            -ReferenceDate "$SRVAL_REFERENCE_DATE"
        continue-on-error: true

      - name: Run secret rotation validator (JSON)
        id: validate_json
        run: |
          pwsh -File Validate-SecretRotation.ps1 \
            -ConfigPath "$SRVAL_CONFIG_FILE" \
            -WarningDays "$SRVAL_WARNING_DAYS" \
            -OutputFormat json \
            -ReferenceDate "$SRVAL_REFERENCE_DATE"
        continue-on-error: true

      - name: Report result
        run: |
          echo "=== Validation Complete ==="
          echo "Markdown exit code: ${{ steps.validate_md.outcome }}"
          echo "JSON exit code: ${{ steps.validate_json.outcome }}"
          if [ "${{ steps.validate_md.outcome }}" = "failure" ]; then
            echo "WARNING: Expired secrets detected! Review the report above."
          else
            echo "All secrets are within rotation policy."
          fi
