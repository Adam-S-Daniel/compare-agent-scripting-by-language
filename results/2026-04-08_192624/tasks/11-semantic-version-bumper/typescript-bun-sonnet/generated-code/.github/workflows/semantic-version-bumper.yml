name: Semantic Version Bumper

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      commits_fixture:
        description: "Fixture file to use (patch-commits.txt, minor-commits.txt, major-commits.txt)"
        required: false
        default: "minor-commits.txt"
      dry_run:
        description: "Dry run only (no file writes)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test src/semver.test.ts

  bump-patch:
    name: Test Patch Version Bump (fix commits)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Set starting version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '1.1.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Run version bump with patch fixture
        id: patch_bump
        run: |
          NEW_VERSION=$(bun run src/index.ts \
            --commits-file fixtures/patch-commits.txt \
            --changelog-file CHANGELOG.md \
            --date 2026-04-08)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_VERSION}"

      - name: Assert patch version bumped correctly (1.1.0 -> 1.1.1)
        run: |
          EXPECTED="1.1.1"
          ACTUAL="${{ steps.patch_bump.outputs.new_version }}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "FAIL: Expected version ${EXPECTED} but got ${ACTUAL}"
            exit 1
          fi
          echo "PASS: Patch bump produced ${ACTUAL}"

      - name: Verify package.json was updated
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "${VERSION}" != "1.1.1" ]; then
            echo "FAIL: package.json version is ${VERSION}, expected 1.1.1"
            exit 1
          fi
          echo "PASS: package.json updated to ${VERSION}"

      - name: Verify CHANGELOG.md was created
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "FAIL: CHANGELOG.md not found"
            exit 1
          fi
          if ! grep -q "## \[1.1.1\]" CHANGELOG.md; then
            echo "FAIL: CHANGELOG.md missing version header"
            cat CHANGELOG.md
            exit 1
          fi
          echo "PASS: CHANGELOG.md contains version 1.1.1"

  bump-minor:
    name: Test Minor Version Bump (feat commits)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Set starting version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '1.1.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Run version bump with minor fixture
        id: minor_bump
        run: |
          NEW_VERSION=$(bun run src/index.ts \
            --commits-file fixtures/minor-commits.txt \
            --changelog-file CHANGELOG.md \
            --date 2026-04-08)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_VERSION}"

      - name: Assert minor version bumped correctly (1.1.0 -> 1.2.0)
        run: |
          EXPECTED="1.2.0"
          ACTUAL="${{ steps.minor_bump.outputs.new_version }}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "FAIL: Expected version ${EXPECTED} but got ${ACTUAL}"
            exit 1
          fi
          echo "PASS: Minor bump produced ${ACTUAL}"

      - name: Verify changelog has Features section
        run: |
          if ! grep -q "### Features" CHANGELOG.md; then
            echo "FAIL: CHANGELOG.md missing Features section"
            cat CHANGELOG.md
            exit 1
          fi
          echo "PASS: CHANGELOG.md has Features section"

  bump-major:
    name: Test Major Version Bump (breaking commits)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Set starting version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '1.1.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Run version bump with major fixture
        id: major_bump
        run: |
          NEW_VERSION=$(bun run src/index.ts \
            --commits-file fixtures/major-commits.txt \
            --changelog-file CHANGELOG.md \
            --date 2026-04-08)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_VERSION}"

      - name: Assert major version bumped correctly (1.1.0 -> 2.0.0)
        run: |
          EXPECTED="2.0.0"
          ACTUAL="${{ steps.major_bump.outputs.new_version }}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "FAIL: Expected version ${EXPECTED} but got ${ACTUAL}"
            exit 1
          fi
          echo "PASS: Major bump produced ${ACTUAL}"

      - name: Verify changelog has BREAKING CHANGE section
        run: |
          if ! grep -q "BREAKING CHANGE" CHANGELOG.md; then
            echo "FAIL: CHANGELOG.md missing BREAKING CHANGE section"
            cat CHANGELOG.md
            exit 1
          fi
          echo "PASS: CHANGELOG.md has BREAKING CHANGE section"

  workflow-structure-check:
    name: Validate Workflow Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          mv actionlint /usr/local/bin/

      - name: Run actionlint
        run: actionlint .github/workflows/semantic-version-bumper.yml

      - name: Verify script files exist
        run: |
          test -f src/index.ts || (echo "FAIL: src/index.ts not found" && exit 1)
          test -f src/semver.ts || (echo "FAIL: src/semver.ts not found" && exit 1)
          test -f src/changelog.ts || (echo "FAIL: src/changelog.ts not found" && exit 1)
          test -f src/semver.test.ts || (echo "FAIL: src/semver.test.ts not found" && exit 1)
          echo "PASS: All required script files exist"

      - name: Verify fixture files exist
        run: |
          test -f fixtures/patch-commits.txt || (echo "FAIL: fixtures/patch-commits.txt not found" && exit 1)
          test -f fixtures/minor-commits.txt || (echo "FAIL: fixtures/minor-commits.txt not found" && exit 1)
          test -f fixtures/major-commits.txt || (echo "FAIL: fixtures/major-commits.txt not found" && exit 1)
          echo "PASS: All fixture files exist"
