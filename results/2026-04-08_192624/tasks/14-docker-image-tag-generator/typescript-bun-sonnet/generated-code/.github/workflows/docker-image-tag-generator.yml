name: Docker Image Tag Generator

# Trigger on pushes to any branch, PRs, and manual dispatch.
# The workflow generates Docker image tags from git context and
# prints them so CI can consume them (e.g. to tag a real image build).
on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-tags:
    name: Generate Docker Image Tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Bun directly via the official installer so the step
      # works in any ubuntu-based runner without network access to
      # third-party action repos.
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Verify Bun installation
        run: ~/.bun/bin/bun --version

      # Run the tag generator.
      # If fixtures/test-input.json exists (injected by the test harness)
      # it takes precedence over the env-var / GitHub context fallback.
      - name: Generate Docker image tags
        run: ~/.bun/bin/bun run tag-generator.ts
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_TAGS: ""
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
