name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Run unit and integration tests
        run: python3 -m pytest test_semver_bumper.py -v

  bump:
    name: Version Bump (Dry Run)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create VERSION file
        run: echo "0.1.0" > VERSION

      - name: Create mock commits
        run: cat fixtures/commits_minor.txt

      - name: Run version bumper (dry run)
        id: bump
        run: |
          NEW_VERSION=$(python3 semver_bumper.py VERSION --commits-from-stdin --dry-run < fixtures/commits_minor.txt 2>&1 || true)
          {
            echo "output<<EOF"
            echo "$NEW_VERSION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Show bump result
        env:
          BUMP_OUTPUT: ${{ steps.bump.outputs.output }}
        run: echo "$BUMP_OUTPUT"

      - name: Run version bumper (actual)
        run: |
          python3 semver_bumper.py VERSION --commits-from-stdin < fixtures/commits_minor.txt
          echo "New version:"
          cat VERSION
          echo ""
          echo "Changelog:"
          cat CHANGELOG.md
