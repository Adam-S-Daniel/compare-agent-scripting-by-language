name: Semantic Version Bumper

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Install shellcheck
        run: |
          sudo apt-get install -y -qq shellcheck

      - name: Validate script syntax
        run: |
          bash -n semver_bumper.sh
          shellcheck semver_bumper.sh

      - name: Run bats tests
        run: bats test/semver_bumper.bats

  bump:
    name: Version Bump
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create VERSION file if missing
        run: |
          if [ ! -f VERSION ]; then
            echo "0.1.0" > VERSION
          fi

      - name: Run version bump (dry-run)
        id: bump
        run: |
          chmod +x semver_bumper.sh
          output=$(./semver_bumper.sh --version-file VERSION --dry-run 2>&1) || true
          echo "$output"
          new_version=$(echo "$output" | grep -oP '(?<=New version: )\S+' || echo "")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Display new version
        run: echo "Next version would be ${{ steps.bump.outputs.new_version }}"
