name: Semantic Version Bumper

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      commits_file:
        description: "Path to commits file (defaults to tests/fixtures/commits-mixed.txt)"
        required: false
        default: "tests/fixtures/commits-mixed.txt"

permissions:
  contents: read

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -q
          sudo apt-get install -y bats

      - name: Install shellcheck
        run: |
          sudo apt-get install -y shellcheck

      - name: Validate script syntax (bash -n)
        run: bash -n version-bumper.sh

      - name: Lint script with shellcheck
        run: shellcheck version-bumper.sh

      - name: Run bats test suite
        run: bats tests/version-bumper.bats

  demo:
    name: Demo Version Bump
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up demo version file
        run: echo "1.0.0" > version.txt

      - name: Run semantic version bumper (patch)
        id: bump_patch
        run: |
          NEW_VERSION=$(bash version-bumper.sh run version.txt tests/fixtures/commits-patch.txt | grep "New version:" | sed 's/New version: //')
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show bumped version
        run: |
          echo "Version after patch bump: ${{ steps.bump_patch.outputs.new_version }}"

      - name: Reset version file
        run: echo "1.0.0" > version.txt

      - name: Run semantic version bumper (minor - feat commits)
        id: bump_minor
        run: |
          NEW_VERSION=$(bash version-bumper.sh run version.txt tests/fixtures/commits-minor.txt | grep "New version:" | sed 's/New version: //')
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show bumped version
        run: |
          echo "Version after minor bump: ${{ steps.bump_minor.outputs.new_version }}"

      - name: Reset version file
        run: echo "1.0.0" > version.txt

      - name: Run semantic version bumper (major - breaking change)
        id: bump_major
        run: |
          NEW_VERSION=$(bash version-bumper.sh run version.txt tests/fixtures/commits-major.txt | grep "New version:" | sed 's/New version: //')
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show bumped version
        run: |
          echo "Version after major bump: ${{ steps.bump_major.outputs.new_version }}"

      - name: Generate full changelog demo
        run: |
          bash version-bumper.sh generate-changelog "2.0.0" tests/fixtures/commits-mixed.txt
