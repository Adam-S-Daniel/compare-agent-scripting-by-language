; Edge cases fixture — tests boundary conditions

[empty_values]
; Keys with empty values
empty_key =
whitespace_key =

[special_chars]
; URL contains colon and slashes — must remain a string
url    = http://localhost:8080/api
; Windows-style path
path   = C:/Users/testuser/config
; Semicolons embedded in a value (no preceding space — NOT a comment)
csv    = a;b;c

[numbers]
zero     = 0
negative = -5
large    = 2147483647
float    = 1.5

[booleans]
true_kw  = true
false_kw = false
yes_kw   = yes
no_kw    = no
on_kw    = on
off_kw   = off

[mixed]
name    = My Application
version = 3
debug   = false
timeout = 2.5
