; Edge-case fixture: all value types, comments, multi-line, quotes

[types]
bool_true  = true
bool_false = false
bool_yes   = yes
bool_no    = no
bool_on    = on
bool_off   = off
integer    = 42
negative   = -7
float_val  = 3.14
empty_val  =
quoted     = "hello world"

[multiline]
; continuation lines are indented
allowed_ips =
    192.168.1.1
    10.0.0.1
    172.16.0.1

[comments]
# This whole section tests inline comment stripping
name = MyApp   ; trailing semicolon comment
title = Hello  # trailing hash comment
plain = no comment here
