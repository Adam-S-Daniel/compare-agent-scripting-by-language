; Complex configuration with edge cases
# This is also a comment (hash style)

[owner]
name = John Doe
organization = Acme Inc

[server]
host = 0.0.0.0
port = 443
; Multi-line value using continuation backslash
description = This is a long \
  description that spans \
  multiple lines
ssl = true
max_retries = 3
timeout = 30.5

[paths]
home = /usr/local/app
temp = /tmp/app-cache
log = /var/log/app.log

[empty_section]

[special_values]
empty_value =
quoted_string = "hello world"
numeric_string = "12345"
float_val = 3.14
negative = -42
zero = 0
