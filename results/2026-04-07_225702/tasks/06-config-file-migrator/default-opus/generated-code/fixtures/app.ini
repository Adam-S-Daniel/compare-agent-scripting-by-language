; Example application configuration
; Demonstrates sections, comments, types, multi-line values, and edge cases

[server]
host = 0.0.0.0
port = 8080
debug = true
workers = 4

[database]
; Primary database connection
host = db.example.com
port = 5432
name = production
max_connections = 50
ssl = on
connection_string = "host=db.example.com;port=5432;dbname=production"

[logging]
level = info
# Log output paths
outputs = /var/log/app/main.log
    /var/log/app/error.log
    /var/log/app/debug.log
verbose = false
max_size_mb = 100

[cache]
enabled = yes
ttl = 3600
backend = redis
threshold = 0.85

[app]
name = 'My Application'
version = 2.1
description = "A sample app for testing"
empty_value =
