name: Dependency License Checker

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python3 -m pip install --quiet pytest

      - name: Run unit tests
        run: python3 -m pytest tests/test_license_checker.py -v

  license-scan:
    name: License compliance scan
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      REQ_FILE: fixtures/requirements.txt
      CONFIG_FILE: fixtures/licenses.json
      LOOKUP_FILE: fixtures/license_lookup.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run license checker
        run: |
          python3 license_checker.py \
            --requirements "$REQ_FILE" \
            --config "$CONFIG_FILE" \
            --lookup "$LOOKUP_FILE" \
            --output report.json

      - name: Show JSON report
        run: cat report.json
