---
name: dependency-license-checker

# Run on normal pushes/PRs so the compliance gate is enforced in CI, and
# allow manual runs so auditors can re-run on demand.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    env:
      LICENSE_DB: fixtures/current/license-db.tsv
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq if missing
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq
          fi

      - name: Make scripts executable
        run: chmod +x license-checker.sh mock-license-lookup.sh

      # Pick whichever manifest the fixture provides, then run the checker.
      # The script's exit code is surfaced as REPORT_EXIT=<n> so downstream
      # assertions can verify the gate behaviour without failing the job.
      - name: Run dependency license compliance check
        run: |
          set +e
          manifest=""
          if [ -f fixtures/current/package.json ]; then
            manifest=fixtures/current/package.json
          elif [ -f fixtures/current/requirements.txt ]; then
            manifest=fixtures/current/requirements.txt
          else
            echo "No manifest found under fixtures/current/"
            exit 1
          fi
          echo "Using manifest: $manifest"
          ./license-checker.sh "$manifest" fixtures/current/config.json ./mock-license-lookup.sh
          rc=$?
          echo "REPORT_EXIT=$rc"
          exit 0
