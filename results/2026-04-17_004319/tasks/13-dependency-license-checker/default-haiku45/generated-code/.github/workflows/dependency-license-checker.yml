name: Dependency License Checker

on:
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "requirements.txt"
      - "license_checker.py"
      - "config/**"
      - ".github/workflows/dependency-license-checker.yml"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  check-licenses:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pytest-cov

      - name: Run unit tests
        run: python3 -m pytest test_license_checker.py -v --tb=short

      - name: Check package.json licenses
        if: hashFiles('package.json') != ''
        run: |
          python3 license_checker.py package.json config/default-licenses.json package.json
        continue-on-error: true

      - name: Check requirements.txt licenses
        if: hashFiles('requirements.txt') != ''
        run: |
          python3 license_checker.py requirements.txt config/default-licenses.json requirements.txt
        continue-on-error: true

      - name: Generate compliance report
        run: |
          echo "Dependency License Compliance Check Completed"
          echo "All tests passed successfully"

  test-fixtures:
    name: Test with Fixtures
    runs-on: ubuntu-latest
    needs: check-licenses

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install pytest

      - name: "Test with fixture: package.json"
        run: |
          python3 license_checker.py tests/fixtures/package.json config/default-licenses.json package.json
        continue-on-error: true

      - name: "Test with fixture: requirements.txt"
        run: |
          python3 license_checker.py tests/fixtures/requirements.txt config/default-licenses.json requirements.txt
        continue-on-error: true

      - name: "Test with strict config"
        run: |
          python3 license_checker.py tests/fixtures/requirements.txt config/strict-licenses.json requirements.txt
        continue-on-error: true
