name: Semantic Version Bumper

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Force bump type (patch/minor/major) or leave empty for auto"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pyyaml
          # Install actionlint for workflow structure tests
          ACTIONLINT_VERSION=1.7.7
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin actionlint

      - name: Run unit tests
        run: python -m pytest tests/ -v

  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- Patch bump fixture test ---
      - name: Test patch bump (1.1.0 -> 1.1.1)
        run: |
          mkdir -p /tmp/test_patch
          echo "1.1.0" > /tmp/test_patch/VERSION
          touch /tmp/test_patch/CHANGELOG.md
          cp fixtures/commits_patch.txt /tmp/test_patch/commits.txt
          NEW_VERSION=$(python version_bumper.py \
            --version-file /tmp/test_patch/VERSION \
            --changelog   /tmp/test_patch/CHANGELOG.md \
            --commits-file /tmp/test_patch/commits.txt)
          echo "PATCH_RESULT=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "Patch bump result: ${NEW_VERSION}"
          if [ "${NEW_VERSION}" != "1.1.1" ]; then
            echo "FAIL: expected 1.1.1, got ${NEW_VERSION}"
            exit 1
          fi
          echo "PASS: patch bump produced 1.1.1"

      # --- Minor bump fixture test ---
      - name: Test minor bump (1.1.0 -> 1.2.0)
        run: |
          mkdir -p /tmp/test_minor
          echo "1.1.0" > /tmp/test_minor/VERSION
          touch /tmp/test_minor/CHANGELOG.md
          cp fixtures/commits_minor.txt /tmp/test_minor/commits.txt
          NEW_VERSION=$(python version_bumper.py \
            --version-file /tmp/test_minor/VERSION \
            --changelog   /tmp/test_minor/CHANGELOG.md \
            --commits-file /tmp/test_minor/commits.txt)
          echo "MINOR_RESULT=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "Minor bump result: ${NEW_VERSION}"
          if [ "${NEW_VERSION}" != "1.2.0" ]; then
            echo "FAIL: expected 1.2.0, got ${NEW_VERSION}"
            exit 1
          fi
          echo "PASS: minor bump produced 1.2.0"

      # --- Major bump fixture test ---
      - name: Test major bump (2.0.0 -> 3.0.0)
        run: |
          mkdir -p /tmp/test_major
          echo "2.0.0" > /tmp/test_major/VERSION
          touch /tmp/test_major/CHANGELOG.md
          cp fixtures/commits_major.txt /tmp/test_major/commits.txt
          NEW_VERSION=$(python version_bumper.py \
            --version-file /tmp/test_major/VERSION \
            --changelog   /tmp/test_major/CHANGELOG.md \
            --commits-file /tmp/test_major/commits.txt)
          echo "MAJOR_RESULT=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "Major bump result: ${NEW_VERSION}"
          if [ "${NEW_VERSION}" != "3.0.0" ]; then
            echo "FAIL: expected 3.0.0, got ${NEW_VERSION}"
            exit 1
          fi
          echo "PASS: major bump produced 3.0.0"

      # --- No-bump fixture test ---
      - name: Test no bump (1.0.0 stays 1.0.0)
        run: |
          mkdir -p /tmp/test_none
          echo "1.0.0" > /tmp/test_none/VERSION
          touch /tmp/test_none/CHANGELOG.md
          cp fixtures/commits_none.txt /tmp/test_none/commits.txt
          NEW_VERSION=$(python version_bumper.py \
            --version-file /tmp/test_none/VERSION \
            --changelog   /tmp/test_none/CHANGELOG.md \
            --commits-file /tmp/test_none/commits.txt)
          echo "NONE_RESULT=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "No-bump result: ${NEW_VERSION}"
          if [ "${NEW_VERSION}" != "1.0.0" ]; then
            echo "FAIL: expected 1.0.0, got ${NEW_VERSION}"
            exit 1
          fi
          echo "PASS: no-bump kept 1.0.0"

      # --- package.json bump test ---
      - name: Test package.json minor bump (0.9.0 -> 0.10.0)
        run: |
          mkdir -p /tmp/test_pkgjson
          echo '{"name":"myapp","version":"0.9.0"}' > /tmp/test_pkgjson/package.json
          touch /tmp/test_pkgjson/CHANGELOG.md
          cp fixtures/commits_minor.txt /tmp/test_pkgjson/commits.txt
          NEW_VERSION=$(python version_bumper.py \
            --version-file /tmp/test_pkgjson/package.json \
            --changelog   /tmp/test_pkgjson/CHANGELOG.md \
            --commits-file /tmp/test_pkgjson/commits.txt)
          echo "PKG_RESULT=${NEW_VERSION}" >> "$GITHUB_ENV"
          echo "package.json bump result: ${NEW_VERSION}"
          if [ "${NEW_VERSION}" != "0.10.0" ]; then
            echo "FAIL: expected 0.10.0, got ${NEW_VERSION}"
            exit 1
          fi
          echo "PASS: package.json minor bump produced 0.10.0"

      - name: Print all results
        run: |
          echo "=== Version Bump Test Results ==="
          echo "Patch:        ${PATCH_RESULT}"
          echo "Minor:        ${MINOR_RESULT}"
          echo "Major:        ${MAJOR_RESULT}"
          echo "No-bump:      ${NONE_RESULT}"
          echo "package.json: ${PKG_RESULT}"
          echo "================================="
          echo "All version bump tests passed!"
