name: Semantic Version Bumper

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semantic Version Bumper
        shell: pwsh
        run: |
          ./SemanticVersionBumper.ps1 -VersionFile version.json -CommitsFile commits.txt
