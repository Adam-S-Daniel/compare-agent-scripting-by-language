name: Semantic Version Bumper

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      commits_fixture:
        description: "Fixture file for commits (fix-commits, feat-commits, breaking-commits)"
        required: false
        default: "feat-commits"
      dry_run:
        description: "Dry run (do not write files)"
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test

  bump-version:
    name: Bump Semantic Version
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Select commits fixture
        id: fixture
        run: |
          # Use workflow_dispatch input if set, else default to feat-commits
          FIXTURE="${{ github.event.inputs.commits_fixture }}"
          if [ -z "$FIXTURE" ]; then
            FIXTURE="feat-commits"
          fi
          echo "fixture=$FIXTURE" >> "$GITHUB_OUTPUT"
          echo "Using fixture: $FIXTURE"

      - name: Run version bumper (dry run)
        id: bump
        run: |
          DRY_RUN_FLAG="--dry-run"
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            DRY_RUN_FLAG=""
          fi
          bun run src/main.ts \
            --commits "fixtures/${{ steps.fixture.outputs.fixture }}.json" \
            --pkg package.json \
            --date "$(date -u +%Y-%m-%d)" \
            $DRY_RUN_FLAG | tee /tmp/bump-output.txt

      - name: Extract new version
        id: version
        run: |
          NEW_VER=$(grep "^New version:" /tmp/bump-output.txt | sed 's/New version: //')
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Extracted new version: $NEW_VER"

      - name: Show bump summary
        run: |
          echo "=== Version Bump Summary ==="
          cat /tmp/bump-output.txt
          echo ""
          echo "New version: ${{ steps.version.outputs.new_version }}"

  validate-workflow:
    name: Validate Workflow Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify script files exist
        run: |
          test -f src/version-bumper.ts || (echo "Missing src/version-bumper.ts" && exit 1)
          test -f src/main.ts || (echo "Missing src/main.ts" && exit 1)
          test -f src/version-bumper.test.ts || (echo "Missing src/version-bumper.test.ts" && exit 1)
          test -f fixtures/fix-commits.json || (echo "Missing fixtures/fix-commits.json" && exit 1)
          test -f fixtures/feat-commits.json || (echo "Missing fixtures/feat-commits.json" && exit 1)
          test -f fixtures/breaking-commits.json || (echo "Missing fixtures/breaking-commits.json" && exit 1)
          echo "All required files are present"

      - name: Verify fixture JSON is valid
        run: |
          for f in fixtures/*.json; do
            if python3 -m json.tool "$f" > /dev/null; then
              echo "$f: valid JSON"
            else
              echo "$f: INVALID JSON"
              exit 1
            fi
          done
