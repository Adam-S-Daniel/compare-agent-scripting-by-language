name: Semantic Version Bumper

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run semantic version bumper
        run: |
          python3 version_bumper.py \
            --version-file version.txt \
            --commits-file commits.txt \
            --changelog-file CHANGELOG.md

      - name: Show updated files
        run: |
          echo "=== version.txt ==="
          cat version.txt
          echo "=== CHANGELOG.md (head) ==="
          head -20 CHANGELOG.md
