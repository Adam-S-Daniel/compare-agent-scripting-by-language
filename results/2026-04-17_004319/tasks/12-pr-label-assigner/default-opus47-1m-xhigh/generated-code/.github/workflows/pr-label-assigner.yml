---
name: PR Label Assigner

# Runs on PRs to compute labels from changed files, and on push so the `act`
# test harness can exercise the full pipeline locally.
on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      rules_path:
        description: "Path to rules JSON"
        required: false
        default: "rules.json"
      files_path:
        description: "Path to changed files list"
        required: false
        default: "changed_files.txt"

permissions:
  contents: read
  pull-requests: write

env:
  RULES_PATH: "rules.json"
  FILES_PATH: "changed_files.txt"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Install pytest
        run: python3 -m pip install --quiet --break-system-packages pytest

      - name: Run unit tests
        run: python3 -m pytest tests/test_label_assigner.py -v

  assign-labels:
    name: Assign labels
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Verify script exists
        run: test -f label_assigner.py

      - name: Assign labels and print output
        id: assign
        # Prints labels surrounded by machine-readable markers so the test
        # harness can extract the exact label set from the act log.
        run: |
          echo "=== LABELS BEGIN ==="
          python3 label_assigner.py --rules "${RULES_PATH}" --files "${FILES_PATH}"
          echo "=== LABELS END ==="

      - name: Emit JSON summary
        run: |
          echo "=== LABELS JSON BEGIN ==="
          python3 label_assigner.py --rules "${RULES_PATH}" --files "${FILES_PATH}" --format json
          echo "=== LABELS JSON END ==="
