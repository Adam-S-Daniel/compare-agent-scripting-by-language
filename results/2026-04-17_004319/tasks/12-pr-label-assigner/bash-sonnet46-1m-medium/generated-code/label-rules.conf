# PR Label Assignment Rules
# Format: <glob-pattern>:<label>:<priority>
# Higher priority values appear first in output.
# Lines starting with # are comments; blank lines are ignored.

# CI / GitHub Actions
.github/**:ci:20

# API source files
src/api/**:api:20

# Test files (various conventions)
*.test.*:tests:15
*.spec.*:tests:15
**/*.test.*:tests:15
**/*.spec.*:tests:15
test/**:tests:15
tests/**:tests:15

# Documentation
docs/**:documentation:10
*.md:documentation:10
**/*.md:documentation:10

# General source code (lower priority than specific matchers above)
src/**:source:5
lib/**:source:5

# Build / infrastructure
Makefile:build:10
**/*.sh:shell:10
Dockerfile:build:10
docker-compose*.yml:build:10
