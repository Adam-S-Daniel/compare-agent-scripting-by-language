name: PR Label Assigner

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      files_path:
        description: Path to changed-files list (newline separated)
        required: false
        default: changed-files.txt
      rules_path:
        description: Path to rules JSON
        required: false
        default: rules.json

permissions:
  contents: read

env:
  RULES_PATH: ${{ github.event.inputs.rules_path || 'rules.json' }}
  FILES_PATH: ${{ github.event.inputs.files_path || 'changed-files.txt' }}

jobs:
  test:
    name: Run Pester tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './PRLabelAssigner.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  assign:
    name: Assign labels
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assign labels
        shell: pwsh
        run: |
          $rules = $env:RULES_PATH
          $files = $env:FILES_PATH
          if (-not (Test-Path $files)) {
            Write-Host "No changed-files list at $files; skipping."
            'LABELS:' | Tee-Object -FilePath labels.txt
            exit 0
          }
          $labels = & ./PRLabelAssigner.ps1 $rules $files
          $labels | Tee-Object -FilePath labels.txt
