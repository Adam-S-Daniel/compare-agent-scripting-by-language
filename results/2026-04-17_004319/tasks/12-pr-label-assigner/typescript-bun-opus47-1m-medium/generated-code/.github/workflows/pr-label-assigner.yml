name: PR Label Assigner

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      files_json:
        description: JSON array of changed file paths
        required: false
        default: '["src/api/users.ts","docs/readme.md","src/foo.test.ts"]'

permissions:
  contents: read

env:
  FILES_JSON: ${{ github.event.inputs.files_json || '["src/api/users.ts","docs/readme.md","src/foo.test.ts"]' }}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run bun unit tests
        run: bun test src/

  assign-labels:
    name: Assign labels
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run label assigner
        env:
          FILES_JSON: ${{ env.FILES_JSON }}
        run: |
          bun run src/cli.ts --rules fixtures/rules.json --files-json "$FILES_JSON"
