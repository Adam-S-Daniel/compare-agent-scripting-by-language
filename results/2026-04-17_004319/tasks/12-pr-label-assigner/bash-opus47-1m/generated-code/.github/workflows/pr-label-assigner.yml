name: PR Label Assigner

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RULES_FILE: fixtures/rules.conf
  FILES_FILE: fixtures/files.txt
  BATS_BIN: vendor/bats-core/bin/bats

jobs:
  lint:
    name: Lint script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate bash syntax
        run: bash -n label-assigner.sh
      - name: Check script is executable bash
        run: head -n1 label-assigner.sh | grep -q '^#!/usr/bin/env bash$'

  test:
    name: Bats tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Verify vendored bats is present
        run: |
          test -x "$BATS_BIN" || {
            echo "missing vendored bats" >&2
            exit 1
          }
      - name: Run bats
        run: |
          "$BATS_BIN" tests/label_assigner.bats

  assign-labels:
    name: Assign labels from fixtures
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run label assigner on fixtures
        id: assign
        run: |
          set -euo pipefail
          chmod +x label-assigner.sh
          echo "===LABELS_START==="
          ./label-assigner.sh "$RULES_FILE" "$FILES_FILE" | tee labels.out
          echo "===LABELS_END==="
      - name: Show label summary
        run: |
          count=$(wc -l < labels.out | tr -d ' ')
          echo "Applied $count label(s)"
