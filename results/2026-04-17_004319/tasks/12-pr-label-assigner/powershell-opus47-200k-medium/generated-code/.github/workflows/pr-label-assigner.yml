name: PR Label Assigner

# Triggered on PR events in real usage; we include push + workflow_dispatch so
# the same workflow can be exercised locally with `act push`.
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      case_file:
        description: "Fixture file (relative path) containing the changed-files JSON array"
        required: false
        default: "fixtures/case-mixed.json"

permissions:
  contents: read

env:
  # Fallbacks only; the step below prefers any externally-provided env var
  # (e.g. `act --env CASE_FILE=...`) before falling back to these defaults.
  DEFAULT_CASE_FILE: fixtures/case-mixed.json
  DEFAULT_RULES_FILE: fixtures/rules.json

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $result = Invoke-Pester -Path tests/LabelAssigner.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester failed: $($result.FailedCount) test(s) failed"
          }

  assign-labels:
    name: Assign labels from fixture
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run label assigner
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Prefer externally-provided env vars (from `act --env`) over the
          # workflow-level defaults. This keeps a single workflow usable both
          # in real CI and driven by the local harness.
          $caseFile = if ($env:CASE_FILE)  { $env:CASE_FILE }  else { $env:DEFAULT_CASE_FILE }
          $rulesFile = if ($env:RULES_FILE) { $env:RULES_FILE } else { $env:DEFAULT_RULES_FILE }

          Write-Host "::group::Inputs"
          Write-Host "Case file : $caseFile"
          Write-Host "Rules file: $rulesFile"
          Write-Host "::endgroup::"

          $labels = ./scripts/Invoke-LabelAssigner.ps1 `
            -FilesPath $caseFile `
            -RulesPath $rulesFile

          # Emit a clearly delimited block the harness can parse out of the act log.
          Write-Host "===LABELS-BEGIN==="
          if ($labels) { foreach ($l in $labels) { Write-Host $l } }
          Write-Host "===LABELS-END==="
