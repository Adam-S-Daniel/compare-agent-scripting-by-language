name: PR Label Assigner

# Runs Pester unit tests for the LabelAssigner module and then uses the
# script itself to compute labels from a committed fixture file
# (`changed-files.json`). The test harness commits a different fixture per
# case and invokes `act push`, then asserts on the delimited output block.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      changed_files_path:
        description: 'Path to a JSON file containing changed file paths'
        required: false
        default: 'changed-files.json'
      rules_path:
        description: 'Path to the rules JSON file'
        required: false
        default: 'tests/fixtures/sample-rules.json'

permissions:
  contents: read

env:
  CHANGED_FILES_PATH: ${{ github.event.inputs.changed_files_path || 'changed-files.json' }}
  RULES_PATH: ${{ github.event.inputs.rules_path || 'tests/fixtures/sample-rules.json' }}

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $result = Invoke-Pester -Path ./tests -PassThru -Output Detailed
          if ($result.FailedCount -gt 0) {
            throw "Pester failures: $($result.FailedCount)"
          }
          Write-Output "PESTER_PASSED=$($result.PassedCount)"

  assign:
    name: Assign labels
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assign labels from fixture
        id: assign
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rules = "${env:RULES_PATH}"
          $files = "${env:CHANGED_FILES_PATH}"
          if (-not (Test-Path $rules)) { throw "Rules file not found: $rules" }
          if (-not (Test-Path $files)) { throw "Changed files list not found: $files" }

          Write-Output "BEGIN_LABELS"
          & ./scripts/assign-labels.ps1 -RulesPath $rules -ChangedFilesPath $files
          Write-Output "END_LABELS"
