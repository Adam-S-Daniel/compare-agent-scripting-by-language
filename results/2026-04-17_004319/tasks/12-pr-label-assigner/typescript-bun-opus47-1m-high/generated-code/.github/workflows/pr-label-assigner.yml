name: PR Label Assigner

# Run on pushes, PRs, manual dispatch, and daily schedule so the pipeline is
# exercised in several real CI contexts.
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      fixture:
        description: "Path to a fixture directory (relative to repo root)"
        required: false
        default: "fixtures/default"
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pull-requests: write

env:
  BUN_VERSION: "1.3.11"

jobs:
  test-and-label:
    name: Unit tests and label assignment
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        # Official Bun setup action. Works inside act's ubuntu image.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Verify Bun is available
        run: bun --version

      - name: Run unit tests
        # Only run the pure unit tests here. workflow.test.ts drives act itself
        # and must not run inside the act-spawned container.
        run: bun test labeler.test.ts

      - name: Show selected fixture
        run: |
          FIXTURE_DIR="${FIXTURE_DIR:-fixtures/default}"
          echo "Using fixture: $FIXTURE_DIR"
          ls -la "$FIXTURE_DIR"
        env:
          FIXTURE_DIR: ${{ github.event.inputs.fixture }}

      - name: Assign labels for fixture
        id: assign
        run: |
          FIXTURE_DIR="${FIXTURE_DIR:-fixtures/default}"
          RULES_FILE="$FIXTURE_DIR/rules.json"
          if [ ! -f "$RULES_FILE" ]; then
            RULES_FILE="rules.json"
          fi
          echo "Rules: $RULES_FILE"
          echo "Files: $FIXTURE_DIR/files.txt"
          bun run cli.ts --config "$RULES_FILE" --files "$FIXTURE_DIR/files.txt"
        env:
          FIXTURE_DIR: ${{ github.event.inputs.fixture }}

      - name: Verify expected labels (if fixture provides them)
        run: |
          FIXTURE_DIR="${FIXTURE_DIR:-fixtures/default}"
          EXPECTED="$FIXTURE_DIR/expected.txt"
          if [ ! -f "$EXPECTED" ]; then
            echo "No expected.txt in $FIXTURE_DIR; skipping comparison"
            exit 0
          fi
          RULES_FILE="$FIXTURE_DIR/rules.json"
          if [ ! -f "$RULES_FILE" ]; then
            RULES_FILE="rules.json"
          fi
          ACTUAL=$(bun run cli.ts --config "$RULES_FILE" --files "$FIXTURE_DIR/files.txt" \
            | sed -n '/^LABELS_BEGIN$/,/^LABELS_END$/p' \
            | sed '1d;$d')
          EXPECTED_CONTENT=$(cat "$EXPECTED")
          echo "--- expected ---"
          echo "$EXPECTED_CONTENT"
          echo "--- actual ---"
          echo "$ACTUAL"
          if [ "$ACTUAL" = "$EXPECTED_CONTENT" ]; then
            echo "ASSERTION_RESULT=pass"
          else
            echo "ASSERTION_RESULT=fail"
            exit 1
          fi
        env:
          FIXTURE_DIR: ${{ github.event.inputs.fixture }}
