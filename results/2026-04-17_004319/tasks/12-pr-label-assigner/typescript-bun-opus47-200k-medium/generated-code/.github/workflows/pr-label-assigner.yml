name: PR Label Assigner

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      files:
        description: 'JSON array of changed file paths'
        required: false
        default: '[]'

permissions:
  contents: read
  pull-requests: write

env:
  RULES_FILE: rules.json
  FIXTURE_FILE: fixture-files.json

jobs:
  label:
    name: Assign labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            curl -fsSL https://bun.sh/install | bash
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          else
            echo "bun already installed: $(bun --version)"
          fi

      - name: Run unit tests
        run: bun test

      - name: Compute labels from fixture
        id: labels
        run: |
          if [ ! -f "$FIXTURE_FILE" ]; then
            echo '["src/api/users.ts","src/api/users.test.ts","docs/intro.md","README.md",".github/workflows/ci.yml"]' > "$FIXTURE_FILE"
          fi
          output="$(bun run cli.ts --rules "$RULES_FILE" --files "$FIXTURE_FILE")"
          echo "Raw output: $output"
          labels="$(echo "$output" | bun -e 'const d=JSON.parse(await Bun.stdin.text()); console.log(d.labels.join(","))')"
          echo "labels=$labels" >> "$GITHUB_OUTPUT"
          echo "FINAL_LABELS=$labels"

      - name: Print summary
        run: |
          echo "Assigned labels: ${{ steps.labels.outputs.labels }}"
