name: PR Label Assigner

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assign-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          if ! command -v actionlint &>/dev/null; then
            curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
              | bash -s -- latest /usr/local/bin
          fi
          actionlint --version

      - name: Install Pester (no-op if pre-installed)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester)) {
            Install-Module -Name Pester -Force -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0 -ErrorAction Stop
          Write-Output "Pester version: $((Get-Module Pester).Version)"

      - name: Run Pester unit tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './PrLabelAssigner.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Normal'
          Invoke-Pester -Configuration $cfg

      - name: Run integration tests
        shell: pwsh
        run: |
          ./Test-PrLabelAssigner.ps1
