---
# Environment matrix generator pipeline.
#
# Runs on push / PR and can be triggered manually. The unit-test job
# exercises the matrix generator with Bun's test runner, then the
# generate-matrix job runs the CLI against a config file and prints the
# resulting matrix JSON (so `act` captures it for the test harness to
# parse).

name: environment-matrix-generator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      config_path:
        description: Path to matrix config JSON
        required: false
        default: fixtures/default.json

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"
  # Default config used when the workflow isn't invoked via workflow_dispatch
  # (i.e. on push). The test harness overwrites this file per test case.
  CONFIG_PATH_DEFAULT: fixtures/default.json

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Verify Bun
        run: bun --version

      - name: Run unit tests
        run: bun test tests/matrix.test.ts

  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      total-size: ${{ steps.gen.outputs.total-size }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Resolve config path
        id: cfg
        env:
          INPUT_PATH: ${{ github.event.inputs.config_path }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_PATH:-}" ]; then
            path="$INPUT_PATH"
          else
            path="$CONFIG_PATH_DEFAULT"
          fi
          if [ ! -f "$path" ]; then
            echo "::error::config file not found: $path" >&2
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Using config: $path"

      - name: Generate matrix
        id: gen
        env:
          CONFIG_PATH: ${{ steps.cfg.outputs.path }}
        run: |
          set -euo pipefail
          bun run src/cli.ts "$CONFIG_PATH" --output matrix.json
          echo "----- MATRIX BEGIN -----"
          cat matrix.json
          echo "----- MATRIX END -----"
          # Extract single-line values for downstream consumers.
          matrix_line=$(bun -e 'const j = JSON.parse(await Bun.file("matrix.json").text()); console.log(JSON.stringify(j.matrix));')
          total=$(bun -e 'const j = JSON.parse(await Bun.file("matrix.json").text()); console.log(j.totalSize);')
          echo "matrix=$matrix_line" >> "$GITHUB_OUTPUT"
          echo "total-size=$total" >> "$GITHUB_OUTPUT"
          echo "TOTAL_SIZE=$total"

      - name: Summarize
        run: |
          set -euo pipefail
          echo "Generated matrix with ${{ steps.gen.outputs.total-size }} combinations."
          echo "::group::matrix.json"
          cat matrix.json
          echo "::endgroup::"
