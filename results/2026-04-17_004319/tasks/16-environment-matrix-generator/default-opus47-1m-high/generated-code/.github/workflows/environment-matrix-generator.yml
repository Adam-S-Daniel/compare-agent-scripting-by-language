name: environment-matrix-generator

# Triggers cover ad-hoc dispatch, PR validation, mainline pushes, and a daily
# smoke to catch environment drift.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

# Pin Python version in one place so jobs stay in lock-step.
env:
  PYTHON_VERSION: '3.12'

jobs:
  unit-tests:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run unit tests
        # Restrict to the generator's unit tests; tests/test_workflow.py is the
        # outer harness that invokes act itself and must not run inside act.
        run: python -m pytest tests/test_matrix_gen.py -v

  generate-matrix:
    name: Generate matrices from fixtures
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # --- Fixture 1: basic cartesian product ---------------------------------
      - name: Generate basic matrix
        id: basic
        run: |
          echo "=== FIXTURE: basic.json ==="
          OUT="$(python matrix_gen.py fixtures/basic.json)"
          echo "MATRIX_BASIC=${OUT}"
          echo "${OUT}" > /tmp/basic.json
          # Sanity: must contain exactly 4 combinations.
          COUNT="$(python -c 'import json,sys;print(len(json.load(open("/tmp/basic.json"))["include"]))')"
          echo "basic_count=${COUNT}"
          test "${COUNT}" = "4"
          # fail-fast=true, max-parallel=4 must round-trip.
          python -c 'import json;d=json.load(open("/tmp/basic.json"));assert d["fail-fast"] is True;assert d["max-parallel"]==4'

      # --- Fixture 2: excludes + include augment ------------------------------
      - name: Generate with-excludes matrix
        id: excludes
        run: |
          echo "=== FIXTURE: with-excludes.json ==="
          OUT="$(python matrix_gen.py fixtures/with-excludes.json)"
          echo "MATRIX_EXCLUDES=${OUT}"
          echo "${OUT}" > /tmp/excl.json
          COUNT="$(python -c 'import json;print(len(json.load(open("/tmp/excl.json"))["include"]))')"
          echo "excl_count=${COUNT}"
          test "${COUNT}" = "8"
          # The include rule added coverage:true to the ubuntu+3.12+default combo.
          python -c 'import json;combos=json.load(open("/tmp/excl.json"))["include"];c=[x for x in combos if x.get("coverage")];assert len(c)==1 and c[0]["os"]=="ubuntu-latest" and c[0]["python"]=="3.12"'
          # No windows+experimental and no macos+3.11 survived the excludes.
          python -c 'import json;combos=json.load(open("/tmp/excl.json"))["include"];assert not any(c["os"]=="windows-latest" and c["flag"]=="experimental" for c in combos);assert not any(c["os"]=="macos-latest" and c["python"]=="3.11" for c in combos)'

      # --- Fixture 3: oversized -> must fail with max-size error --------------
      - name: Reject oversized matrix
        id: oversized
        run: |
          echo "=== FIXTURE: oversized.json (expect failure) ==="
          set +e
          OUT="$(python matrix_gen.py fixtures/oversized.json 2>&1)"
          RC=$?
          set -e
          echo "OVERSIZED_OUTPUT=${OUT}"
          echo "OVERSIZED_RC=${RC}"
          test "${RC}" != "0"
          echo "${OUT}" | grep -q "exceeds max-size 10"
          echo "${OUT}" | grep -q "48 combinations"

      - name: Report success
        run: echo "ALL_FIXTURES_PASSED=yes"
