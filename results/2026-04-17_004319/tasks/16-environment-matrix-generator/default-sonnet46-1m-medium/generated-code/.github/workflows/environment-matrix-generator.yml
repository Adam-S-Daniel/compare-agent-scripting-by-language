name: Environment Matrix Generator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run unit tests
        run: python3 -m pytest tests/ -v

  generate-and-verify:
    name: Generate Matrices and Verify Output
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: TC1 basic_matrix — generate and verify
        id: tc1
        run: |
          output=$(python3 matrix_generator.py fixtures/basic_matrix.json)
          {
            echo "MATRIX_OUTPUT_TC1<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "--- TC1 OUTPUT ---"
          echo "$output"
          # Assert expected values
          echo "$output" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['fail-fast'] == False, 'fail-fast should be False'
          assert d['max-parallel'] == 4, 'max-parallel should be 4'
          assert 'ubuntu-latest' in d['matrix']['os'], 'ubuntu-latest missing'
          assert 'windows-latest' in d['matrix']['os'], 'windows-latest missing'
          assert d['matrix']['python-version'] == ['3.9', '3.10', '3.11'], 'python versions wrong'
          print('TC1 PASSED: basic_matrix verified')
          "

      - name: TC2 matrix_with_excludes — generate and verify
        id: tc2
        run: |
          output=$(python3 matrix_generator.py fixtures/matrix_with_excludes.json)
          echo "--- TC2 OUTPUT ---"
          echo "$output"
          echo "$output" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['fail-fast'] == True, 'fail-fast should be True'
          assert d['max-parallel'] == 2, 'max-parallel should be 2'
          excl = d['matrix']['exclude']
          assert excl == [{'os': 'macos-latest', 'python-version': '3.9'}], f'exclude wrong: {excl}'
          print('TC2 PASSED: matrix_with_excludes verified')
          "

      - name: TC3 matrix_with_includes — generate and verify
        id: tc3
        run: |
          output=$(python3 matrix_generator.py fixtures/matrix_with_includes.json)
          echo "--- TC3 OUTPUT ---"
          echo "$output"
          echo "$output" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          incl = d['matrix']['include']
          assert len(incl) == 1, f'include should have 1 entry, got {len(incl)}'
          assert incl[0]['os'] == 'windows-latest', f'include os wrong: {incl}'
          assert incl[0]['python-version'] == '3.11', f'include python-version wrong'
          assert incl[0]['experimental'] == True, 'experimental flag should be True'
          print('TC3 PASSED: matrix_with_includes verified')
          "

      - name: TC4 matrix_exceeds_max_size — verify error
        id: tc4
        run: |
          set +e
          output=$(python3 matrix_generator.py fixtures/matrix_exceeds_max_size.json 2>&1)
          exit_code=$?
          set -e
          echo "--- TC4 OUTPUT (exit=$exit_code) ---"
          echo "$output"
          if [ "$exit_code" -eq 0 ]; then
            echo "TC4 FAILED: expected non-zero exit but got 0"
            exit 1
          fi
          if echo "$output" | grep -qi "exceeds"; then
            echo "TC4 PASSED: matrix_exceeds_max_size correctly errors"
          else
            echo "TC4 FAILED: expected 'exceeds' in error output"
            exit 1
          fi

      - name: Summary
        run: |
          echo "All test cases passed."
          echo "TC1: basic_matrix with fail-fast=false, max-parallel=4, 2 OS x 3 python-versions"
          echo "TC2: matrix_with_excludes with fail-fast=true, max-parallel=2, exclude entry"
          echo "TC3: matrix_with_includes with include entry containing experimental flag"
          echo "TC4: matrix_exceeds_max_size correctly returns error with 'exceeds' message"
