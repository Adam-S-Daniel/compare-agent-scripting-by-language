name: Environment Matrix Generator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  FIXTURE_DIR: ./fixtures

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Run.Throw = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  generate-matrix:
    name: Generate matrices from fixtures
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrices
        shell: pwsh
        run: |
          ./src/Invoke-MatrixGenerator.ps1 -FixtureDir $env:FIXTURE_DIR
