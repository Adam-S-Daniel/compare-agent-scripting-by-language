name: Environment Matrix Generator

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  unit-tests:
    name: Unit tests (bun test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run unit tests
        run: bun test

  generate-matrix:
    name: Generate matrix from fixtures
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Case 1 basic cartesian product (2x2)
        id: basic
        run: |
          echo "=== CASE basic ==="
          bun run src/cli.ts fixtures/basic.json | tee /tmp/basic.json
          total=$(jq '.total' /tmp/basic.json)
          echo "BASIC_TOTAL=${total}"
          if [ "${total}" != "4" ]; then
            echo "basic: expected total 4, got ${total}" >&2
            exit 1
          fi
          ff=$(jq -r '.strategy["fail-fast"]' /tmp/basic.json)
          if [ "${ff}" != "true" ]; then
            echo "basic: expected fail-fast=true, got ${ff}" >&2
            exit 1
          fi
          mp=$(jq -r '.strategy["max-parallel"]' /tmp/basic.json)
          if [ "${mp}" != "4" ]; then
            echo "basic: expected max-parallel=4, got ${mp}" >&2
            exit 1
          fi

      - name: Case 2 exclude rules drop combinations
        id: exclude-case
        run: |
          echo "=== CASE with-exclude ==="
          bun run src/cli.ts fixtures/with-exclude.json | tee /tmp/exclude.json
          total=$(jq '.total' /tmp/exclude.json)
          echo "EXCLUDE_TOTAL=${total}"
          if [ "${total}" != "7" ]; then
            echo "exclude: expected total 7 (3x3 - 2), got ${total}" >&2
            exit 1
          fi
          has_dropped=$(jq '[.strategy.matrix.include[] | select(.os=="windows-latest" and .node=="18")] | length' /tmp/exclude.json)
          if [ "${has_dropped}" != "0" ]; then
            echo "exclude: dropped combination still present" >&2
            exit 1
          fi

      - name: Case 3 include rule adds new combination
        id: include-case
        run: |
          echo "=== CASE with-include ==="
          bun run src/cli.ts fixtures/with-include.json | tee /tmp/include.json
          total=$(jq '.total' /tmp/include.json)
          echo "INCLUDE_TOTAL=${total}"
          if [ "${total}" != "2" ]; then
            echo "include: expected total 2, got ${total}" >&2
            exit 1
          fi
          mac=$(jq '[.strategy.matrix.include[] | select(.os=="macos-latest" and .experimental==true)] | length' /tmp/include.json)
          if [ "${mac}" != "1" ]; then
            echo "include: macos entry missing" >&2
            exit 1
          fi

      - name: Case 4 maxSize enforcement fails loudly
        id: max-size
        run: |
          echo "=== CASE too-big ==="
          set +e
          bun run src/cli.ts fixtures/too-big.json
          code=$?
          set -e
          echo "TOO_BIG_EXIT=${code}"
          if [ "${code}" != "2" ]; then
            echo "too-big: expected exit 2, got ${code}" >&2
            exit 1
          fi

      - name: Summary
        run: |
          echo "All matrix-case assertions passed."
