name: Environment Matrix Generator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Pester Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (if not present)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester)) {
            Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = "./New-BuildMatrix.Tests.ps1"
          $cfg.Output.Verbosity = "Detailed"
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = "test-results.xml"
          $cfg.TestResult.OutputFormat = "NUnitXml"
          $result = Invoke-Pester -Configuration $cfg
          if ($result.FailedCount -gt 0) {
            Write-Error "::error::$($result.FailedCount) test(s) failed."
            exit 1
          }
          Write-Host "All $($result.PassedCount) tests passed."

  generate-sample:
    name: Generate Sample Matrix
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester (if not present)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester)) {
            Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck
          }

      - name: Write sample config
        shell: pwsh
        run: |
          $config = @{
            dimensions = @{
              os            = @("ubuntu-latest", "windows-latest", "macos-latest")
              "node-version" = @("18", "20", "22")
              experimental  = @($true, $false)
            }
            include = @(
              @{ os = "ubuntu-latest"; "extra-check" = $true }
            )
            exclude = @(
              @{ os = "windows-latest"; "node-version" = "18" }
            )
            "max-parallel" = 6
            "fail-fast"    = $false
          }
          $config | ConvertTo-Json -Depth 10 | Set-Content sample-config.json
          Write-Host "Wrote sample-config.json"

      - name: Generate matrix from sample config
        shell: pwsh
        run: |
          # Use pwsh -File to create a fresh process so $ErrorActionPreference is neutral
          $output = pwsh -File ./New-BuildMatrix.ps1 -ConfigPath sample-config.json
          Write-Host "=== Generated Matrix ==="
          Write-Host $output
          $parsed = $output | ConvertFrom-Json
          Write-Host "=== Matrix Summary ==="
          Write-Host "OS count      : $($parsed.matrix.os.Count)"
          Write-Host "Node versions : $($parsed.matrix.'node-version' -join ', ')"
          Write-Host "Fail-fast     : $($parsed.'fail-fast')"
          Write-Host "Max-parallel  : $($parsed.'max-parallel')"
          Write-Host "Includes      : $($parsed.matrix.include.Count)"
          Write-Host "Excludes      : $($parsed.matrix.exclude.Count)"

      - name: Validate matrix size guard (expect failure)
        shell: pwsh
        run: |
          $oversized = @{
            dimensions = @{
              os      = 1..10 | ForEach-Object { "os-$_" }
              version = 1..10 | ForEach-Object { "v$_" }
              feature = 1..10 | ForEach-Object { "f$_" }
            }
          }
          $oversized | ConvertTo-Json -Depth 10 | Set-Content oversized-config.json
          # Pipe through ForEach-Object to convert ErrorRecord objects to plain strings,
          # preventing them from propagating into this step's error stream.
          $output = pwsh -File ./New-BuildMatrix.ps1 -ConfigPath oversized-config.json 2>&1 |
            ForEach-Object { "$_" }
          $exitCode = $LASTEXITCODE
          if ($exitCode -eq 0) {
            Write-Error "Expected matrix size guard to reject oversized config."
            exit 1
          }
          Write-Host "Matrix size guard correctly rejected oversized config."
          $output | ForEach-Object { Write-Host $_ }
          exit 0
