name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    name: Aggregate test results
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aggregate fixtures and write summary
        shell: pwsh
        run: |
          ./Invoke-AggregatorCli.ps1 -InputPath fixtures -OutputPath summary.md
          Write-Host '--- summary.md ---'
          Get-Content summary.md
