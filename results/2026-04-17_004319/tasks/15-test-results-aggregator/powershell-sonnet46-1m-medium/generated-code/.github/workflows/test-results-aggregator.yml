name: Test Results Aggregator

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Test Results Aggregator
        shell: pwsh
        run: |
          ./Invoke-TestResultsAggregator.ps1 -InputPath ./fixtures
