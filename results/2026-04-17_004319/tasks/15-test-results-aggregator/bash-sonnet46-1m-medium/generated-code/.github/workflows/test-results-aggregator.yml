name: Test Results Aggregator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq jq python3 bats shellcheck
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          mv ./actionlint /usr/local/bin/

      - name: Validate script syntax
        run: |
          bash -n aggregate.sh
          shellcheck aggregate.sh

      - name: Run bats unit tests
        run: bats tests/aggregate.bats

      - name: Generate test results summary
        run: |
          chmod +x aggregate.sh
          ./aggregate.sh fixtures/ -o test-summary.md

      - name: Print summary to log
        run: cat test-summary.md

      - name: Write to GitHub Step Summary
        run: cat test-summary.md >> "$GITHUB_STEP_SUMMARY"
