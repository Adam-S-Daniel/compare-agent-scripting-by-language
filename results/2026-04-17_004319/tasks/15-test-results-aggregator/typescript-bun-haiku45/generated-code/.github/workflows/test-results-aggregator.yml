name: Test Results Aggregator

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node: '20'
          - os: ubuntu-latest
            node: '21'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test

      - name: Create test fixtures
        run: |
          mkdir -p test-results
          if [ -d fixtures ]; then
            for file in fixtures/*.xml; do
              if [ -f "$file" ]; then
                cp "$file" test-results/
              fi
            done
            for file in fixtures/*.json; do
              if [ -f "$file" ]; then
                cp "$file" test-results/
              fi
            done
          fi
          ls -la test-results/

      - name: Aggregate test results
        if: always()
        continue-on-error: true
        run: bun run src/main.ts test-results/ test-summary.md

      - name: Upload test summary to job summary
        if: always()
        run: |
          if [ -f test-summary.md ]; then
            cat test-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show results
        if: always()
        run: |
          echo "Test Results Generated:"
          if [ -f test-summary.md ]; then
            cat test-summary.md
          else
            echo "No test summary generated"
          fi

  validate-workflow:
    name: Validate Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate with actionlint
        run: |
          if command -v actionlint &> /dev/null; then
            actionlint .github/workflows/test-results-aggregator.yml
          else
            echo "actionlint not found, skipping validation"
          fi

      - name: Verify script files exist
        run: |
          test -f src/parser.ts || { echo "Error: src/parser.ts not found"; exit 1; }
          test -f src/aggregator.ts || { echo "Error: src/aggregator.ts not found"; exit 1; }
          test -f src/markdown.ts || { echo "Error: src/markdown.ts not found"; exit 1; }
          test -f src/main.ts || { echo "Error: src/main.ts not found"; exit 1; }
          echo "All required script files exist"
