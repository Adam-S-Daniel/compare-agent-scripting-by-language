name: Test Results Aggregator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      fixture_dir:
        description: Path (relative to repo root) containing *.xml / *.json test result files
        required: false
        default: tests/fixtures/default
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

env:
  # Path scanned by aggregate.ps1. Workflow_dispatch input wins when set;
  # otherwise the default is used. The act harness rewrites this default
  # in its temp-repo copy of this file to point each test scenario at the
  # right fixture subdir (tests/fixtures/<scenario>).
  FIXTURE_DIR: ${{ github.event.inputs.fixture_dir || 'tests/fixtures/default' }}

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path tests -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester: $($result.FailedCount) test(s) failed"
          }
          Write-Host "Pester: $($result.PassedCount) test(s) passed"

  aggregate:
    name: Aggregate test results
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve fixture dir
        id: fixture
        shell: pwsh
        env:
          OVERRIDE_FIXTURE_DIR: ${{ env.FIXTURE_DIR }}
        run: |
          $dir = $env:OVERRIDE_FIXTURE_DIR
          if (-not $dir) { $dir = 'tests/fixtures/default' }
          if (-not (Test-Path $dir)) {
            throw "Fixture directory not found: $dir"
          }
          Write-Host "Using fixture dir: $dir"
          "dir=$dir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run aggregator
        shell: pwsh
        env:
          FIXTURE_DIR_RESOLVED: ${{ steps.fixture.outputs.dir }}
        run: |
          $dir = $env:FIXTURE_DIR_RESOLVED
          ./aggregate.ps1 -InputDir $dir -OutFile summary.md

      - name: Upload summary artifact
        # Skipped under act (no ACTIONS_RUNTIME_TOKEN in the local runner).
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-summary
          path: summary.md
          if-no-files-found: error
