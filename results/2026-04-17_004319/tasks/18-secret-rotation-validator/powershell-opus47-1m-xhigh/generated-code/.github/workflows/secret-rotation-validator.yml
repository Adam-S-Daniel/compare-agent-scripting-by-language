name: Secret Rotation Validator

# Triggers:
#   - push / pull_request: run on every change to validate the script & CI.
#   - schedule: nightly check so a PR isn't needed to notice a rotation slip.
#   - workflow_dispatch: manual run, allows overriding warning window + format.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      warning_days:
        description: Days before expiry to flag as "warning"
        required: false
        default: '7'
      output_format:
        description: Output format (markdown or json)
        required: false
        default: markdown

permissions:
  contents: read

# Sensible defaults — test harness overrides these via `env:` on a synthetic
# workflow_dispatch event when needed.
env:
  SECRETS_PATH: fixtures/secrets.json
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}
  OUTPUT_FORMAT: ${{ github.event.inputs.output_format || 'markdown' }}
  # Pinned "current time" so tests are deterministic. Override in the env
  # file (GITHUB_ENV) if you want real time.
  NOW: '2026-04-17T00:00:00'

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/SecretRotationValidator.Tests.ps1'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  rotation-report:
    name: Generate rotation report
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate secrets config exists
        shell: pwsh
        run: |
          if (-not (Test-Path -Path $env:SECRETS_PATH)) {
            Write-Error "Secrets config not found at $env:SECRETS_PATH"
            exit 1
          }
          Write-Host "Using secrets config: $env:SECRETS_PATH"

      - name: Generate rotation report
        id: report
        shell: pwsh
        run: |
          $output = & ./Invoke-Report.ps1 `
            -Path $env:SECRETS_PATH `
            -WarningDays ([int]$env:WARNING_DAYS) `
            -Format $env:OUTPUT_FORMAT `
            -Now ([datetime]$env:NOW)
          Write-Host "===BEGIN REPORT==="
          Write-Host $output
          Write-Host "===END REPORT==="
          # Also write to step summary so humans see it in the UI.
          if ($env:GITHUB_STEP_SUMMARY) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $output
          }
