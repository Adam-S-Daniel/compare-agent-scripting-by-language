name: secret-rotation-validator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      today:
        description: 'Override today (YYYY-MM-DD)'
        required: false
        default: '2026-04-20'
      warning:
        description: 'Warning window in days'
        required: false
        default: '14'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

env:
  TODAY: '2026-04-20'
  WARNING: '14'

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq
          fi
          jq --version

      - name: Verify script syntax
        shell: bash
        run: bash -n secret-rotation.sh

      - name: Run validator against each fixture
        shell: bash
        env:
          TODAY: ${{ github.event.inputs.today || env.TODAY }}
          WARNING: ${{ github.event.inputs.warning || env.WARNING }}
        run: |
          set -euo pipefail
          chmod +x secret-rotation.sh
          for fx in tests/fixtures/*.json; do
            name=$(basename "$fx" .json)
            echo "===BEGIN:${name}:json==="
            ./secret-rotation.sh -c "$fx" --today "$TODAY" -w "$WARNING" -f json
            echo "===END:${name}:json==="
            echo "===BEGIN:${name}:markdown==="
            ./secret-rotation.sh -c "$fx" --today "$TODAY" -w "$WARNING" -f markdown
            echo "===END:${name}:markdown==="
          done
