name: Secret Rotation Validator

# Runs the secret rotation validator on:
#  * push / pull_request: validate any committed config file
#  * schedule: nightly drift check
#  * workflow_dispatch: manual run with custom fixture + warning window
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      fixture:
        description: Path to JSON fixture relative to repo root
        required: false
        default: fixtures/sample.json
      warning_days:
        description: Warning window in days
        required: false
        default: '14'
      today:
        description: Override "today" for deterministic runs (YYYY-MM-DD)
        required: false
        default: '2026-04-19'

permissions:
  contents: read

env:
  FIXTURE: ${{ github.event.inputs.fixture || 'fixtures/sample.json' }}
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
  TODAY: ${{ github.event.inputs.today || '2026-04-19' }}

jobs:
  validate:
    name: Validate secrets
    runs-on: ubuntu-latest
    outputs:
      report-status: ${{ steps.report.outputs.status }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            apt-get update && apt-get install -y jq
          fi
          jq --version

      - name: Show inputs
        run: |
          echo "FIXTURE=${FIXTURE}"
          echo "WARNING_DAYS=${WARNING_DAYS}"
          echo "TODAY=${TODAY}"

      - name: Run validator (markdown)
        id: report
        run: |
          chmod +x ./secret-rotation-validator.sh
          set +e
          ./secret-rotation-validator.sh \
            --config "${FIXTURE}" \
            --warning-days "${WARNING_DAYS}" \
            --today "${TODAY}" \
            --format markdown | tee rotation-report.md
          rc=$?
          set -e
          echo "Validator exit code: ${rc}"
          # Run again with --strict to derive a status summary, but never
          # fail the job on warnings/expiries — this workflow only reports.
          set +e
          ./secret-rotation-validator.sh \
            --config "${FIXTURE}" \
            --warning-days "${WARNING_DAYS}" \
            --today "${TODAY}" \
            --format json --strict > rotation-report.json
          status_rc=$?
          set -e
          case "${status_rc}" in
            0) status=ok ;;
            1) status=warning ;;
            2) status=expired ;;
            *) status=error ;;
          esac
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "Status: ${status}"

      - name: Print summary
        run: |
          echo '### Secret Rotation Report' >> "$GITHUB_STEP_SUMMARY"
          cat rotation-report.md >> "$GITHUB_STEP_SUMMARY"
          echo "Final status: ${{ steps.report.outputs.status }}"
