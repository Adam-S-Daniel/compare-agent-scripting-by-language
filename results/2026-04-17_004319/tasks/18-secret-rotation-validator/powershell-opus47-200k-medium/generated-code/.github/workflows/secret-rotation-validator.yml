name: Secret Rotation Validator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      warning_days:
        description: Warning window in days
        default: "14"
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  # Pin a reference date so CI output is deterministic. The test harness
  # relies on this for exact-value assertions.
  REFERENCE_DATE: "2026-04-20"
  WARNING_DAYS: "14"
  CONFIG_PATH: fixtures/secrets.json

jobs:
  tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './SecretRotationValidator.Tests.ps1'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: JSON report
        shell: pwsh
        run: |
          $json = ./Invoke-Validator.ps1 `
            -ConfigPath $env:CONFIG_PATH `
            -Format json `
            -WarningDays ([int]$env:WARNING_DAYS) `
            -ReferenceDate $env:REFERENCE_DATE
          Write-Host '===BEGIN_JSON==='
          Write-Host $json
          Write-Host '===END_JSON==='
          $parsed = $json | ConvertFrom-Json
          Write-Host "SUMMARY total=$($parsed.summary.total) expired=$($parsed.summary.expired) warning=$($parsed.summary.warning) ok=$($parsed.summary.ok)"

      - name: Markdown report
        shell: pwsh
        run: |
          $md = ./Invoke-Validator.ps1 `
            -ConfigPath $env:CONFIG_PATH `
            -Format markdown `
            -WarningDays ([int]$env:WARNING_DAYS) `
            -ReferenceDate $env:REFERENCE_DATE
          Write-Host '===BEGIN_MD==='
          Write-Host $md
          Write-Host '===END_MD==='
