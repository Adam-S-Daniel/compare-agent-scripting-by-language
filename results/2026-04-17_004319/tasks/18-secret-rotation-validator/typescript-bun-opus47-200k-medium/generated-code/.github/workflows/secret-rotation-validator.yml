name: Secret Rotation Validator

# Run on pushes, PRs, manually, and weekly as a scheduled audit so we catch
# secrets silently drifting past their rotation policy.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Mondays at 07:00 UTC.
    - cron: "0 7 * * 1"

permissions:
  contents: read

env:
  # Pin "now" so scheduled runs remain deterministic for this benchmark.
  VALIDATOR_NOW: "2026-04-20T00:00:00Z"
  WARNING_DAYS: "14"

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --no-save

      - name: Run unit tests
        run: bun test

      - name: Generate markdown rotation report
        run: |
          bun run src/cli.ts \
            --input fixtures/secrets.json \
            --format markdown \
            --warning-days "${WARNING_DAYS}" \
            --now "${VALIDATOR_NOW}" \
            --no-fail-on-expired \
            > report.md
          echo "----- report.md -----"
          cat report.md

      - name: Generate JSON rotation report
        run: |
          bun run src/cli.ts \
            --input fixtures/secrets.json \
            --format json \
            --warning-days "${WARNING_DAYS}" \
            --now "${VALIDATOR_NOW}" \
            --no-fail-on-expired \
            > report.json
          echo "----- report.json -----"
          cat report.json

      - name: Assert expected report contents
        run: bun run scripts/assert-report.ts
