name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run daily at 08:00 UTC to catch newly-expired secrets
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Warning window in days (overrides config)"
        required: false
        default: "14"
      format:
        description: "Output format (markdown or json)"
        required: false
        default: "markdown"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq bats shellcheck
          # Install actionlint for workflow structure tests
          ACTIONLINT_VERSION="1.7.12"
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin actionlint

      - name: Validate script syntax
        run: |
          bash -n validate-secrets.sh
          shellcheck validate-secrets.sh

      - name: Run bats test suite
        run: |
          bats tests/validate-secrets.bats

      - name: Run on mixed fixture (markdown report)
        run: |
          chmod +x validate-secrets.sh
          ./validate-secrets.sh \
            --format markdown \
            --reference-date 2026-04-19 \
            fixtures/secrets-mixed.json

      - name: Run on mixed fixture (JSON report) and verify exact values
        run: |
          OUTPUT=$(./validate-secrets.sh \
            --format json \
            --reference-date 2026-04-19 \
            fixtures/secrets-mixed.json)

          echo "=== JSON Report ==="
          echo "$OUTPUT" | jq .

          # Emit exact verifiable status lines for the test harness to grep
          DB_STATUS=$(echo "$OUTPUT" | jq -r '.expired[] | select(.name == "DB_PASSWORD") | .status' 2>/dev/null || echo "")
          API_STATUS=$(echo "$OUTPUT" | jq -r '.warning[] | select(.name == "API_KEY") | .status' 2>/dev/null || echo "")
          JWT_STATUS=$(echo "$OUTPUT" | jq -r '.ok[] | select(.name == "JWT_SECRET") | .status' 2>/dev/null || echo "")

          echo "SECRET_STATUS: DB_PASSWORD=${DB_STATUS}"
          echo "SECRET_STATUS: API_KEY=${API_STATUS}"
          echo "SECRET_STATUS: JWT_SECRET=${JWT_STATUS}"

          # Assert exact expected values
          [ "$DB_STATUS" = "expired" ] || { echo "ERROR: DB_PASSWORD not expired"; exit 1; }
          [ "$API_STATUS" = "warning" ] || { echo "ERROR: API_KEY not warning"; exit 1; }
          [ "$JWT_STATUS" = "ok" ]      || { echo "ERROR: JWT_SECRET not ok"; exit 1; }

          echo "All status assertions passed."

      - name: Run on expired fixture
        run: |
          ./validate-secrets.sh \
            --format json \
            --reference-date 2026-04-19 \
            fixtures/secrets-expired.json | jq .

      - name: Run on ok fixture
        run: |
          ./validate-secrets.sh \
            --format json \
            --reference-date 2026-04-19 \
            fixtures/secrets-ok.json | jq .
