name: secret-rotation-validator

# Runs on every push/PR, nightly, and can be dispatched manually with custom
# inputs. The scheduled run is how we'd actually catch drift in prod.
on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      fixture:
        description: "Path to secrets fixture JSON"
        required: false
        default: "fixtures/mixed.json"
      warning_days:
        description: "Warning window in days"
        required: false
        default: "7"
      now:
        description: "Reference date (YYYY-MM-DD) for deterministic output"
        required: false
        default: "2026-04-17"
      format:
        description: "Output format (markdown|json)"
        required: false
        default: "json"

permissions:
  contents: read

env:
  FIXTURE: ${{ github.event.inputs.fixture || 'fixtures/mixed.json' }}
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}
  NOW: ${{ github.event.inputs.now || '2026-04-17' }}
  FORMAT: ${{ github.event.inputs.format || 'json' }}

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            curl -fsSL https://bun.sh/install | bash
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          fi

      - name: Show Bun version
        run: bun --version

      - name: Run unit tests
        run: bun test src/validator.test.ts

      - name: Run rotation validator
        id: run
        continue-on-error: true
        run: |
          set +e
          bun run src/cli.ts \
            --input "$FIXTURE" \
            --format "$FORMAT" \
            --warning-days "$WARNING_DAYS" \
            --now "$NOW" \
            > report.out 2> report.err
          echo "cli_exit=$?" >> "$GITHUB_OUTPUT"
          echo "---REPORT---"
          cat report.out
          echo "---SUMMARY---"
          cat report.err

      - name: Emit grep-friendly assertions
        run: |
          # Print a fixed-prefix line for each bucket count and the cli exit
          # code so the test harness can assert on EXACT values without having
          # to parse the whole report.
          summary_line=$(grep '^SUMMARY ' report.err)
          echo "RESULT_SUMMARY $summary_line"
          echo "RESULT_CLI_EXIT ${{ steps.run.outputs.cli_exit }}"
