name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install --break-system-packages pytest pyyaml

      - name: Install actionlint
        run: |
          curl -sSfL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar -xz actionlint
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Run unit tests
        run: python3 -m pytest test_secret_rotation_validator.py -v

      - name: Run validator - default fixture (JSON)
        run: |
          echo "=== ROTATION REPORT (JSON) ==="
          python3 secret_rotation_validator.py \
            --config fixtures/default_config.json \
            --format json \
            --reference-date 2026-04-19
          echo "=== END ROTATION REPORT ==="

      - name: Run validator - default fixture (Markdown)
        run: |
          echo "=== ROTATION REPORT (MARKDOWN) ==="
          python3 secret_rotation_validator.py \
            --config fixtures/default_config.json \
            --format markdown \
            --reference-date 2026-04-19
          echo "=== END ROTATION REPORT ==="

      - name: Run validator - all_ok fixture (JSON)
        run: |
          echo "=== ALL OK REPORT ==="
          python3 secret_rotation_validator.py \
            --config fixtures/all_ok_config.json \
            --format json \
            --reference-date 2026-04-19
          echo "=== END ALL OK REPORT ==="

      - name: Run validator - all_expired fixture (JSON)
        run: |
          echo "=== ALL EXPIRED REPORT ==="
          python3 secret_rotation_validator.py \
            --config fixtures/all_expired_config.json \
            --format json \
            --reference-date 2026-04-19
          echo "=== END ALL EXPIRED REPORT ==="
