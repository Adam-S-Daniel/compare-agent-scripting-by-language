name: Secret Rotation Validator

# Triggers cover the realistic use cases for a secret-rotation check:
# - push / pull_request: gate changes to the secret inventory
# - schedule: weekly Monday-morning audit so expiries cannot creep up on us
# - workflow_dispatch: manual re-run on demand
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      warning_days:
        description: Days-before-expiry threshold for WARNING severity
        required: false
        default: '14'

# Least-privilege: only read the source tree.
permissions:
  contents: read

# Workflow-level defaults. Per-case overrides are written to $GITHUB_ENV in the
# "Load case parameters" step (see test harness).
env:
  CONFIG_PATH: fixtures/current.json
  PARAMS_PATH: fixtures/current.env
  PYTHONUNBUFFERED: '1'

jobs:
  validate:
    name: Validate secret rotation status
    runs-on: ubuntu-latest
    outputs:
      expired_count: ${{ steps.summary.outputs.expired_count }}
      warning_count: ${{ steps.summary.outputs.warning_count }}
      ok_count: ${{ steps.summary.outputs.ok_count }}
      total: ${{ steps.summary.outputs.total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python is available
        run: python3 --version

      - name: Load case parameters
        run: |
          if [ ! -f "$PARAMS_PATH" ]; then
            echo "error: params file not found: $PARAMS_PATH" >&2
            exit 1
          fi
          # Lines like WARNING_DAYS=14, REFERENCE_DATE=2026-04-17.
          cat "$PARAMS_PATH" >> "$GITHUB_ENV"
          echo "Loaded parameters from $PARAMS_PATH:"
          cat "$PARAMS_PATH"

      - name: Run validator (JSON format)
        run: |
          python3 validator.py \
            --config "$CONFIG_PATH" \
            --warning-days "${WARNING_DAYS:-14}" \
            --reference-date "$REFERENCE_DATE" \
            --format json \
            --output validator-output.json
          echo '---VALIDATOR-JSON-BEGIN---'
          cat validator-output.json
          echo ''
          echo '---VALIDATOR-JSON-END---'

      - name: Run validator (Markdown format)
        run: |
          python3 validator.py \
            --config "$CONFIG_PATH" \
            --warning-days "${WARNING_DAYS:-14}" \
            --reference-date "$REFERENCE_DATE" \
            --format markdown \
            --output validator-output.md
          echo '---VALIDATOR-MD-BEGIN---'
          cat validator-output.md
          echo '---VALIDATOR-MD-END---'

      - name: Extract summary counts as job outputs
        id: summary
        run: |
          python3 -c "
          import json
          d = json.load(open('validator-output.json'))
          s = d['summary']
          for k in ('expired_count', 'warning_count', 'ok_count', 'total'):
              print(f'{k}={s[k]}')
          " >> "$GITHUB_OUTPUT"
          echo '---SUMMARY-OUTPUT-BEGIN---'
          cat "$GITHUB_OUTPUT"
          echo '---SUMMARY-OUTPUT-END---'

      - name: Publish Markdown report to job summary
        if: always()
        run: cat validator-output.md >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Route urgency notifications
    needs: validate
    runs-on: ubuntu-latest
    # Job dependency demonstrates fan-out: a real deployment would split
    # expired / warning / ok notifications to different channels here.
    env:
      EXPIRED: ${{ needs.validate.outputs.expired_count }}
      WARNING: ${{ needs.validate.outputs.warning_count }}
      OK_COUNT: ${{ needs.validate.outputs.ok_count }}
      TOTAL: ${{ needs.validate.outputs.total }}
    steps:
      - name: Emit notifications grouped by urgency
        run: |
          echo '---NOTIFY-BEGIN---'
          echo "expired=${EXPIRED}"
          echo "warning=${WARNING}"
          echo "ok=${OK_COUNT}"
          echo "total=${TOTAL}"
          if [ "${EXPIRED:-0}" != "0" ]; then
            echo "route=pager"
          elif [ "${WARNING:-0}" != "0" ]; then
            echo "route=slack"
          else
            echo "route=none"
          fi
          echo '---NOTIFY-END---'
