name: Secret Rotation Validator

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    name: Validate Secret Rotation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run secret rotation validator
        run: |
          chmod +x ./secret_rotation.sh
          ./secret_rotation.sh ./secrets.json --format json > rotation-report.json || true
          ./secret_rotation.sh ./secrets.json --format markdown > rotation-report.md || true

      - name: Check for expired secrets
        run: |
          if [[ ! -f rotation-report.json ]]; then
            echo "Warning: Could not generate rotation report"
            exit 0
          fi

          # Count expired secrets
          expired_count=$(grep -c '"expired"' "rotation-report.json" || echo 0)
          if [[ "$expired_count" -gt 0 ]]; then
            echo "::warning::${expired_count} secrets are expired and require immediate rotation"
          fi

      - name: Display summary
        if: always()
        run: |
          echo "## Secret Rotation Report" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f rotation-report.md ]]; then
            cat rotation-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No rotation report available" >> "$GITHUB_STEP_SUMMARY"
          fi

  run-tests:
    runs-on: ubuntu-latest
    name: Run Secret Rotation Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run test suite
        run: |
          bats test_secret_rotation.bats

      - name: Verify script quality
        run: |
          # Shellcheck validation
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck secret_rotation.sh
          else
            echo "shellcheck not available"
          fi
          # Syntax check
          bash -n secret_rotation.sh
          echo "✓ Script passed all quality checks"
