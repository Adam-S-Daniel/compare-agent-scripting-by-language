name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 06:00 UTC so expiring secrets are flagged early.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '14'

permissions:
  contents: read

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    env:
      # These defaults make the workflow runnable without external inputs.
      # The test harness overrides them via `act --env` for each test case.
      CONFIG_FILE: ${{ github.event.inputs.warning_days && 'fixtures/mixed.json' || 'fixtures/mixed.json' }}
      WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
      FORMAT: markdown
      TODAY: '2026-04-17'
      EXPECTED_EXPIRED: '1'
      EXPECTED_WARNING: '0'
      EXPECTED_OK: '2'
      EXPECTED_EXIT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            apt-get update -y >/dev/null 2>&1 || sudo apt-get update -y
            apt-get install -y jq >/dev/null 2>&1 || sudo apt-get install -y jq
          fi
          jq --version

      - name: Syntax check
        shell: bash
        run: |
          set -euo pipefail
          bash -n validate-secrets.sh

      - name: Run validator (JSON for assertions)
        id: run_json
        shell: bash
        run: |
          set +e
          output="$(bash validate-secrets.sh \
              --config "${CONFIG_FILE}" \
              --warning-days "${WARNING_DAYS}" \
              --format json \
              --today "${TODAY}")"
          rc=$?
          set -e
          echo "---BEGIN JSON OUTPUT---"
          echo "$output"
          echo "---END JSON OUTPUT---"
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"
          {
            echo "report_json<<REPORT_EOF"
            echo "$output"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run validator (markdown report)
        shell: bash
        run: |
          set +e
          bash validate-secrets.sh \
              --config "${CONFIG_FILE}" \
              --warning-days "${WARNING_DAYS}" \
              --format "${FORMAT}" \
              --today "${TODAY}"
          rc=$?
          set -e
          echo "Markdown report exit code: ${rc}"

      - name: Assert expected counts and exit code
        shell: bash
        env:
          ACTUAL_EXIT: ${{ steps.run_json.outputs.exit_code }}
          REPORT_JSON: ${{ steps.run_json.outputs.report_json }}
        run: |
          set -euo pipefail
          echo "Expected exit: ${EXPECTED_EXIT}, actual: ${ACTUAL_EXIT}"
          if [[ "${ACTUAL_EXIT}" != "${EXPECTED_EXIT}" ]]; then
            echo "ASSERTION FAILED: exit code mismatch" >&2
            exit 1
          fi
          expired_count="$(echo "${REPORT_JSON}" | jq -r '.counts.expired')"
          warning_count="$(echo "${REPORT_JSON}" | jq -r '.counts.warning')"
          ok_count="$(echo "${REPORT_JSON}" | jq -r '.counts.ok')"
          echo "Counts: expired=${expired_count} warning=${warning_count} ok=${ok_count}"
          if [[ "${expired_count}" != "${EXPECTED_EXPIRED}" ]]; then
            echo "ASSERTION FAILED: expired count mismatch (expected ${EXPECTED_EXPIRED}, got ${expired_count})" >&2
            exit 1
          fi
          if [[ "${warning_count}" != "${EXPECTED_WARNING}" ]]; then
            echo "ASSERTION FAILED: warning count mismatch (expected ${EXPECTED_WARNING}, got ${warning_count})" >&2
            exit 1
          fi
          if [[ "${ok_count}" != "${EXPECTED_OK}" ]]; then
            echo "ASSERTION FAILED: ok count mismatch (expected ${EXPECTED_OK}, got ${ok_count})" >&2
            exit 1
          fi
          echo "All assertions passed."
