name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -sL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Validate workflow with actionlint
        run: actionlint .github/workflows/secret-rotation-validator.yml

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./SecretRotationValidator.Tests.ps1 `
                                  -PassThru -Output Detailed
          if ($result.FailedCount -gt 0) {
            throw "Pester: $($result.FailedCount) test(s) failed."
          }
          Write-Output "All $($result.PassedCount) Pester tests passed."

      - name: Generate Markdown report
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1
          $config  = Get-Content ./fixtures/secrets-config.json | ConvertFrom-Json
          $secrets = $config.secrets | ForEach-Object {
            @{
              Name               = $_.name
              LastRotated        = $_.lastRotated
              RotationPolicyDays = [int]$_.rotationPolicyDays
              RequiredBy         = @($_.requiredBy)
            }
          }
          $results = Invoke-SecretRotationValidator `
              -Secrets $secrets -WarningWindowDays 14 `
              -ReferenceDate ([datetime]"2026-04-19")
          $report = Format-RotationReport -Results $results -Format "Markdown"
          Write-Output $report
          # Assertions on exact expected values
          if ($report -notmatch "database-password") { throw "ASSERT: missing database-password" }
          if ($report -notmatch "\b110\b")           { throw "ASSERT: DaysOverdue 110 not found" }
          if ($report -notmatch "api-key")            { throw "ASSERT: missing api-key" }
          if ($report -notmatch "\b7\b")              { throw "ASSERT: DaysUntilExpiry 7 not found" }
          if ($report -notmatch "jwt-secret")         { throw "ASSERT: missing jwt-secret" }
          if ($report -notmatch "\b30\b")             { throw "ASSERT: DaysUntilExpiry 30 not found" }
          Write-Output "Markdown report assertions passed."

      - name: Generate JSON report
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1
          $config  = Get-Content ./fixtures/secrets-config.json | ConvertFrom-Json
          $secrets = $config.secrets | ForEach-Object {
            @{
              Name               = $_.name
              LastRotated        = $_.lastRotated
              RotationPolicyDays = [int]$_.rotationPolicyDays
              RequiredBy         = @($_.requiredBy)
            }
          }
          $results = Invoke-SecretRotationValidator `
              -Secrets $secrets -WarningWindowDays 14 `
              -ReferenceDate ([datetime]"2026-04-19")
          $report = Format-RotationReport -Results $results -Format "JSON"
          Write-Output $report
          # Parse and assert exact values from the JSON report
          $json = $report | ConvertFrom-Json
          if ($json.summary.expired -ne 1) { throw "ASSERT: summary.expired != 1" }
          if ($json.summary.warning -ne 1) { throw "ASSERT: summary.warning != 1" }
          if ($json.summary.ok -ne 1)      { throw "ASSERT: summary.ok != 1" }
          $expEntry = $json.expired | Where-Object { $_.name -eq "database-password" }
          if ($expEntry.daysOverdue -ne 110) { throw "ASSERT: daysOverdue != 110" }
          $warnEntry = $json.warning | Where-Object { $_.name -eq "api-key" }
          if ($warnEntry.daysUntilExpiry -ne 7) { throw "ASSERT: daysUntilExpiry != 7" }
          $okEntry = $json.ok | Where-Object { $_.name -eq "jwt-secret" }
          if ($okEntry.daysUntilExpiry -ne 30) { throw "ASSERT: daysUntilExpiry != 30" }
          Write-Output "JSON report assertions passed."
