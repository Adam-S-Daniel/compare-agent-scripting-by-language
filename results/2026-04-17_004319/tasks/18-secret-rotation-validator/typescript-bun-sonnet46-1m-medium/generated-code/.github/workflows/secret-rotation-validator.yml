name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_window_days:
        description: "Days before expiry to warn"
        required: false
        default: "7"
      output_format:
        description: "Output format (markdown or json)"
        required: false
        default: "json"
      today:
        description: "Reference date (YYYY-MM-DD), defaults to current date"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || true

      - name: Run unit tests
        run: bun test src/validator.test.ts

      - name: Prepare config with workflow inputs
        run: bun run src/prepare-config.ts
        env:
          WARNING_WINDOW: ${{ github.event.inputs.warning_window_days || '7' }}

      - name: Run secret rotation validator (JSON)
        run: |
          TODAY_ARG="${{ github.event.inputs.today }}"
          if [ -n "$TODAY_ARG" ]; then
            bun run src/main.ts fixtures/run-config.json --format json --today "$TODAY_ARG"
          else
            bun run src/main.ts fixtures/run-config.json --format json
          fi

      - name: Run secret rotation validator with fixed date (for CI assertion)
        run: |
          bun run src/main.ts fixtures/secrets-mixed.json --format json --today 2024-03-15
        id: report

      - name: Assert report contains expected fields
        run: |
          bun run src/main.ts fixtures/secrets-mixed.json --format json --today 2024-03-15 > /tmp/report.json
          bun run src/assert-report.ts /tmp/report.json

      - name: Run markdown format
        run: bun run src/main.ts fixtures/secrets-mixed.json --format markdown --today 2024-03-15
