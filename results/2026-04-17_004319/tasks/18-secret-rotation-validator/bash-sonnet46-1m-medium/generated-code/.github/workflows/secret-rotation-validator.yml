name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run daily at 08:00 UTC to catch newly-expired secrets
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      reference_date:
        description: "Reference date (YYYY-MM-DD) for rotation checks"
        required: false
        default: ""
      warning_days:
        description: "Days before expiry to trigger WARNING status"
        required: false
        default: "7"
      format:
        description: "Output format: json or markdown"
        required: false
        default: "markdown"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq jq

          # Install bats-core
          npm install -g bats

          # Install actionlint (used by bats workflow structure test)
          ACTIONLINT_VERSION="1.7.7"
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin actionlint

      - name: Run bats tests
        run: |
          bats tests/secret-rotation-validator.bats

      - name: Generate rotation report (JSON)
        run: |
          echo "=== Secret Rotation Report (JSON) ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-basic.json \
            --reference-date 2026-04-20 \
            --format json

      - name: Generate rotation report (Markdown)
        run: |
          echo "=== Secret Rotation Report (Markdown) ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-basic.json \
            --reference-date 2026-04-20 \
            --format markdown

      - name: Validate all-expired fixture
        run: |
          echo "=== All-Expired Fixture Report ==="
          ./secret-rotation-validator.sh \
            --config fixtures/secrets-all-expired.json \
            --reference-date 2026-04-20 \
            --format json
