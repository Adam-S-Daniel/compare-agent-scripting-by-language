name: Secret Rotation Validator

# Triggers: regular CI on push/PR, a daily schedule for drift detection,
# and manual dispatch with a configurable warning window for ad-hoc audits.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 9 * * 1"  # Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days before expiry to flag as warning"
        required: false
        default: "7"
      config:
        description: "Path to secrets config"
        required: false
        default: "fixtures/sample-secrets.json"

permissions:
  contents: read

env:
  # Pinned date so CI output is reproducible regardless of when it runs.
  REPORT_TODAY: "2026-04-17"

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run unit tests
        # Only the pure unit tests run inside CI; the act-based harness
        # (tests/test_workflow.py) is run from the developer's host and would
        # otherwise recurse into itself when executed inside the act container.
        run: python -m pytest tests/test_secret_validator.py -v

      - name: Run validator (markdown)
        run: |
          python secret_validator.py \
            "${CONFIG_PATH}" \
            --format markdown \
            --warning-days "${WARNING_DAYS}" \
            --today "${REPORT_TODAY}" || EXIT=$?
          echo "validator exited with: ${EXIT:-0}"
        env:
          CONFIG_PATH: ${{ github.event.inputs.config || 'fixtures/sample-secrets.json' }}
          WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}

      - name: Run validator (JSON)
        run: |
          python secret_validator.py \
            "${CONFIG_PATH}" \
            --format json \
            --warning-days "${WARNING_DAYS}" \
            --today "${REPORT_TODAY}" > report.json || true
          cat report.json
        env:
          CONFIG_PATH: ${{ github.event.inputs.config || 'fixtures/sample-secrets.json' }}
          WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}
