name: Secret Rotation Validator

# The test harness drives this workflow with `act push`, passing a fixture
# path and a pinned `today` date via env so classification is deterministic.
# `schedule` + `workflow_dispatch` make it usable in real CI as a nightly
# rotation audit.

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      secrets_file:
        description: "Path to secrets JSON file"
        required: false
        default: "fixtures/secrets.json"
      warning_days:
        description: "Warning window in days"
        required: false
        default: "7"
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

env:
  SECRETS_FILE: ${{ github.event.inputs.secrets_file || 'fixtures/secrets.json' }}
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '7' }}
  # TODAY is pinned by the test harness (via .env / env) so the report is
  # reproducible. In a real scheduled run, unset TODAY to use the real date.
  TODAY: ${{ vars.TODAY || '' }}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        shell: bash
        run: python -m pip install --quiet pytest
      - name: Run unit tests
        shell: bash
        run: python -m pytest test_secret_rotation.py -v

  rotation-report:
    name: Generate rotation report
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate markdown report
        shell: bash
        run: |
          set -euo pipefail
          args=(--warning-days "$WARNING_DAYS" --format markdown)
          if [ -n "${TODAY}" ]; then args+=(--today "$TODAY"); fi
          python secret_rotation.py "$SECRETS_FILE" "${args[@]}" | tee report.md
      - name: Generate JSON report
        shell: bash
        run: |
          set -euo pipefail
          args=(--warning-days "$WARNING_DAYS" --format json)
          if [ -n "${TODAY}" ]; then args+=(--today "$TODAY"); fi
          python secret_rotation.py "$SECRETS_FILE" "${args[@]}" | tee report.json
      - name: Summarize report
        shell: bash
        run: |
          set -euo pipefail
          echo "--- markdown report ---"
          cat report.md
          echo "--- json summary ---"
          python -c "import json; print(json.load(open('report.json'))['summary'])"
