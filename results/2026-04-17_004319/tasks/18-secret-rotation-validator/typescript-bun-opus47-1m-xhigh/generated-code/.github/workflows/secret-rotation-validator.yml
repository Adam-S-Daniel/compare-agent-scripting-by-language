name: Secret Rotation Validator

# Triggers:
#  - push / PR: enforce rotation policy as part of normal CI
#  - schedule: nightly cron catches secrets that roll into the warning window
#  - workflow_dispatch: manual run, with knobs for fixture / warning-days / date
on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      config:
        description: "Path to the secrets config JSON file"
        required: false
        default: "fixtures/secrets.json"
      warning_days:
        description: "Warning window in days"
        required: false
        default: "14"
      reference_date:
        description: "Reference date (YYYY-MM-DD); blank = today"
        required: false
        default: ""

# Read-only â€” the workflow only inspects committed config and emits a report.
permissions:
  contents: read

env:
  # Defaults used when the event isn't workflow_dispatch (push, PR, schedule).
  # These match the fixture so `act push` has a deterministic expected output.
  DEFAULT_CONFIG: fixtures/secrets.json
  DEFAULT_WARNING_DAYS: "14"
  DEFAULT_REFERENCE_DATE: "2026-04-17"

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    outputs:
      expired: ${{ steps.run.outputs.expired }}
      warning: ${{ steps.run.outputs.warning }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        # Pinned to a specific Bun version so the report is reproducible.
        # Installs under $HOME/.bun by default â€” we export that to PATH below.
        run: |
          set -euo pipefail
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Show Bun version
        run: bun --version

      - name: Resolve inputs
        id: inputs
        # workflow_dispatch carries user-provided inputs; other triggers fall
        # back to the env defaults so the job is usable unattended (e.g. cron).
        run: |
          set -euo pipefail
          CONFIG="${{ github.event.inputs.config }}"
          WARN="${{ github.event.inputs.warning_days }}"
          REF="${{ github.event.inputs.reference_date }}"
          CONFIG="${CONFIG:-$DEFAULT_CONFIG}"
          WARN="${WARN:-$DEFAULT_WARNING_DAYS}"
          REF="${REF:-$DEFAULT_REFERENCE_DATE}"
          {
            echo "config=$CONFIG"
            echo "warn=$WARN"
            echo "ref=$REF"
          } >> "$GITHUB_OUTPUT"

      - name: Run secret rotation validator
        id: run
        # The CLI uses exit codes for gating:
        #   0 ok, 1 expired, 2 warning, 3 usage error.
        # A usage error (3) is a real step failure. Otherwise the job always
        # succeeds and surfaces policy state via outputs + printed markdown,
        # so downstream jobs (or repo policies) can decide what to do.
        run: |
          set +e
          mkdir -p reports
          bun run cli.ts \
            --config "${{ steps.inputs.outputs.config }}" \
            --warning-days "${{ steps.inputs.outputs.warn }}" \
            --reference-date "${{ steps.inputs.outputs.ref }}" \
            --format json > reports/report.json
          JSON_EXIT=$?
          bun run cli.ts \
            --config "${{ steps.inputs.outputs.config }}" \
            --warning-days "${{ steps.inputs.outputs.warn }}" \
            --reference-date "${{ steps.inputs.outputs.ref }}" \
            --format markdown > reports/report.md
          MD_EXIT=$?
          set -e

          if [ "$JSON_EXIT" = "3" ] || [ "$MD_EXIT" = "3" ]; then
            echo "Validator reported a usage / config error"
            exit 3
          fi

          EXPIRED=$(grep -c '"status": "expired"' reports/report.json || true)
          WARNING=$(grep -c '"status": "warning"' reports/report.json || true)
          OK=$(grep -c '"status": "ok"' reports/report.json || true)
          echo "expired=$EXPIRED" >> "$GITHUB_OUTPUT"
          echo "warning=$WARNING" >> "$GITHUB_OUTPUT"

          echo "=== Secret Rotation Report ==="
          cat reports/report.md
          echo "=== Summary ==="
          echo "expired=$EXPIRED warning=$WARNING ok=$OK"

          # One-line policy verdict for log scraping / alerting.
          if [ "$JSON_EXIT" -eq 1 ]; then
            echo "POLICY: FAIL expired=$EXPIRED"
          elif [ "$JSON_EXIT" -eq 2 ]; then
            echo "POLICY: WARN warning=$WARNING"
          else
            echo "POLICY: PASS"
          fi

      - name: Upload rotation report
        # Keep the report as a CI artifact for later inspection. Skipped under
        # act (actions/upload-artifact needs the GH artifact service).
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-report
          path: reports/
          retention-days: 14
