name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days before expiry to warn"
        required: false
        default: "14"
      output_format:
        description: "Output format: markdown or json"
        required: false
        default: "markdown"

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./SecretRotationValidator.Tests.ps1"
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "test-results.xml"
          $config.TestResult.OutputFormat = "NUnitXml"
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  generate-report:
    name: Generate Rotation Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Generate markdown report
        shell: pwsh
        env:
          WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
        run: |
          . ./SecretRotationValidator.ps1
          $warningDays = [int]$env:WARNING_DAYS
          $secrets = Get-DefaultSecrets
          $report = Invoke-SecretRotationReport -Secrets $secrets -WarningDays $warningDays
          $mdOutput = Format-RotationReport -Report $report -Format "markdown"
          $mdOutput | Set-Content -Path "rotation-report.md" -Encoding UTF8
          Write-Host "=== ROTATION REPORT (Markdown) ==="
          Write-Host $mdOutput

      - name: Generate JSON report
        shell: pwsh
        env:
          WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
        run: |
          . ./SecretRotationValidator.ps1
          $warningDays = [int]$env:WARNING_DAYS
          $secrets = Get-DefaultSecrets
          $report = Invoke-SecretRotationReport -Secrets $secrets -WarningDays $warningDays
          $jsonOutput = Format-RotationReport -Report $report -Format "json"
          $jsonOutput | Set-Content -Path "rotation-report.json" -Encoding UTF8
          Write-Host "=== ROTATION REPORT (JSON) ==="
          Write-Host $jsonOutput

      - name: Validate JSON output
        shell: pwsh
        run: |
          $json = Get-Content "rotation-report.json" -Raw | ConvertFrom-Json
          if (-not $json.expired -and $json.expired -isnot [array]) {
            Write-Error "JSON report missing 'expired' field"
            exit 1
          }
          Write-Host "JSON report validated successfully"
          Write-Host "Expired secrets: $($json.expired.Count)"
          Write-Host "Warning secrets: $($json.warning.Count)"
          Write-Host "OK secrets: $($json.ok.Count)"

      - name: Upload reports
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: rotation-reports
          path: |
            rotation-report.md
            rotation-report.json
