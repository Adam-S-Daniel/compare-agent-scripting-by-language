name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FIXTURE_FILE: fixtures/sample-secrets.json

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test

      - name: Run validator (JSON output)
        run: |
          bun run src/main.ts --input "$FIXTURE_FILE" --format json

      - name: Run validator (Markdown output)
        run: |
          bun run src/main.ts --input "$FIXTURE_FILE" --format markdown
