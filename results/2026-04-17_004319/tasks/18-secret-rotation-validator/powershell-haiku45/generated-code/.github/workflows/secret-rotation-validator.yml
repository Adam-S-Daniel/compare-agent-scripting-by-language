name: Secret Rotation Validator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      config_path:
        description: 'Path to secrets config file'
        required: false
        default: 'test-secrets.json'
      warning_days:
        description: 'Warning window in days'
        required: false
        default: '7'

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester Tests
        shell: pwsh
        run: |
          Invoke-Pester -Path SecretRotationValidator.Tests.ps1 -Verbose -PassThru | Select-Object -Property Passed, Failed, Tests

  validate:
    name: Validate Secrets
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Validate Secrets Configuration
        shell: pwsh
        env:
          CONFIG_PATH: test-secrets.json
          WARNING_DAYS: 7
          OUTPUT_FORMAT: markdown
        continue-on-error: true
        run: |
          $config = $env:CONFIG_PATH
          $warningDays = $env:WARNING_DAYS
          $format = $env:OUTPUT_FORMAT
          & ./Invoke-SecretRotationValidator.ps1 -ConfigPath $config -WarningDays $warningDays -OutputFormat $format -Verbose

      - name: Generate JSON Report
        shell: pwsh
        env:
          CONFIG_PATH: test-secrets.json
          WARNING_DAYS: 7
          OUTPUT_FORMAT: json
          OUTPUT_PATH: rotation-report.json
        continue-on-error: true
        run: |
          $config = $env:CONFIG_PATH
          $warningDays = $env:WARNING_DAYS
          $format = $env:OUTPUT_FORMAT
          $outputPath = $env:OUTPUT_PATH
          & ./Invoke-SecretRotationValidator.ps1 -ConfigPath $config -WarningDays $warningDays -OutputFormat $format -OutputPath $outputPath -Verbose

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-reports
          path: rotation-report.json
          retention-days: 30
