name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      warning_window:
        description: 'Warning window in days'
        default: '30'
        type: string
      reference_date:
        description: 'Reference date YYYY-MM-DD (empty = today)'
        default: ''
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Install dependencies
        run: python3 -m pip install pytest pyyaml --break-system-packages

      - name: Run unit tests
        run: python3 -m pytest tests/ -v

      - name: Run rotation report markdown
        run: |
          python3 secret_rotation.py \
            --config fixtures/test_secrets.json \
            --reference-date 2026-04-20 \
            --warning-window 30 \
            --format markdown

      - name: Run rotation report JSON and verify counts
        run: |
          OUTPUT=$(python3 secret_rotation.py \
            --config fixtures/test_secrets.json \
            --reference-date 2026-04-20 \
            --warning-window 30 \
            --format json)
          echo "$OUTPUT"
          EXPIRED=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['expired'])")
          WARNING=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['warning'])")
          OK=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['ok'])")
          echo "ROTATION_SUMMARY: expired=${EXPIRED} warning=${WARNING} ok=${OK}"
