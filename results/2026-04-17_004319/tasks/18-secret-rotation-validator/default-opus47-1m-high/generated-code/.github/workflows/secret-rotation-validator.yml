name: Secret Rotation Validator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      config:
        description: "Path to the secrets config file"
        required: false
        default: "secrets.json"
      format:
        description: "Output format (markdown|json). Empty = use config value."
        required: false
        default: ""
      warning_days:
        description: "Warning window in days. Empty = use config value."
        required: false
        default: ""
      current_date:
        description: "Override current date (YYYY-MM-DD). Empty = use config value."
        required: false
        default: ""
  schedule:
    # Weekly Monday 08:00 UTC sweep so the team is reminded before things rot.
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  SECRETS_CONFIG: ${{ github.event.inputs.config || 'secrets.json' }}
  REPORT_FORMAT: ${{ github.event.inputs.format }}
  WARNING_DAYS: ${{ github.event.inputs.warning_days }}
  CURRENT_DATE: ${{ github.event.inputs.current_date }}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: |
          python -m pytest tests/ -v

  rotation-report:
    name: Rotation report
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run rotation report
        # Build the CLI invocation conditionally so optional flags only appear
        # when the workflow caller supplied a value. The exit code from the
        # script is captured for visibility, but the step itself only fails on
        # configuration errors (exit 2) so downstream act-based test runs can
        # still observe expired-secret output.
        run: |
          set +e
          ARGS="--config ${SECRETS_CONFIG}"
          if [ -n "${REPORT_FORMAT}" ]; then
            ARGS="${ARGS} --format ${REPORT_FORMAT}"
          fi
          if [ -n "${WARNING_DAYS}" ]; then
            ARGS="${ARGS} --warning-days ${WARNING_DAYS}"
          fi
          if [ -n "${CURRENT_DATE}" ]; then
            ARGS="${ARGS} --current-date ${CURRENT_DATE}"
          fi
          # shellcheck disable=SC2086
          python secret_rotation.py ${ARGS} | tee rotation-report.out
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "rotation-exit-code=${STATUS}"
          if [ "${STATUS}" -eq 2 ]; then
            echo "Configuration error in ${SECRETS_CONFIG}" >&2
            exit 2
          fi

      - name: Show report path
        run: |
          echo "Report written to: $(pwd)/rotation-report.out"
          ls -la rotation-report.out
