name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      config:
        description: "Path to the secrets config file"
        required: false
        default: "fixtures/valid.json"
      warning_days:
        description: "Warn this many days before expiry"
        required: false
        default: "14"
      now:
        description: "Override current date (YYYY-MM-DD)"
        required: false
        default: ""
  schedule:
    # Daily at 08:00 UTC so stale secrets surface on their own.
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  validate:
    name: Validate secret rotation
    runs-on: ubuntu-latest
    env:
      # For `workflow_dispatch`, apply the inputs; otherwise leave these empty
      # and let each step fall back to its default. The harness overrides them
      # per test case via `act --env CONFIG_PATH=...`, which injects into the
      # step's process env (bash `${VAR:-default}` reads that cleanly).
      CONFIG_PATH: ${{ github.event.inputs.config }}
      WARNING_DAYS: ${{ github.event.inputs.warning_days }}
      NOW_OVERRIDE: ${{ github.event.inputs.now }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        # Install directly from the upstream script rather than via a marketplace
        # action, so the job runs self-contained in any Linux container with curl.
        run: |
          set -euo pipefail
          if ! command -v bun >/dev/null 2>&1; then
            curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          fi
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Show Bun version
        run: bun --version

      - name: Run validator unit tests
        # Scope to the unit tests only — workflow.test.ts spawns act and must
        # never run from inside an act container (recursion hazard).
        run: bun test validator.test.ts

      - name: Generate rotation report (markdown)
        id: report_md
        run: |
          set -euo pipefail
          cfg="${CONFIG_PATH:-fixtures/valid.json}"
          wd="${WARNING_DAYS:-14}"
          args=(--config "$cfg" --format markdown --warning-days "$wd")
          if [ -n "${NOW_OVERRIDE:-}" ]; then
            args+=(--now "$NOW_OVERRIDE")
          fi
          set +e
          bun run cli.ts "${args[@]}" > report.md 2> summary.txt
          status=$?
          set -e
          echo "validator_exit=$status" >> "$GITHUB_OUTPUT"
          echo "--- report.md ---"
          cat report.md
          echo "--- summary.txt ---"
          cat summary.txt

      - name: Generate rotation report (json)
        run: |
          set -euo pipefail
          cfg="${CONFIG_PATH:-fixtures/valid.json}"
          wd="${WARNING_DAYS:-14}"
          args=(--config "$cfg" --format json --warning-days "$wd")
          if [ -n "${NOW_OVERRIDE:-}" ]; then
            args+=(--now "$NOW_OVERRIDE")
          fi
          # Don't fail the step on expired; we gate explicitly below.
          bun run cli.ts "${args[@]}" > report.json 2>> summary.txt || true
          echo "--- report.json ---"
          cat report.json

      - name: Emit CI assertions
        env:
          VALIDATOR_EXIT: ${{ steps.report_md.outputs.validator_exit }}
        run: |
          set -euo pipefail
          echo "VALIDATOR_EXIT=$VALIDATOR_EXIT"
          # Re-print the stable summary line so the harness can grep it reliably
          # without scraping through the report body.
          grep '^SUMMARY ' summary.txt | tail -n1

      - name: Gate on expired secrets
        if: ${{ steps.report_md.outputs.validator_exit != '0' }}
        run: |
          # ALLOW_EXPIRED comes from process env (e.g., act --env ALLOW_EXPIRED=true).
          # Defaults to "false" for a normal push/PR so CI fails loudly.
          if [ "${ALLOW_EXPIRED:-false}" = "true" ]; then
            echo "Expired secrets tolerated (ALLOW_EXPIRED=true) — report still archived."
            exit 0
          fi
          echo "::error::Expired secrets detected — see report above."
          exit 1
