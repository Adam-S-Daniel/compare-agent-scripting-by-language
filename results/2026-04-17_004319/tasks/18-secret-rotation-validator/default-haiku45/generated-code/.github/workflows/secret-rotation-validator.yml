name: Secret Rotation Validator

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Config file path (optional)'
        required: false
        default: 'fixtures_mixed.json'
      output_format:
        description: 'Output format'
        required: false
        default: 'markdown'
        type: choice
        options:
          - markdown
          - json

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest

      - name: Run unit tests
        run: python3 -m pytest test_secret_validator.py -v

      - name: Validate imports
        run: |
          python3 -c "from secret_validator import Secret, SecretValidator, RotationReport, Urgency"
          python3 -c "from secret_validator_cli import main"

  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON fixtures
        run: |
          python3 -c "import json; json.load(open('fixtures_mixed.json'))" && echo "fixtures_mixed.json is valid"

  check:
    name: Validator Check
    runs-on: ubuntu-latest
    needs: [test, validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run validator on all-ok fixture (markdown)
        run: python3 secret_validator_cli.py fixtures_all_ok.json --output-format markdown

      - name: Run validator on all-ok fixture (JSON)
        run: python3 secret_validator_cli.py fixtures_all_ok.json --output-format json

      - name: Run validator on mixed fixture (detect problems)
        run: python3 secret_validator_cli.py fixtures_mixed.json --output-format markdown || echo "Validation detected issues (expected with expired secrets)"

      - name: Validate both formats produce output
        run: |
          markdown_lines=$(python3 secret_validator_cli.py fixtures_all_ok.json --output-format markdown | wc -l)
          [ "$markdown_lines" -gt 5 ] && echo "✓ Markdown format produces output"
          json_lines=$(python3 secret_validator_cli.py fixtures_all_ok.json --output-format json | python3 -m json.tool | wc -l)
          [ "$json_lines" -gt 5 ] && echo "✓ JSON format produces valid output"
