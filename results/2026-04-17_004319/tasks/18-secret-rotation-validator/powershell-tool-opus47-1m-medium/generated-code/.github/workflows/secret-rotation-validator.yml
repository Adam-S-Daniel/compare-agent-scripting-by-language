name: secret-rotation-validator

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      warning_days:
        description: Warning window in days
        required: false
        default: "14"
      reference_date:
        description: ISO date used as "today" for the report
        required: false
        default: "2026-04-17"
      format:
        description: Output format (markdown or json)
        required: false
        default: markdown
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  CONFIG_PATH: fixtures/sample.json
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
  REFERENCE_DATE: ${{ github.event.inputs.reference_date || '2026-04-17' }}
  REPORT_FORMAT: ${{ github.event.inputs.format || 'markdown' }}

jobs:
  test:
    name: Pester tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  report:
    name: Generate rotation report
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run rotation validator
        shell: pwsh
        run: |
          ./Invoke-Validator.ps1 `
            -ConfigPath $env:CONFIG_PATH `
            -Format $env:REPORT_FORMAT `
            -WarningDays ([int]$env:WARNING_DAYS) `
            -ReferenceDate $env:REFERENCE_DATE
