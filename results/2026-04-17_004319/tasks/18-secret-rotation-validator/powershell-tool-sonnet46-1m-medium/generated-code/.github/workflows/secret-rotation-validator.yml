name: Secret Rotation Validator

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days before expiry to warn"
        required: false
        default: "14"
      output_format:
        description: "Output format: Markdown or JSON"
        required: false
        default: "Markdown"

permissions:
  contents: read

jobs:
  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0')) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './SecretRotationValidator.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }
          Write-Host "All $($result.PassedCount) tests passed."

  validate:
    name: Validate Secret Rotation Report
    runs-on: ubuntu-latest
    needs: test
    env:
      WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
      OUTPUT_FORMAT: ${{ github.event.inputs.output_format || 'Markdown' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0')) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          }

      - name: Write sample secrets config
        shell: pwsh
        run: |
          $today = (Get-Date).ToString('yyyy-MM-dd')
          $expired = (Get-Date).AddDays(-100).ToString('yyyy-MM-dd')
          $warning = (Get-Date).AddDays(-20).ToString('yyyy-MM-dd')
          $ok      = (Get-Date).AddDays(-2).ToString('yyyy-MM-dd')

          $config = @{
            warningDays = [int]$env:WARNING_DAYS
            secrets = @(
              @{ Name = 'db-password';    LastRotated = $expired; RotationDays = 90;  RequiredBy = @('api','worker') }
              @{ Name = 'signing-cert';   LastRotated = $warning; RotationDays = 30;  RequiredBy = @('auth') }
              @{ Name = 'internal-token'; LastRotated = $ok;      RotationDays = 60;  RequiredBy = @('scheduler') }
            )
          }
          $config | ConvertTo-Json -Depth 5 | Set-Content secrets-config.json
          Write-Host "Config written:"
          Get-Content secrets-config.json

      - name: Run Secret Rotation Validator
        shell: pwsh
        run: |
          . ./SecretRotationValidator.ps1
          $report = Invoke-SecretRotationValidator -ConfigPath ./secrets-config.json
          $output = Format-RotationReport -Report $report -Format $env:OUTPUT_FORMAT
          Write-Host "=== Secret Rotation Report ==="
          Write-Host $output

          # Summary counts for CI visibility
          Write-Host ""
          Write-Host "=== Summary ==="
          Write-Host "Expired : $($report.Expired.Count)"
          Write-Host "Warning : $($report.Warning.Count)"
          Write-Host "Ok      : $($report.Ok.Count)"

          # Fail the job if there are expired secrets (configurable behavior)
          if ($report.Expired.Count -gt 0) {
            Write-Warning "$($report.Expired.Count) expired secret(s) detected — rotation required!"
          }
