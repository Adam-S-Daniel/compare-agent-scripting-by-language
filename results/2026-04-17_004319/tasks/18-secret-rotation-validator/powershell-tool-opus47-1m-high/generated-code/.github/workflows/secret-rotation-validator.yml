name: Secret Rotation Validator

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 07:00 UTC so operators see rotation drift in the morning.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      reference_date:
        description: Reference date (yyyy-MM-dd); defaults to today
        required: false
        default: ''
      warning_days:
        description: Warning window in days
        required: false
        default: '14'
      config_path:
        description: Path to the secrets config JSON
        required: false
        default: 'fixtures/default.json'

permissions:
  contents: read

env:
  REFERENCE_DATE: ${{ github.event.inputs.reference_date || '2026-04-19' }}
  WARNING_DAYS: ${{ github.event.inputs.warning_days || '14' }}
  CONFIG_PATH: ${{ github.event.inputs.config_path || 'fixtures/default.json' }}

jobs:
  test:
    name: Run Pester tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './SecretRotationValidator.Tests.ps1'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  validate:
    name: Validate secret rotation
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show inputs
        shell: pwsh
        run: |
          Write-Output "Reference date: $env:REFERENCE_DATE"
          Write-Output "Warning days:   $env:WARNING_DAYS"
          Write-Output "Config path:    $env:CONFIG_PATH"

      - name: Run validator (markdown)
        id: markdown
        shell: pwsh
        continue-on-error: true
        run: |
          ./Invoke-Validator.ps1 `
            -ConfigPath $env:CONFIG_PATH `
            -ReferenceDate $env:REFERENCE_DATE `
            -WarningDays ([int]$env:WARNING_DAYS) `
            -Format markdown `
            -OutputPath rotation-report.md
          Write-Output "validator_exit=$LASTEXITCODE"

      - name: Run validator (json)
        id: json
        shell: pwsh
        continue-on-error: true
        run: |
          ./Invoke-Validator.ps1 `
            -ConfigPath $env:CONFIG_PATH `
            -ReferenceDate $env:REFERENCE_DATE `
            -WarningDays ([int]$env:WARNING_DAYS) `
            -Format json `
            -OutputPath rotation-report.json
          Write-Output "validator_exit=$LASTEXITCODE"

      - name: Upload report artifacts
        # Skip under act — its artifact server is flaky and not required for CI of this script.
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: rotation-report
          path: |
            rotation-report.md
            rotation-report.json
          if-no-files-found: ignore
