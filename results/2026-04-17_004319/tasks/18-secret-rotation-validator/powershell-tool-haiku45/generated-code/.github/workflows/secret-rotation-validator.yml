name: Secret Rotation Validator

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          apt-get update -qq
          apt-get install -y -qq curl wget software-properties-common
          wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
          dpkg -i packages-microsoft-prod.deb
          apt-get update -qq
          apt-get install -y -qq powershell

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          $TestResults = Invoke-Pester -Path "Invoke-SecretRotationValidator.Tests.ps1" -PassThru

          if ($TestResults.FailedCount -gt 0) {
            Write-Host "::error::Tests failed: $($TestResults.FailedCount) failures"
            exit 1
          }

          Write-Host "Tests passed: $($TestResults.PassedCount) tests"

  test-markdown-output:
    name: Test Markdown Output Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          apt-get update -qq
          apt-get install -y -qq curl wget software-properties-common
          wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
          dpkg -i packages-microsoft-prod.deb
          apt-get update -qq
          apt-get install -y -qq powershell

      - name: Generate markdown report
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}

          . ./Invoke-SecretRotationValidator.ps1

          $secrets = @(
              @{
                  name = "db-password"
                  lastRotated = "2026-02-15"
                  rotationPolicyDays = 30
                  requiredByServices = @("api", "worker")
              },
              @{
                  name = "api-key"
                  lastRotated = "2026-04-15"
                  rotationPolicyDays = 7
                  requiredByServices = @("scheduler")
              },
              @{
                  name = "tls-cert"
                  lastRotated = "2026-04-01"
                  rotationPolicyDays = 45
                  requiredByServices = @("gateway")
              }
          )

          $report = Get-RotationReport -Secrets $secrets -ReferenceDate (Get-Date "2026-04-19") -WarningWindow 7
          $markdown = Get-MarkdownReport -Report $report

          Write-Host $markdown

  test-json-output:
    name: Test JSON Output Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          apt-get update -qq
          apt-get install -y -qq curl wget software-properties-common
          wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
          dpkg -i packages-microsoft-prod.deb
          apt-get update -qq
          apt-get install -y -qq powershell

      - name: Generate JSON report
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}

          . ./Invoke-SecretRotationValidator.ps1

          $secrets = @(
              @{
                  name = "prod-secret"
                  lastRotated = "2026-04-01"
                  rotationPolicyDays = 60
                  requiredByServices = @("prod-api")
              }
          )

          $report = Get-RotationReport -Secrets $secrets -ReferenceDate (Get-Date "2026-04-19") -WarningWindow 7
          $json = Get-JsonReport -Report $report

          Write-Host $json

          $parsed = $json | ConvertFrom-Json
          if ($parsed.ok.Count -ne 1) {
            Write-Host "::error::Expected 1 ok secret, got $($parsed.ok.Count)"
            exit 1
          }
