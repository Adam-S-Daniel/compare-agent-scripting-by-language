name: Secret Rotation Validator

on:
  push:
  pull_request:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      warning-days:
        description: 'Override warning window in days (default: use config value)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- 1.7.12
          mv actionlint /usr/local/bin/actionlint

      - name: Install Pester (no-op if pre-installed)
        shell: pwsh
        run: |
          if (-not (Get-Module Pester -ListAvailable)) {
            Install-Module Pester -Force -Scope CurrentUser
          }
          Import-Module Pester
          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run unit tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './SecretRotationValidator.Tests.ps1'
          $config.Filter.ExcludeTag = 'Integration'
          $config.Output.Verbosity = 'Normal'
          $config.Run.PassThru = $true
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Unit tests failed: $($result.FailedCount) failure(s)"
            exit 1
          }
          Write-Host "All unit tests passed ($($result.PassedCount) tests)"

      - name: Generate markdown rotation report
        shell: pwsh
        run: |
          $mdOutput = & ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-config.json `
            -ReferenceDate "2024-06-01" `
            -OutputFormat markdown
          Write-Host "=== ROTATION REPORT (MARKDOWN) ==="
          Write-Host $mdOutput

      - name: Validate rotation counts (JSON report)
        shell: pwsh
        run: |
          $jsonOutput = & ./SecretRotationValidator.ps1 `
            -ConfigPath fixtures/secrets-config.json `
            -ReferenceDate "2024-06-01" `
            -OutputFormat json
          Write-Host "=== ROTATION REPORT (JSON) ==="
          Write-Host $jsonOutput

          $data = $jsonOutput | ConvertFrom-Json

          Write-Host "=== SUMMARY ==="
          Write-Host "Expired: $($data.summary.expired)"
          Write-Host "Warning: $($data.summary.warning)"
          Write-Host "OK: $($data.summary.ok)"
          Write-Host "Total: $($data.summary.total)"

          # Assert exact expected values for the test fixture
          if ($data.summary.expired -ne 1) {
            Write-Error "Expected 1 expired secret, got $($data.summary.expired)"
            exit 1
          }
          if ($data.summary.warning -ne 1) {
            Write-Error "Expected 1 warning secret, got $($data.summary.warning)"
            exit 1
          }
          if ($data.summary.ok -ne 2) {
            Write-Error "Expected 2 ok secrets, got $($data.summary.ok)"
            exit 1
          }

          Write-Host "=== VALIDATION PASSED ==="
