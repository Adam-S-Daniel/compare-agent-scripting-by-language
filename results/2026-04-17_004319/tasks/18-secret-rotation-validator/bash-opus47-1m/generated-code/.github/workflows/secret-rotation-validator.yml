---
name: Secret Rotation Validator

# Trigger on push / pull_request so rotation drift is caught in review,
# on a nightly schedule to surface gradually-expiring secrets even when
# no code changes, and via workflow_dispatch for ad-hoc on-demand runs.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # 07:00 UTC daily.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      fixture:
        description: 'Fixture JSON path, relative to the repo root.'
        required: false
        default: 'fixtures/mixed.json'
      format:
        description: 'Report format: markdown or json.'
        required: false
        default: 'markdown'
        type: choice
        options: [markdown, json]
      warning_days:
        description: 'Warning window in days.'
        required: false
        default: '14'

# The workflow only reads repo contents; no writes to issues, packages, etc.
permissions:
  contents: read

# Prevent overlapping runs on the same ref from racing each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Secret Rotation
    runs-on: ubuntu-latest
    env:
      # The test harness writes rotation.env at the repo root to pin the
      # fixture/format/date for deterministic CI runs.  When the harness is
      # not in play (e.g. a real push from a developer), these defaults are
      # used instead.
      DEFAULT_FIXTURE: fixtures/mixed.json
      DEFAULT_FORMAT: markdown
      DEFAULT_TODAY: ''
      DEFAULT_WARNING_DAYS: '14'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies (jq)
        shell: bash
        run: |
          # jq is the only runtime dependency of rotate-check.sh that isn't
          # in a minimal container image; install it idempotently.
          if ! command -v jq >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends jq
            else
              echo "No supported package manager found to install jq" >&2
              exit 1
            fi
          fi
          jq --version

      - name: Load rotation.env overrides (if provided by test harness)
        shell: bash
        run: |
          # The test harness drops rotation.env at repo root to pin inputs.
          # We translate those into workflow env vars for the next step.
          fixture="${{ github.event.inputs.fixture || '' }}"
          format="${{ github.event.inputs.format || '' }}"
          warning="${{ github.event.inputs.warning_days || '' }}"
          today=""
          if [[ -f rotation.env ]]; then
            # shellcheck disable=SC1091
            source rotation.env
            fixture="${FIXTURE:-$fixture}"
            format="${FORMAT:-$format}"
            warning="${WARNING_DAYS:-$warning}"
            today="${TODAY:-$today}"
          fi
          : "${fixture:=${DEFAULT_FIXTURE}}"
          : "${format:=${DEFAULT_FORMAT}}"
          : "${warning:=${DEFAULT_WARNING_DAYS}}"
          {
            echo "FIXTURE=$fixture"
            echo "FORMAT=$format"
            echo "WARNING_DAYS=$warning"
            echo "TODAY=$today"
          } >>"$GITHUB_ENV"
          echo "Resolved inputs: fixture=$fixture format=$format warning=$warning today=${today:-<runtime>}"

      - name: Run rotate-check.sh and emit report
        shell: bash
        run: |
          # Ensure script is executable (a fresh checkout on some runners
          # may lose the bit depending on file attributes).
          chmod +x rotate-check.sh

          args=(--config "$FIXTURE" --format "$FORMAT" --warning-days "$WARNING_DAYS")
          if [[ -n "${TODAY:-}" ]]; then
            args+=(--today "$TODAY")
          fi

          if [[ "$FORMAT" == "json" ]]; then
            # Wrap JSON output in stable markers so the test harness can
            # extract the JSON block without being tricked by surrounding
            # log chatter from act/GitHub Actions.
            echo "<<<JSON-REPORT-BEGIN>>>"
            ./rotate-check.sh "${args[@]}"
            echo "<<<JSON-REPORT-END>>>"
          else
            ./rotate-check.sh "${args[@]}"
          fi
