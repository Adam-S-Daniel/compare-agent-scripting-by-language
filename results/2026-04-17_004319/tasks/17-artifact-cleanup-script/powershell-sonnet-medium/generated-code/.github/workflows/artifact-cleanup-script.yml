name: Artifact Cleanup Script

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester if needed
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester)) {
            Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0 -ErrorAction SilentlyContinue
          if (-not (Get-Module Pester)) {
            Import-Module Pester
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path './ArtifactCleanup.Tests.ps1' -PassThru
          Write-Output "[PESTER] Total=$($result.TotalCount) Passed=$($result.PassedCount) Failed=$($result.FailedCount)"
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed"
            exit 1
          }

      - name: Verify cleanup with known fixture (normal mode)
        shell: pwsh
        run: |
          . ./ArtifactCleanup.ps1
          $now = Get-Date
          $artifacts = @(
            @{ Name = "artifact-A"; Size = 104857600; CreatedAt = $now.AddDays(-10); WorkflowRunId = "run-1" },
            @{ Name = "artifact-B"; Size = 209715200; CreatedAt = $now.AddDays(-5);  WorkflowRunId = "run-1" },
            @{ Name = "artifact-C"; Size = 314572800; CreatedAt = $now.AddDays(-2);  WorkflowRunId = "run-1" },
            @{ Name = "artifact-D"; Size = 52428800;  CreatedAt = $now.AddDays(-40); WorkflowRunId = "run-2" },
            @{ Name = "artifact-E"; Size = 78643200;  CreatedAt = $now.AddDays(-3);  WorkflowRunId = "run-2" }
          )
          $policy = @{
            MaxAgeDays             = 30
            MaxTotalSizeBytes      = 524288000
            KeepLatestNPerWorkflow = 2
          }
          $plan = Get-DeletionPlan -Artifacts $artifacts -Policy $policy
          Write-Output "[VERIFICATION] ArtifactsDeleted=$($plan.Summary.ArtifactsDeleted)"
          Write-Output "[VERIFICATION] ArtifactsRetained=$($plan.Summary.ArtifactsRetained)"
          Write-Output "[VERIFICATION] SpaceReclaimedBytes=$($plan.Summary.TotalSpaceReclaimedBytes)"
          Write-Output "[VERIFICATION] DryRun=$($plan.Summary.DryRun)"

      - name: Verify cleanup with known fixture (dry-run mode)
        shell: pwsh
        run: |
          . ./ArtifactCleanup.ps1
          $now = Get-Date
          $artifacts = @(
            @{ Name = "artifact-A"; Size = 104857600; CreatedAt = $now.AddDays(-10); WorkflowRunId = "run-1" },
            @{ Name = "artifact-B"; Size = 209715200; CreatedAt = $now.AddDays(-5);  WorkflowRunId = "run-1" },
            @{ Name = "artifact-C"; Size = 314572800; CreatedAt = $now.AddDays(-2);  WorkflowRunId = "run-1" },
            @{ Name = "artifact-D"; Size = 52428800;  CreatedAt = $now.AddDays(-40); WorkflowRunId = "run-2" },
            @{ Name = "artifact-E"; Size = 78643200;  CreatedAt = $now.AddDays(-3);  WorkflowRunId = "run-2" }
          )
          $policy = @{
            MaxAgeDays             = 30
            MaxTotalSizeBytes      = 524288000
            KeepLatestNPerWorkflow = 2
          }
          $plan = Get-DeletionPlan -Artifacts $artifacts -Policy $policy -DryRun
          Write-Output "[VERIFICATION-DRYRUN] ArtifactsDeleted=$($plan.Summary.ArtifactsDeleted)"
          Write-Output "[VERIFICATION-DRYRUN] ArtifactsRetained=$($plan.Summary.ArtifactsRetained)"
          Write-Output "[VERIFICATION-DRYRUN] DryRun=$($plan.Summary.DryRun)"
