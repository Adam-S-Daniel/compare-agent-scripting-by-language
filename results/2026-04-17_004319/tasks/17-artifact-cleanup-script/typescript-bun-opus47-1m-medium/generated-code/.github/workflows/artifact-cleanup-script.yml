name: artifact-cleanup-script

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        run: bun install --no-save
      - name: Run bun tests
        run: bun test cleanup.test.ts

  cleanup:
    name: Run cleanup plan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        run: bun install --no-save
      - name: Execute cleanup plan (dry-run)
        env:
          FIXTURE: fixtures/artifacts.json
          POLICY: fixtures/policy.json
          NOW_ISO: "2026-04-17T00:00:00Z"
        run: |
          set -euo pipefail
          POLICY_JSON="$(cat "$POLICY")"
          bun run cleanup.ts "$FIXTURE" \
            --dry-run \
            --policy "$POLICY_JSON" \
            --now "$NOW_ISO" | tee cleanup-output.txt
          echo "---PARSED---"
          grep -E '^(Deleted|Retained|Bytes reclaimed|Bytes retained|Total artifacts):' cleanup-output.txt
