name: Artifact Cleanup

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (do not actually delete)"
        required: false
        default: "true"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

env:
  NOW: "2026-04-20T00:00:00Z"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test cleanup.test.ts

      - name: Run cleanup (dry-run) with default fixture
        run: |
          bun run cleanup.ts \
            --input fixtures/artifacts.json \
            --max-age-days 30 \
            --keep-latest-per-workflow 2 \
            --now "$NOW" \
            --dry-run
