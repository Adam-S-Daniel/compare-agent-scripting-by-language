name: Artifact Cleanup Script

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run bats tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          npm install -g bats

      - name: Install shellcheck
        run: |
          apt-get install -y shellcheck 2>/dev/null || \
          (sudo apt-get update -q && sudo apt-get install -y shellcheck)

      - name: Validate script syntax
        run: |
          bash -n artifact-cleanup.sh
          echo "Syntax OK"

      - name: Run shellcheck
        run: |
          shellcheck artifact-cleanup.sh
          echo "shellcheck OK"

      - name: Run bats tests
        run: |
          bats tests/artifact_cleanup.bats

  integration:
    name: Integration test with sample data
    runs-on: ubuntu-latest
    needs: test
    env:
      REFERENCE_DATE: "2026-04-19"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create sample artifacts CSV
        run: |
          cat > /tmp/sample_artifacts.csv <<'EOF'
          name,size_bytes,created_date,workflow_run_id
          old-build-artifact,10485760,2026-01-15,build-workflow
          stale-test-results,5242880,2026-02-20,test-workflow
          recent-build,2097152,2026-04-17,build-workflow
          latest-test,1048576,2026-04-18,test-workflow
          extra-build-1,3145728,2026-03-01,build-workflow
          extra-build-2,4194304,2026-03-15,build-workflow
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' /tmp/sample_artifacts.csv

      - name: Run cleanup in dry-run mode (all policies)
        run: |
          bash artifact-cleanup.sh \
            --artifacts /tmp/sample_artifacts.csv \
            --max-age-days 60 \
            --keep-latest-n 2 \
            --max-total-size 10485760 \
            --dry-run \
            --reference-date "$REFERENCE_DATE" | tee /tmp/cleanup-output.txt

      - name: Verify expected output - old artifacts deleted
        run: |
          grep -q "old-build-artifact" /tmp/cleanup-output.txt
          grep -q "DELETE" /tmp/cleanup-output.txt
          echo "old-build-artifact marked for deletion: OK"

      - name: Verify expected output - summary present
        run: |
          grep -q "=== Summary ===" /tmp/cleanup-output.txt
          grep -q "Deleted:" /tmp/cleanup-output.txt
          grep -q "Retained:" /tmp/cleanup-output.txt
          grep -q "Space reclaimed:" /tmp/cleanup-output.txt
          echo "Summary section present: OK"

      - name: Verify exact deletion count
        run: |
          # old-build-artifact (>60 days), stale-test-results (>60 days),
          # extra-build-1 is 49 days old (within 60 days BUT keep-latest-n=2 for build-workflow
          # keeps only recent-build and extra-build-2 — so extra-build-1 gets deleted too)
          # Total expected: old-build-artifact, stale-test-results, extra-build-1 = 3 deleted
          deleted_line=$(grep "Deleted:" /tmp/cleanup-output.txt)
          echo "Deletion line: $deleted_line"
          echo "$deleted_line" | grep -qE "Deleted: [0-9]+"
          echo "Deletion count present: OK"

      - name: Run cleanup in non-dry-run mode
        run: |
          bash artifact-cleanup.sh \
            --artifacts /tmp/sample_artifacts.csv \
            --max-age-days 60 \
            --reference-date "$REFERENCE_DATE" | tee /tmp/cleanup-live.txt
          grep -q "Executing Deletions" /tmp/cleanup-live.txt
          echo "Non-dry-run outputs deletion commands: OK"

      - name: Display cleanup outputs
        if: always()
        run: |
          echo "=== dry-run output ==="
          cat /tmp/cleanup-output.txt
          echo "=== live output ==="
          cat /tmp/cleanup-live.txt
