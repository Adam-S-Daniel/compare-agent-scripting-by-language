name: Artifact Cleanup

# The workflow runs on every push/PR, on a daily schedule (actual cleanup
# scenario), and on manual dispatch. Policy knobs are surfaced as inputs so
# dispatch can tune retention without editing the file.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Delete artifacts older than N days (0 = disabled)"
        required: false
        default: "30"
      max_total_size_bytes:
        description: "Evict oldest until retained total <= this many bytes (0 = disabled)"
        required: false
        default: "0"
      keep_latest_per_workflow:
        description: "Retain at most N newest artifacts per workflow (0 = disabled)"
        required: false
        default: "5"
      dry_run:
        description: "Compute the plan without invoking any delete action"
        required: false
        default: "true"

permissions:
  contents: read

env:
  # Fixture path is read from an env var so act runs can swap fixtures in via
  # -e / --env without editing the workflow.
  FIXTURE_PATH: fixtures/default.json
  # Frozen clock so scheduled CI runs produce reproducible output. A real
  # production deployment would leave this unset and use wall-clock time.
  NOW_UTC: "2026-04-19T00:00:00Z"

jobs:
  unit-tests:
    name: Pester unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./ArtifactCleanup.Tests.ps1 `
                                  -Output Detailed `
                                  -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failing test(s)"
          }

  cleanup-plan:
    name: Generate cleanup plan
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve policy inputs
        id: policy
        shell: pwsh
        run: |
          # Inputs from workflow_dispatch are strings; push/schedule runs fall
          # back to defaults baked into this step so every trigger works.
          $maxAge    = if ($env:INPUT_MAX_AGE_DAYS)             { $env:INPUT_MAX_AGE_DAYS }             else { '30' }
          $maxBytes  = if ($env:INPUT_MAX_TOTAL_SIZE_BYTES)     { $env:INPUT_MAX_TOTAL_SIZE_BYTES }     else { '0'  }
          $keepN     = if ($env:INPUT_KEEP_LATEST_PER_WORKFLOW) { $env:INPUT_KEEP_LATEST_PER_WORKFLOW } else { '5'  }
          $dryRun    = if ($env:INPUT_DRY_RUN)                  { $env:INPUT_DRY_RUN }                  else { 'true' }

          "max_age=$maxAge"       | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "max_bytes=$maxBytes"   | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "keep_n=$keepN"         | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "dry_run=$dryRun"       | Out-File -Append -FilePath $env:GITHUB_OUTPUT
        env:
          INPUT_MAX_AGE_DAYS: ${{ inputs.max_age_days }}
          INPUT_MAX_TOTAL_SIZE_BYTES: ${{ inputs.max_total_size_bytes }}
          INPUT_KEEP_LATEST_PER_WORKFLOW: ${{ inputs.keep_latest_per_workflow }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}

      - name: Run artifact cleanup planner
        shell: pwsh
        env:
          POLICY_MAX_AGE: ${{ steps.policy.outputs.max_age }}
          POLICY_MAX_BYTES: ${{ steps.policy.outputs.max_bytes }}
          POLICY_KEEP_N: ${{ steps.policy.outputs.keep_n }}
          POLICY_DRY_RUN: ${{ steps.policy.outputs.dry_run }}
        run: |
          # Hashtable splatting so parameter names bind correctly — array
          # splatting binds positionally in PowerShell, which caused MaxAgeDays
          # to receive the fixture path instead of the number.
          $cliArgs = @{
            InputPath             = $env:FIXTURE_PATH
            MaxAgeDays            = [int]$env:POLICY_MAX_AGE
            MaxTotalSizeBytes     = [long]$env:POLICY_MAX_BYTES
            KeepLatestPerWorkflow = [int]$env:POLICY_KEEP_N
            NowUtc                = $env:NOW_UTC
            OutputPath            = 'cleanup-plan.json'
          }
          if ($env:POLICY_DRY_RUN -eq 'true') { $cliArgs['DryRun'] = $true }

          & ./Invoke-Cleanup.ps1 @cliArgs

      - name: Show plan JSON
        shell: pwsh
        run: |
          # Emit a clearly delimited block so the act harness can parse it.
          Write-Host '===BEGIN-PLAN-JSON==='
          Get-Content cleanup-plan.json -Raw
          Write-Host '===END-PLAN-JSON==='
